<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Clientes — FinSuite Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800;900&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
<script type="importmap">{"imports":{"react":"https://esm.sh/react@18.2.0","react-dom/client":"https://esm.sh/react-dom@18.2.0/client"}}</script>
<style>
:root{
  --nav:#080d1a;--nav2:#0e1528;--blue:#2563eb;--indigo:#6366f1;
  --page:#f4f6fb;--white:#ffffff;--border:#e8edf5;
  --text:#0f172a;--muted:#64748b;--subtle:#94a3b8;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--page);min-height:100vh;color:var(--text);}
.fs{font-family:'Sora',sans-serif;}

/* ── Topbar ── */
.topbar{background:linear-gradient(135deg,#080d1a 0%,#0d1525 100%);height:60px;display:flex;align-items:center;padding:0 2rem;gap:.85rem;position:sticky;top:0;z-index:300;box-shadow:0 1px 0 rgba(255,255,255,.06),0 2px 20px rgba(0,0,0,.35);}
.logo{display:flex;align-items:center;gap:.6rem;text-decoration:none;}
.logo-mark{width:32px;height:32px;background:linear-gradient(135deg,#2563eb,#6366f1);border-radius:9px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(99,102,241,.35);flex-shrink:0;}
.logo-txt{font-size:.95rem;font-weight:800;color:#f1f5f9;letter-spacing:-.01em;font-family:'Sora',sans-serif;}
.logo-v{background:rgba(99,102,241,.25);color:#a5b4fc;font-size:.6rem;font-weight:800;padding:.15rem .45rem;border-radius:5px;letter-spacing:.05em;}
.nav-sep{width:1px;height:20px;background:rgba(255,255,255,.07);}
.nav-item{color:#475569;font-size:.78rem;font-weight:600;padding:.3rem .6rem;border-radius:7px;display:flex;align-items:center;gap:.35rem;text-decoration:none;transition:.15s;}
.nav-item.active{color:#93c5fd;background:rgba(99,102,241,.12);}
.spacer{flex:1;}
.user-chip{display:flex;align-items:center;gap:.5rem;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:99px;padding:.25rem .7rem .25rem .3rem;cursor:default;}
.uav{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:800;color:#fff;font-family:'Sora',sans-serif;flex-shrink:0;}
.uname{font-size:.78rem;font-weight:700;color:#e2e8f0;line-height:1.2;}
.urole{font-size:.64rem;color:#475569;}
.btn-out{display:flex;align-items:center;gap:.35rem;background:transparent;border:1px solid rgba(255,255,255,.09);border-radius:8px;padding:.3rem .8rem;color:#64748b;font-size:.75rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:.15s;}
.btn-out:hover{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.25);color:#fca5a5;}

/* ── Page header ── */
.page-hdr{background:linear-gradient(135deg,#060c1a 0%,#0d1830 100%);padding:2rem 2rem 2.25rem;position:relative;overflow:hidden;}
.page-hdr::before{content:'';position:absolute;top:-60px;right:-60px;width:300px;height:300px;background:radial-gradient(circle,rgba(99,102,241,.1) 0%,transparent 60%);pointer-events:none;}
.hdr-inner{max-width:1300px;margin:0 auto;position:relative;z-index:1;}
.hdr-left .eyebrow{font-size:.7rem;font-weight:700;color:#4f83cc;text-transform:uppercase;letter-spacing:.14em;margin-bottom:.5rem;}
.hdr-left h1{font-size:1.75rem;font-weight:900;color:#f1f5f9;letter-spacing:-.04em;line-height:1.1;font-family:'Sora',sans-serif;}
.hdr-left p{color:#475569;font-size:.88rem;margin-top:.45rem;line-height:1.6;max-width:480px;}
.btn-new-client{display:flex;align-items:center;gap:.5rem;background:linear-gradient(135deg,#1d4ed8,#2563eb,#6366f1);color:#fff;border:none;border-radius:13px;padding:.75rem 1.5rem;font-size:.88rem;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;box-shadow:0 4px 16px rgba(37,99,235,.4);transition:.2s;white-space:nowrap;flex-shrink:0;}
.btn-new-client:hover{filter:brightness(1.08);transform:translateY(-1px);box-shadow:0 8px 24px rgba(37,99,235,.5);}

/* ── Stats ── */
.stats-row{max-width:1300px;margin:0 auto;padding:0 2rem;display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;position:relative;z-index:2;}
.stat-card{background:var(--white);border-radius:16px;border:1px solid var(--border);box-shadow:0 2px 12px rgba(15,23,42,.06);padding:1.2rem 1.35rem;display:flex;align-items:center;gap:1rem;}
.stat-ico{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.stat-n{font-size:1.75rem;font-weight:900;letter-spacing:-.04em;line-height:1;font-family:'Sora',sans-serif;}
.stat-l{font-size:.7rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-top:.2rem;}

/* ── Main content ── */
.main{max-width:1300px;margin:0 auto;padding:2rem 1.75rem 4rem;}

/* ── Toolbar ── */
.toolbar{display:flex;align-items:center;gap:.75rem;margin-bottom:1.5rem;flex-wrap:wrap;}
.search-box{position:relative;flex:0 0 300px;}
.search-input{width:100%;background:var(--white);border:1.5px solid var(--border);border-radius:11px;padding:.65rem 1rem .65rem 2.4rem;font-size:.88rem;font-family:'DM Sans',sans-serif;outline:none;color:var(--text);transition:.18s;}
.search-input:focus{border-color:var(--indigo);box-shadow:0 0 0 3px rgba(99,102,241,.1);}
.search-ico{position:absolute;left:.75rem;top:50%;transform:translateY(-50%);color:var(--subtle);pointer-events:none;}
.filt-select{background:var(--white);border:1.5px solid var(--border);border-radius:11px;padding:.62rem .9rem;font-size:.85rem;font-family:'DM Sans',sans-serif;outline:none;color:var(--text);cursor:pointer;transition:.18s;}
.filt-select:focus{border-color:var(--indigo);}
.btn-clear{display:flex;align-items:center;gap:.35rem;background:var(--white);border:1.5px solid var(--border);border-radius:9px;padding:.55rem .85rem;font-size:.78rem;font-weight:600;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;transition:.15s;}
.btn-clear:hover{border-color:#fca5a5;color:#f43f5e;background:#fff1f2;}
.count-txt{font-size:.82rem;color:var(--subtle);margin-left:auto;font-weight:500;}

/* ── Client cards ── */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(308px,1fr));gap:1.1rem;}
.cc{background:var(--white);border-radius:20px;border:1px solid var(--border);box-shadow:0 2px 8px rgba(15,23,42,.05);overflow:hidden;transition:.22s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;}
.cc:hover{transform:translateY(-4px);box-shadow:0 16px 36px rgba(15,23,42,.1);border-color:rgba(99,102,241,.25);}
.cc-stripe{height:3px;}
.cc-body{padding:1.2rem 1.3rem .9rem;flex:1;}
.cc-top{display:flex;align-items:flex-start;gap:.9rem;margin-bottom:.9rem;}
.cc-av{width:52px;height:52px;border-radius:15px;display:flex;align-items:center;justify-content:center;font-size:1.15rem;font-weight:900;color:#fff;font-family:'Sora',sans-serif;flex-shrink:0;box-shadow:0 4px 12px rgba(0,0,0,.18);}
.cc-main{flex:1;min-width:0;}
.cc-name{font-size:.95rem;font-weight:800;color:var(--text);font-family:'Sora',sans-serif;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3;}
.cc-company{font-size:.76rem;color:var(--muted);margin-top:.1rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cc-pill{display:inline-flex;align-items:center;font-size:.65rem;font-weight:700;padding:.18rem .6rem;border-radius:99px;text-transform:uppercase;letter-spacing:.06em;margin-top:.4rem;}
.cc-actions{display:flex;gap:.3rem;flex-shrink:0;}
.ic-btn{width:32px;height:32px;border-radius:9px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;}
.cc-id{display:inline-flex;align-items:center;gap:.4rem;background:#f8fafc;border:1px solid var(--border);border-radius:8px;padding:.28rem .65rem;font-size:.72rem;font-weight:700;color:#475569;font-family:monospace;margin-bottom:.65rem;}
.cc-details{display:flex;flex-direction:column;gap:.28rem;}
.cc-row{display:flex;align-items:center;gap:.45rem;font-size:.75rem;color:var(--muted);}
.cc-row span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cc-foot{background:#fafbfd;border-top:1px solid #f1f5f9;padding:.8rem 1.3rem;display:flex;align-items:center;justify-content:space-between;gap:.5rem;}
.cc-mods{display:flex;gap:.28rem;align-items:center;}
.cc-mod-dot{width:8px;height:8px;border-radius:50%;}
.cc-date{font-size:.68rem;color:var(--subtle);}
.btn-open{display:flex;align-items:center;gap:.4rem;background:linear-gradient(135deg,#4f46e5,#6366f1);color:#fff;border:none;border-radius:9px;padding:.42rem .9rem;font-size:.76rem;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:.15s;white-space:nowrap;}
.btn-open:hover{filter:brightness(1.1);}

/* ── Empty ── */
.empty{text-align:center;padding:5rem 1rem;max-width:440px;margin:0 auto;}
.empty-ico{width:80px;height:80px;background:linear-gradient(135deg,#eef2ff,#e0e7ff);border-radius:24px;display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem;box-shadow:0 8px 24px rgba(79,70,229,.15);}

/* ── Modal ── */
.overlay{position:fixed;inset:0;background:rgba(8,13,26,.7);backdrop-filter:blur(6px);z-index:500;display:flex;align-items:center;justify-content:center;padding:1rem;}
.modal{background:#fff;border-radius:24px;width:100%;max-width:620px;max-height:94vh;overflow-y:auto;box-shadow:0 40px 100px rgba(8,13,26,.45);border:1px solid rgba(255,255,255,.6);}
.modal-head{padding:1.75rem 2rem 1.25rem;border-bottom:1px solid #f1f5f9;position:sticky;top:0;background:#fff;z-index:1;border-radius:24px 24px 0 0;}
.modal-avprev{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:.95rem;font-weight:900;color:#fff;font-family:'Sora',sans-serif;transition:.2s;flex-shrink:0;}
.modal-ttl{font-size:1.05rem;font-weight:800;color:var(--text);font-family:'Sora',sans-serif;}
.modal-sub{font-size:.78rem;color:var(--muted);margin-top:.15rem;}
.msec{padding:.9rem 2rem;}
.msec-title{display:flex;align-items:center;gap:.6rem;font-size:.7rem;font-weight:800;color:var(--subtle);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.9rem;}
.msec-title .msec-line{flex:1;height:1px;background:linear-gradient(to right,#f1f5f9,transparent);}
.msec-num{width:18px;height:18px;border-radius:5px;background:linear-gradient(135deg,var(--blue),var(--indigo));display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:800;color:#fff;flex-shrink:0;}
.fgrid{display:grid;gap:.8rem;}
.flbl{font-size:.75rem;font-weight:700;color:#374151;display:block;margin-bottom:.4rem;letter-spacing:.01em;}
.fi{width:100%;border:1.5px solid var(--border);border-radius:11px;padding:.68rem .95rem;font-size:.9rem;font-family:'DM Sans',sans-serif;outline:none;color:var(--text);transition:.18s;background:#fff;}
.fi:focus{border-color:var(--indigo);box-shadow:0 0 0 3px rgba(99,102,241,.1);}
.fi.err{border-color:#f87171;background:#fff8f8;}
.ferr{font-size:.72rem;color:#f43f5e;margin-top:.25rem;}
.modal-foot{padding:1.1rem 2rem 1.6rem;border-top:1px solid #f1f5f9;display:flex;justify-content:flex-end;gap:.75rem;position:sticky;bottom:0;background:#fff;border-radius:0 0 24px 24px;}
.btn-c{background:#f1f5f9;color:#475569;border:none;border-radius:11px;padding:.65rem 1.35rem;font-size:.88rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:.15s;}
.btn-c:hover{background:#e2e8f0;}
.btn-s{background:linear-gradient(135deg,#4f46e5,#6366f1);color:#fff;border:none;border-radius:11px;padding:.65rem 1.6rem;font-size:.88rem;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;box-shadow:0 4px 12px rgba(99,102,241,.3);transition:.15s;}
.btn-s:hover{filter:brightness(1.07);}
.btn-del{background:linear-gradient(135deg,#dc2626,#b91c1c);color:#fff;border:none;border-radius:11px;padding:.65rem 1.5rem;font-size:.88rem;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;}

/* ── Delete confirm ── */
.del-icon-wrap{width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,#fee2e2,#fecaca);display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;box-shadow:0 6px 20px rgba(220,38,38,.2);}
.del-warning{background:#fff8f8;border:1.5px solid #fecdd3;border-radius:12px;padding:.9rem 1.1rem;font-size:.82rem;color:#9f1239;line-height:1.65;margin-top:.75rem;}

/* ── Toast ── */
.toast{position:fixed;bottom:1.75rem;left:50%;transform:translateX(-50%);background:var(--nav2);color:#f1f5f9;padding:.8rem 1.5rem;border-radius:14px;font-size:.88rem;font-weight:600;box-shadow:0 12px 40px rgba(8,13,26,.4);z-index:600;display:flex;align-items:center;gap:.55rem;border:1px solid rgba(255,255,255,.08);white-space:nowrap;}

::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-type="module">
import React,{useState,useEffect,useRef,useMemo} from 'react';
import {createRoot} from 'react-dom/client';

const uuid=()=>'c'+Date.now().toString(36)+Math.random().toString(36).slice(2);
const now_=()=>new Date().toISOString();
const fmtD=s=>{try{return new Date(s).toLocaleDateString('es-CO',{day:'2-digit',month:'short',year:'numeric'});}catch{return'';}};
const COLORS=['#4f46e5','#0891b2','#059669','#d97706','#dc2626','#7c3aed','#db2777','#0d9488','#ea580c','#2563eb'];
const cFor=id=>COLORS[(id||'a').charCodeAt(0)%COLORS.length];
const inis=n=>(n||'?').trim().split(/\s+/).slice(0,2).map(w=>w[0]?.toUpperCase()||'').join('');
const TIPOS=['Persona Natural','Empresa','PyME','Startup','Corporativo','Inversionista'];
const TDOCS=['Cédula de Ciudadanía','NIT','Cédula de Extranjería','Pasaporte','RUT','DNI'];
const MOD_K=['finanzas','deudas','retiro','valoracion'];
const MOD_C=['#059669','#d97706','#7c3aed','#0891b2'];
const MOD_N=['Finanzas','Deudas','Retiro','Valoración'];
const T_STYLE={'Persona Natural':{bg:'#eff6ff',t:'#1d4ed8'},'Empresa':{bg:'#f0fdf4',t:'#15803d'},'PyME':{bg:'#fffbeb',t:'#92400e'},'Startup':{bg:'#fdf4ff',t:'#7e22ce'},'Corporativo':{bg:'#f0f9ff',t:'#075985'},'Inversionista':{bg:'#fff1f2',t:'#be123c'}};

const loadC=()=>{try{return JSON.parse(localStorage.getItem('finsuite_clients')||'[]');}catch{return[];}};
const saveC=c=>localStorage.setItem('finsuite_clients',JSON.stringify(c));
const cntMods=id=>MOD_K.filter(k=>localStorage.getItem('finsuite_'+id+'_'+k)).length;

const EMPTY={nombre:'',tipoDoc:'Cédula de Ciudadanía',numeroDoc:'',empresa:'',tipo:'Persona Natural',email:'',telefono:'',celular:'',ciudad:'',direccion:'',notas:''};

// ── TopBar ────────────────────────────────────────────────────────────────────
function TopBar({user,onOut}){
  return <div className="topbar">
    <div style={{display:'flex',alignItems:'center',gap:'.6rem',marginRight:'.25rem'}}>
      <div className="logo-mark"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>
      <div>
        <div style={{fontFamily:'Sora,sans-serif',fontSize:'.95rem',fontWeight:800,color:'#f1f5f9',letterSpacing:'-.01em',lineHeight:1.1}}>FinSuite Pro</div>
        <div style={{fontSize:'.6rem',color:'#475569',letterSpacing:'.02em'}}>Suite Financiera</div>
      </div>
      <div className="logo-v">v1.2</div>
    </div>
    <div className="nav-sep"/>
    <div style={{display:'flex',alignItems:'center',gap:.4,background:'rgba(99,102,241,.12)',border:'1px solid rgba(99,102,241,.2)',borderRadius:9,padding:'.3rem .7rem',gap:'.4rem'}}>
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#93c5fd" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
      <span style={{fontSize:'.78rem',fontWeight:700,color:'#93c5fd'}}>Clientes</span>
    </div>
    <div className="spacer"/>
    {user&&<div className="user-chip">
      <div className="uav" style={{background:cFor(user.usuario)}}>{inis(user.nombre)}</div>
      <div>
        <div className="uname">{user.nombre}</div>
        <div className="urole">{user.rol}</div>
      </div>
    </div>}
    <button className="btn-out" onClick={onOut}>
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Salir
    </button>
  </div>;
}

// ── ClientCard ────────────────────────────────────────────────────────────────
function ClientCard({c,onOpen,onEdit,onDel}){
  const col=cFor(c.id);const mods=cntMods(c.id);
  const ts=T_STYLE[c.tipo]||{bg:'#f1f5f9',t:'#475569'};
  const docLabel=c.tipoDoc&&c.numeroDoc?`${c.tipoDoc==='Cédula de Ciudadanía'?'CC':c.tipoDoc==='NIT'?'NIT':c.tipoDoc}: ${c.numeroDoc}`:'';
  return <div className="cc">
    <div className="cc-stripe" style={{background:col}}/>
    <div className="cc-body">
      <div className="cc-top">
        <div className="cc-av" style={{background:col}}>{inis(c.nombre)}</div>
        <div className="cc-main">
          <div className="cc-name">{c.nombre}</div>
          {c.empresa&&<div className="cc-company">{c.empresa}</div>}
          <div><span className="cc-pill" style={{background:ts.bg,color:ts.t}}>{c.tipo||'Persona Natural'}</span></div>
        </div>
        <div className="cc-actions" onClick={e=>e.stopPropagation()}>
          <button className="ic-btn" style={{background:'#f0f9ff',color:'#0891b2'}} onClick={()=>onEdit(c)} title="Editar"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
          <button className="ic-btn" style={{background:'#fff1f2',color:'#f43f5e'}} onClick={()=>onDel(c)} title="Eliminar"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg></button>
        </div>
      </div>
      {docLabel&&<div className="cc-id"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>{docLabel}</div>}
      <div className="cc-details">
        {c.email&&<div className="cc-row"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg><span>{c.email}</span></div>}
        {(c.celular||c.telefono)&&<div className="cc-row"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.56 2h3a2 2 0 0 1 2 1.72 12.05 12.05 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 9.91a16 16 0 0 0 6.08 6.08l1.88-1.88a2 2 0 0 1 2.11-.45 12.05 12.05 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg><span>{c.celular||c.telefono}</span></div>}
        {c.ciudad&&<div className="cc-row"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg><span>{c.ciudad}</span></div>}
        {c.direccion&&<div className="cc-row"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg><span>{c.direccion}</span></div>}
      </div>
    </div>
    <div className="cc-foot">
      <div>
        <div className="cc-mods" style={{marginBottom:'.25rem'}}>
          {MOD_K.map((k,i)=><div key={k} className="cc-mod-dot" style={{background:localStorage.getItem('finsuite_'+c.id+'_'+k)?MOD_C[i]:'#e2e8f0'}} title={MOD_N[i]}/>)}
        </div>
        <div className="cc-date">{mods>0?mods+' módulo'+(mods>1?'s':'')+' activo'+(mods>1?'s':''):'Sin análisis'} · {fmtD(c.updatedAt||c.createdAt)}</div>
      </div>
      <button className="btn-open" onClick={()=>onOpen(c)}><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>Abrir</button>
    </div>
  </div>;
}

// ── ClientModal ───────────────────────────────────────────────────────────────
function ClientModal({client,onSave,onClose}){
  const init=client?{nombre:client.nombre||'',tipoDoc:client.tipoDoc||'Cédula de Ciudadanía',numeroDoc:client.numeroDoc||'',empresa:client.empresa||'',tipo:client.tipo||'Persona Natural',email:client.email||'',telefono:client.telefono||'',celular:client.celular||'',ciudad:client.ciudad||'',direccion:client.direccion||'',notas:client.notas||''}:{...EMPTY};
  const [f,setF]=useState(init);const [e,setE]=useState({});
  const up=k=>ev=>setF(x=>({...x,[k]:ev.target.value}));
  const save=()=>{ if(!f.nombre.trim()){setE({nombre:'El nombre es requerido'});return;}setE({});onSave(f); };
  const col=f.nombre?cFor(client?.id||f.nombre):'#94a3b8';
  return <div className="overlay" onClick={onClose}>
    <div className="modal" onClick={ev=>ev.stopPropagation()}>
      <div className="modal-head">
        <div style={{display:'flex',alignItems:'center',gap:'.85rem'}}>
          <div className="modal-avprev" style={{background:col}}>{f.nombre?inis(f.nombre):'?'}</div>
          <div><div className="modal-ttl">{client?'Editar cliente':'Registrar nuevo cliente'}</div><div className="modal-sub">{client?'Actualiza la información y datos de contacto':'Ingresa los datos de identificación y contacto del cliente'}</div></div>
        </div>
      </div>

      <div className="msec">
        <div className="msec-title"><div className="msec-num">1</div>Identidad <div className="msec-line"/></div>
        <div className="fgrid" style={{gridTemplateColumns:'1fr'}}>
          <div>
            <label className="flbl">Nombre completo *</label>
            <input className={`fi${e.nombre?' err':''}`} value={f.nombre} onChange={up('nombre')} placeholder="Juan Carlos Pérez García / Empresa S.A.S."/>
            {e.nombre&&<p className="ferr">{e.nombre}</p>}
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1.3fr 1fr',gap:'.75rem'}}>
            <div><label className="flbl">Tipo de documento</label><select className="fi" value={f.tipoDoc} onChange={up('tipoDoc')}>{TDOCS.map(t=><option key={t}>{t}</option>)}</select></div>
            <div><label className="flbl">Número de documento</label><input className="fi" value={f.numeroDoc} onChange={up('numeroDoc')} placeholder="12.345.678" style={{fontFamily:'monospace,sans-serif',letterSpacing:'.03em'}}/></div>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1.6fr 1fr',gap:'.75rem'}}>
            <div><label className="flbl">Empresa / Organización</label><input className="fi" value={f.empresa} onChange={up('empresa')} placeholder="Nombre de la empresa o entidad"/></div>
            <div><label className="flbl">Tipo de cliente</label><select className="fi" value={f.tipo} onChange={up('tipo')}>{TIPOS.map(t=><option key={t}>{t}</option>)}</select></div>
          </div>
        </div>
      </div>

      <div className="msec" style={{paddingTop:0}}>
        <div className="msec-title"><div className="msec-num">2</div>Contacto <div className="msec-line"/></div>
        <div className="fgrid" style={{gridTemplateColumns:'1fr 1fr',gap:'.8rem'}}>
          <div style={{gridColumn:'1/-1'}}><label className="flbl">Correo electrónico</label><input className="fi" type="email" value={f.email} onChange={up('email')} placeholder="cliente@empresa.com"/></div>
          <div><label className="flbl">Celular</label><input className="fi" value={f.celular} onChange={up('celular')} placeholder="+57 310 000 0000"/></div>
          <div><label className="flbl">Teléfono fijo</label><input className="fi" value={f.telefono} onChange={up('telefono')} placeholder="601-000-0000"/></div>
          <div><label className="flbl">Ciudad / Municipio</label><input className="fi" value={f.ciudad} onChange={up('ciudad')} placeholder="Bogotá D.C."/></div>
          <div><label className="flbl">Dirección</label><input className="fi" value={f.direccion} onChange={up('direccion')} placeholder="Cra 7 # 12-34 Of. 501"/></div>
        </div>
      </div>

      <div className="msec" style={{paddingTop:0}}>
        <div className="msec-title"><div className="msec-num">3</div>Notas internas <div className="msec-line"/></div>
        <textarea className="fi" value={f.notas} onChange={up('notas')} rows={3} placeholder="Objetivos financieros, perfil de riesgo, observaciones del asesor..." style={{resize:'vertical'}}/>
      </div>

      <div className="modal-foot"><button className="btn-c" onClick={onClose}>Cancelar</button><button className="btn-s" onClick={save}>{client?'Guardar cambios':'Registrar cliente'}</button></div>
    </div>
  </div>;
}

function DeleteModal({c,onOk,onClose}){
  return <div className="overlay" onClick={onClose}>
    <div className="modal" style={{maxWidth:420}} onClick={e=>e.stopPropagation()}>
      <div className="modal-head" style={{textAlign:'center',paddingTop:'2rem'}}>
        <div className="del-icon-wrap"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#dc2626" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg></div>
        <div className="modal-ttl">Eliminar cliente</div>
        <div className="modal-sub">Esta acción no se puede deshacer</div>
      </div>
      <div style={{padding:'1rem 2rem'}}>
        <p style={{textAlign:'center',fontSize:'.92rem',color:'#374151',lineHeight:1.65}}>¿Confirmas eliminar a <strong style={{color:'#0f172a'}}>{c?.nombre}</strong>?</p>
        <div className="del-warning"><strong>Atención:</strong> Se eliminarán el perfil del cliente y todos sus datos financieros guardados en los módulos de análisis.</div>
      </div>
      <div className="modal-foot" style={{justifyContent:'center',paddingTop:'1.25rem'}}><button className="btn-c" onClick={onClose}>Cancelar</button><button className="btn-del" onClick={onOk}>Sí, eliminar</button></div>
    </div>
  </div>;
}

// ── App ────────────────────────────────────────────────────────────────────────
function App(){
  const [user,setUser]=useState(null);
  const [clients,setClients]=useState([]);
  const [q,setQ]=useState('');const [fT,setFT]=useState('');const [sortBy,setSortBy]=useState('recent');
  const [modal,setModal]=useState(null);const [sel,setSel]=useState(null);
  const [toast,setToast]=useState('');

  useEffect(()=>{const a=sessionStorage.getItem('finsuite_auth');if(!a){window.location.href='index.html';return;}setUser(JSON.parse(a));setClients(loadC());},[]);
  const flash=m=>{setToast(m);setTimeout(()=>setToast(''),3000);};
  const logout=()=>{sessionStorage.clear();window.location.href='index.html';};
  const open=c=>{sessionStorage.setItem('finsuite_current_client',JSON.stringify(c));window.location.href='dashboard.html';};
  const save=form=>{
    let nl;
    if(modal==='edit'&&sel){nl=clients.map(c=>c.id===sel.id?{...sel,...form,updatedAt:now_()}:c);flash('Cliente actualizado correctamente');}
    else{nl=[{id:uuid(),...form,createdAt:now_(),updatedAt:now_()},...clients];flash('Cliente registrado exitosamente');}
    setClients(nl);saveC(nl);setModal(null);setSel(null);
  };
  const del=()=>{MOD_K.forEach(k=>localStorage.removeItem('finsuite_'+sel.id+'_'+k));const nl=clients.filter(c=>c.id!==sel.id);setClients(nl);saveC(nl);flash('Cliente eliminado');setModal(null);setSel(null);};
  const filtered=useMemo(()=>{
    const base=clients.filter(c=>{const q2=q.toLowerCase();return(!q2||(c.nombre||'').toLowerCase().includes(q2)||(c.empresa||'').toLowerCase().includes(q2)||(c.email||'').toLowerCase().includes(q2)||(c.numeroDoc||'').includes(q2)||(c.ciudad||'').toLowerCase().includes(q2))&&(!fT||c.tipo===fT);});
    if(sortBy==='name') return base.slice().sort((a,b)=>(a.nombre||'').localeCompare(b.nombre||''));
    if(sortBy==='modules') return base.slice().sort((a,b)=>cntMods(b.id)-cntMods(a.id));
    if(sortBy==='updated') return base.slice().sort((a,b)=>new Date(b.updatedAt||0)-new Date(a.updatedAt||0));
    return base; // recent = default order (newest first)
  },[clients,q,fT,sortBy]);
  const withD=clients.filter(c=>cntMods(c.id)>0).length;
  const thisMo=clients.filter(c=>{const d=new Date(c.createdAt||0);return d.getMonth()===new Date().getMonth()&&d.getFullYear()===new Date().getFullYear();}).length;
  const totMods=clients.reduce((a,c)=>a+cntMods(c.id),0);

  return <>
    <TopBar user={user} onOut={logout}/>
    <div className="page-hdr">
      <div style={{maxWidth:1300,margin:'0 auto',position:'relative',zIndex:1,display:'flex',alignItems:'center',justifyContent:'space-between',gap:'1rem',flexWrap:'wrap'}}>
        <div>
          <div style={{fontSize:'.68rem',fontWeight:700,color:'#6b9fd4',textTransform:'uppercase',letterSpacing:'.14em',marginBottom:'.55rem'}}>Panel de Asesoría Financiera</div>
          <h1 style={{fontFamily:'Sora,sans-serif',fontSize:'1.75rem',fontWeight:900,color:'#f1f5f9',letterSpacing:'-.04em',margin:0,lineHeight:1.15}}>Gestión de Clientes</h1>
          <p style={{color:'#64748b',fontSize:'.88rem',margin:'.4rem 0 0',lineHeight:1.6,maxWidth:480}}>Administra perfiles, centraliza análisis financieros y genera informes personalizados.</p>
        </div>
        <button className="btn-new-client" onClick={()=>{setSel(null);setModal('new');}}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Nuevo cliente
        </button>
      </div>
    </div>

    <div className="stats-row">
      {[{ico:<svg viewBox="0 0 24 24" fill="none" stroke="#4f46e5" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,v:clients.length,l:'Total clientes',c:'#4f46e5',bg:'#eef2ff'},
        {ico:<svg viewBox="0 0 24 24" fill="none" stroke="#059669" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>,v:withD,l:'Con análisis activos',c:'#059669',bg:'#ecfdf5'},
        {ico:<svg viewBox="0 0 24 24" fill="none" stroke="#d97706" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>,v:thisMo,l:'Nuevos este mes',c:'#d97706',bg:'#fffbeb'},
        {ico:<svg viewBox="0 0 24 24" fill="none" stroke="#7c3aed" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>,v:totMods,l:'Módulos analizados',c:'#7c3aed',bg:'#f5f3ff'},
      ].map((s,i)=><div key={i} className="stat-card">
        <div className="stat-ico" style={{background:s.bg}}>{React.cloneElement(s.ico,{width:20,height:20})}</div>
        <div><div className="stat-n" style={{color:s.c}}>{s.v}</div><div className="stat-l">{s.l}</div></div>
      </div>)}
    </div>

    <div className="main" style={{paddingTop:'1.5rem'}}>
      <div className="toolbar">
        <div className="search-box">
          <svg className="search-ico" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input className="search-input" value={q} onChange={e=>setQ(e.target.value)} placeholder="Buscar por nombre, NIT, empresa, ciudad..."/>
        </div>
        <select className="filt-select" value={fT} onChange={e=>setFT(e.target.value)}>
          <option value="">Todos los tipos</option>
          {TIPOS.map(t=><option key={t}>{t}</option>)}
        </select>
        <select className="filt-select" value={sortBy} onChange={e=>setSortBy(e.target.value)}>
          <option value="recent">Más recientes</option>
          <option value="name">Nombre A–Z</option>
          <option value="modules">Con más módulos</option>
          <option value="updated">Última actividad</option>
        </select>
        {(q||fT)&&<button className="btn-clear" onClick={()=>{setQ('');setFT('');}}>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          Limpiar filtros
        </button>}
        <span className="count-txt">{filtered.length} de {clients.length} clientes</span>
      </div>

      {filtered.length>0
        ?<div className="cards-grid">{filtered.map(c=><ClientCard key={c.id} c={c} onOpen={open} onEdit={c=>{setSel(c);setModal('edit');}} onDel={c=>{setSel(c);setModal('delete');}}/>)}</div>
        :<div className="empty">
          {clients.length===0?<><div className="empty-ico"><svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#6366f1" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg></div>
            <div className="fs" style={{fontSize:'1.1rem',fontWeight:800,color:'#0f172a',marginBottom:'.6rem'}}>Comienza registrando un cliente</div>
            <p style={{color:'#94a3b8',marginBottom:'1.5rem',lineHeight:1.65}}>Agrega tu primer cliente para gestionar sus análisis financieros de forma organizada e independiente.</p>
            <button className="btn-new-client" style={{margin:'0 auto'}} onClick={()=>setModal('new')}>Agregar primer cliente</button></>
          :<><div className="fs" style={{fontSize:'1.05rem',fontWeight:800,color:'#0f172a',marginBottom:'.5rem'}}>Sin resultados</div><p style={{color:'#94a3b8'}}>Ningún cliente coincide con los filtros aplicados.</p></>}
        </div>}
    </div>

    {(modal==='new'||modal==='edit')&&<ClientModal client={modal==='edit'?sel:null} onSave={save} onClose={()=>{setModal(null);setSel(null);}}/>}
    {modal==='delete'&&<DeleteModal c={sel} onOk={del} onClose={()=>{setModal(null);setSel(null);}}/>}
    {toast&&<div className="toast"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#22c55e" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>{toast}</div>}
  </>;
}
createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
