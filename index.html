<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>FinSuite Pro — Acceso</title>
<script src="usuarios.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 50%,#0f172a 100%);display:flex;align-items:center;justify-content:center;}
.bg-dots{position:fixed;inset:0;background-image:radial-gradient(rgba(99,179,237,.07) 1px,transparent 1px);background-size:28px 28px;pointer-events:none;}
.card{background:rgba(255,255,255,.04);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.1);border-radius:24px;padding:2.5rem;width:100%;max-width:400px;box-shadow:0 24px 64px rgba(0,0,0,.5);}
.logo{display:flex;align-items:center;gap:.75rem;margin-bottom:2rem;}
.logo-icon{width:44px;height:44px;background:linear-gradient(135deg,#2563eb,#4f46e5);border-radius:12px;display:flex;align-items:center;justify-content:center;}
.logo-text{font-size:1.4rem;font-weight:800;color:#f1f5f9;letter-spacing:-.02em;}
.logo-sub{font-size:.75rem;color:#64748b;font-weight:500;}
.tagline{font-size:.95rem;color:#94a3b8;margin-bottom:2rem;line-height:1.6;}
.field{margin-bottom:1.1rem;}
.field label{display:block;font-size:.8rem;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.07em;margin-bottom:.5rem;}
.field input{width:100%;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.1);border-radius:12px;padding:.75rem 1rem;color:#f1f5f9;font-size:.95rem;outline:none;transition:.2s;font-family:inherit;}
.field input::placeholder{color:#475569;}
.field input:focus{border-color:#3b82f6;background:rgba(59,130,246,.08);box-shadow:0 0 0 4px rgba(59,130,246,.12);}
.btn{width:100%;padding:.85rem;background:linear-gradient(135deg,#2563eb,#4f46e5);color:#fff;border:none;border-radius:12px;font-size:.95rem;font-weight:700;cursor:pointer;transition:.2s;font-family:inherit;margin-top:.5rem;}
.btn:hover:not(:disabled){filter:brightness(1.1);transform:translateY(-1px);}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#fca5a5;padding:.75rem 1rem;border-radius:10px;font-size:.85rem;margin-top:.75rem;display:none;}
.footer{text-align:center;margin-top:1.5rem;font-size:.75rem;color:#334155;}
</style>
</head>
<body>
<div class="bg-dots"></div>
<div class="card">
  <div class="logo">
    <div class="logo-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    </div>
    <div>
      <div class="logo-text">FinSuite Pro</div>
      <div class="logo-sub">Suite de Asesoría Financiera</div>
    </div>
  </div>
  <p class="tagline">Bienvenido. Ingresa tus credenciales para acceder a la plataforma.</p>
  <div class="field">
    <label>Usuario</label>
    <input type="text" id="usr" placeholder="Ingresa tu usuario" autocomplete="username" autofocus/>
  </div>
  <div class="field">
    <label>Contraseña</label>
    <input type="password" id="pwd" placeholder="••••••••" autocomplete="current-password"/>
  </div>
  <button class="btn" id="loginBtn" disabled>Iniciar sesión</button>
  <div class="error" id="err">Usuario o contraseña incorrectos.</div>
  <div class="footer">FinSuite Pro v1.2 &mdash; Todos los derechos reservados</div>
</div>
<script>
const $ = id => document.getElementById(id);
$('loginBtn').disabled = false;

function doLogin(){
  const u=$('usr').value.trim(), p=$('pwd').value;
  const found = (typeof USUARIOS !== 'undefined') && USUARIOS.find(x=>x.usuario===u&&x.password===p);
  if(found){
    sessionStorage.setItem('finsuite_auth', JSON.stringify(found));
    $('err').style.display='none';
    $('loginBtn').textContent='Accediendo...';
    setTimeout(()=>{ window.location.href='clientes.html'; }, 300);
  } else {
    $('err').style.display='block';
    $('pwd').value='';
    $('pwd').focus();
  }
}

$('loginBtn').addEventListener('click', doLogin);
[$('usr'),$('pwd')].forEach(el=>el.addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); }));

// If already logged in, go to clients
if(sessionStorage.getItem('finsuite_auth')) window.location.href='clientes.html';
</script>
</body>
</html>
