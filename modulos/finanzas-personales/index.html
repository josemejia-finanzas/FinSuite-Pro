import React,{useState,useMemo,useEffect,useRef} from 'react';
import {createRoot} from 'react-dom/client';
import {PieChart,Pie,Cell,Tooltip,ResponsiveContainer,Legend,BarChart,Bar,XAxis,YAxis,CartesianGrid} from 'recharts';

const COP=v=>new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP',minimumFractionDigits:0,maximumFractionDigits:0}).format(v||0);
const PCT=(v,d=1)=>new Intl.NumberFormat('es-CO',{minimumFractionDigits:0,maximumFractionDigits:d}).format(v||0);

function MoneyInput({value,onChange,style={}}){
  const [f,setF]=useState(false);const [r,setR]=useState('');
  return <input className="ni" style={{textAlign:'right',...style}}
    value={f?r:(value===0?'':new Intl.NumberFormat('es-CO').format(value))}
    onChange={e=>{const d=e.target.value.replace(/[^\d]/g,'');setR(d);onChange(d===''?0:parseInt(d,10));}}
    onFocus={()=>{setF(true);setR(value===0?'':String(value));}} onBlur={()=>setF(false)}
    placeholder="0" inputMode="numeric"/>;
}
function TextInput({value,onChange}){
  return <input className="ni" style={{flex:1,minWidth:0}} value={value} onChange={e=>onChange(e.target.value)} placeholder="Concepto..."/>;
}

function SectionCard({title,color,bg,icon,rows,onAdd,onDel,onNom,onVal,total_label}){
  const total=rows.reduce((a,b)=>a+b.valor,0);
  return <div className="card" style={{marginBottom:'1rem'}}>
    <div className="section-hdr">
      <div style={{width:34,height:34,borderRadius:10,background:bg,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>{icon}</div>
      <div className="fs" style={{fontSize:'.85rem',fontWeight:700,color:'#0f172a'}}>{title}</div>
    </div>
    <div className="section-body">
      <div style={{display:'flex',gap:'.5rem',marginBottom:'.4rem'}}>
        <span className="col-hdr" style={{flex:1}}>Concepto</span>
        <span className="col-hdr" style={{width:130,textAlign:'right'}}>Monto mensual</span>
        <span style={{width:34}}></span>
      </div>
      {rows.map(r=><div key={r.id} className="row-wrap">
        <TextInput value={r.nombre} onChange={v=>onNom(r.id,v)}/>
        <MoneyInput value={r.valor} onChange={v=>onVal(r.id,v)} style={{width:130}}/>
        <button className="del" onClick={()=>onDel(r.id)}><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg></button>
      </div>)}
      <button className="add-row" onClick={onAdd}><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Agregar fila</button>
      <div className="total-row">
        <span style={{fontSize:'.82rem',fontWeight:600,color:'#64748b'}}>{total_label}</span>
        <span className="fs" style={{fontSize:'1.05rem',fontWeight:800,color}}>{COP(total)}</span>
      </div>
    </div>
  </div>;
}

// ── Generadores de Informe ─────────────────────────────────────────────────────



function pdfClientBlock(doc,client,user){
  const W=doc.internal.pageSize.getWidth();const M=14;
  const y0=43;const bh=36;
  // Background
  doc.setFillColor(248,250,252);doc.roundedRect(M,y0,W-M*2,bh,3,3,'F');
  doc.setDrawColor(220,228,240);doc.setLineWidth(.4);doc.roundedRect(M,y0,W-M*2,bh,3,3,'S');
  // Accent left bar
  doc.setFillColor(37,99,235);doc.roundedRect(M,y0,3,bh,1.5,1.5,'F');
  // CLIENTE label
  doc.setFont('helvetica','normal');doc.setFontSize(6.5);doc.setTextColor(148,163,184);
  doc.text('CLIENTE',M+8,y0+7);
  // Name
  doc.setFont('helvetica','bold');doc.setFontSize(10.5);doc.setTextColor(15,23,42);
  const nombre=(client?.nombre||'Sin cliente');
  const maxW=(W-M*2)/2-16;
  const nameTxt=doc.splitTextToSize(nombre,maxW)[0]||nombre;
  doc.text(nameTxt,M+8,y0+15);
  // Company + type
  const sub2=[];
  if(client?.empresa)sub2.push(client.empresa);
  if(client?.tipo)sub2.push(client.tipo);
  if(sub2.length){
    doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(100,116,139);
    doc.text(sub2.join(' · '),M+8,y0+22);
  }
  // ID
  if(client?.tipoDoc&&client?.numeroDoc){
    const lbl=client.tipoDoc==='Cédula de Ciudadanía'?'CC':client.tipoDoc==='NIT'?'NIT':client.tipoDoc;
    doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(71,85,105);
    doc.text(lbl+': '+client.numeroDoc,M+8,y0+29);
  }
  // Divider
  const midX=W/2;
  doc.setDrawColor(226,232,240);doc.setLineWidth(.3);
  doc.line(midX,y0+6,midX,y0+bh-6);
  // Right column
  const rx=midX+8;let ry=y0+9;
  const rItems=[];
  if(client?.email)rItems.push('Email: '+client.email);
  if(client?.celular||client?.telefono)rItems.push('Tel: '+(client.celular||client.telefono));
  if(client?.ciudad)rItems.push('Ciudad: '+client.ciudad);
  if(client?.direccion)rItems.push('Dir: '+client.direccion);
  doc.setFont('helvetica','normal');doc.setFontSize(7.5);doc.setTextColor(100,116,139);
  const maxRW=W-midX-M-12;
  rItems.forEach(item=>{
    if(ry<y0+bh-5){
      const short=doc.splitTextToSize(item,maxRW)[0]||item;
      doc.text(short,rx,ry);ry+=5.8;
    }
  });
  // Asesor bottom right - with enough padding from border
  doc.setFont('helvetica','italic');doc.setFontSize(7);doc.setTextColor(148,163,184);
  doc.text('Asesor: '+(user?.nombre||'No especificado'),W-M-5,y0+bh-7,{align:'right'});
  return y0+bh+10;
}

  // ID
  if(client?.tipoDoc&&client?.numeroDoc){
    const lbl=client.tipoDoc==='Cédula de Ciudadanía'?'CC':client.tipoDoc==='NIT'?'NIT':client.tipoDoc;
    doc.setFont('helvetica','bold');doc.setFontSize(7.5);doc.setTextColor(71,85,105);
    doc.text(lbl+': '+client.numeroDoc,M+5,y0+25);
  }
  // Right column
  const rx=W/2+2;let ry=y0+6;
  const rItems=[];
  if(client?.email)rItems.push('Email: '+client.email);
  if(client?.celular||client?.telefono)rItems.push('Tel: '+(client.celular||client.telefono));
  if(client?.ciudad)rItems.push('Ciudad: '+client.ciudad);
  if(client?.direccion)rItems.push('Dir: '+client.direccion);
  doc.setFont('helvetica','normal');doc.setFontSize(7.5);doc.setTextColor(100,116,139);
  rItems.forEach(item=>{
    if(ry<y0+h-4){doc.text(item,rx,ry);ry+=5.2;}
  });
  // Asesor + date
  doc.setFont('helvetica','italic');doc.setFontSize(7);doc.setTextColor(148,163,184);
  doc.text('Asesor: '+(user?.nombre||'No especificado'),W-M,y0+h-5,{align:'right'});
  return y0+h+8;
}
function pdfHeader(doc,titulo){
  const W=doc.internal.pageSize.getWidth();
  doc.setFillColor(15,23,42);doc.rect(0,0,W,36,'F');
  doc.setFillColor(5,150,105);doc.rect(0,36,W,3,'F');
  doc.setFont('helvetica','bold');doc.setFontSize(20);doc.setTextColor(241,245,249);
  doc.text('FinSuite Pro',14,16);
  doc.setFont('helvetica','normal');doc.setFontSize(10);doc.setTextColor(148,163,184);
  doc.text(titulo,14,27);
  doc.text('Generado: '+new Date().toLocaleDateString('es-CO',{day:'2-digit',month:'long',year:'numeric'}),W-14,27,{align:'right'});
}
function pdfFooters(doc){
  const pg=doc.getNumberOfPages();const W=doc.internal.pageSize.getWidth();const H=doc.internal.pageSize.getHeight();
  for(let i=1;i<=pg;i++){
    doc.setPage(i);
    doc.setFillColor(248,250,252);doc.rect(0,H-10,W,10,'F');
    doc.setDrawColor(226,232,240);doc.setLineWidth(.3);doc.line(0,H-10,W,H-10);
    doc.setFont('helvetica','normal');doc.setFontSize(7.5);doc.setTextColor(148,163,184);
    doc.text('FinSuite Pro v1.2 — Suite de Asesoría Financiera',14,H-3.5);
    doc.text('Página '+i+' de '+pg,W-14,H-3.5,{align:'right'});
  }
}
function pdfSection(doc,title,y,rgb){
  if(y>doc.internal.pageSize.getHeight()-50){doc.addPage();y=20;}
  doc.setFont('helvetica','bold');doc.setFontSize(10.5);doc.setTextColor(...rgb);
  doc.text(title,14,y);
  doc.setDrawColor(...rgb);doc.setLineWidth(.3);doc.line(14,y+1.5,doc.internal.pageSize.getWidth()-14,y+1.5);
  return y+9;
}

function generarPDF(d){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF('p','mm','a4');
  const W=doc.internal.pageSize.getWidth();const M=14;
  const tb=(sy,head,body,hc,altFill)=>doc.autoTable({
    startY:sy,head,body,theme:'grid',margin:{left:M,right:M},
    headStyles:{fillColor:hc,textColor:[255,255,255],fontSize:9,fontStyle:'bold'},
    bodyStyles:{fontSize:8.5,textColor:[30,41,59]},
    alternateRowStyles:{fillColor:altFill||[248,250,252]},
    columnStyles:{1:{halign:'right'}},
    didDrawPage:()=>pdfFooters(doc),
  });

  pdfHeader(doc,'Análisis Financiero Personal');
  const _cl=JSON.parse(sessionStorage.getItem('finsuite_current_client')||'null');
  const _usr=JSON.parse(sessionStorage.getItem('finsuite_auth')||'null');
  let y=pdfClientBlock(doc,_cl,_usr);

  // Semáforo
  const sc=d.sem.level===3?[22,163,74]:d.sem.level===2?[161,98,7]:[185,28,28];
  const sb=d.sem.level===3?[220,252,231]:d.sem.level===2?[254,249,195]:[254,226,226];
  doc.setFillColor(...sb);doc.roundedRect(M,y,W-M*2,20,3,3,'F');
  doc.setDrawColor(...sc);doc.setLineWidth(.4);doc.roundedRect(M,y,W-M*2,20,3,3,'S');
  doc.setFont('helvetica','bold');doc.setFontSize(10);doc.setTextColor(...sc);
  doc.text('Salud Financiera: '+d.sem.label.toUpperCase(),M+5,y+8);
  doc.setFont('helvetica','normal');doc.setFontSize(8.5);
  doc.text(doc.splitTextToSize(d.sem.msg,W-M*2-10),M+5,y+15);
  y+=28;

  // KPIs 2x2
  const kpis=[
    {l:'Flujo de Caja Mensual',v:COP(d.flujo),ok:d.flujo>=0},
    {l:'Patrimonio Neto',v:COP(d.patrim),ok:d.patrim>=0},
    {l:'Ratio de Endeudamiento',v:PCT(d.rd)+'%',ok:d.rd<50},
    {l:'Capacidad de Ahorro',v:PCT(d.ca)+'%',ok:d.ca>=10},
  ];
  const kW=(W-M*2-5)/2;
  kpis.forEach((k,i)=>{
    const kx=M+(i%2)*(kW+5);const ky=y+Math.floor(i/2)*23;
    doc.setFillColor(k.ok?240:255,k.ok?253:241,k.ok?244:242);
    doc.roundedRect(kx,ky,kW,19,2,2,'F');
    doc.setFont('helvetica','normal');doc.setFontSize(7);doc.setTextColor(100,116,139);
    doc.text(k.l.toUpperCase(),kx+5,ky+6.5);
    doc.setFont('helvetica','bold');doc.setFontSize(12);
    doc.setTextColor(k.ok?21:153,k.ok?128:27,k.ok?61:27);
    doc.text(k.v,kx+5,ky+15);
  });
  y+=54;

  y=pdfSection(doc,'INGRESOS MENSUALES',y,[5,150,105]);
  tb(y,[['Concepto','Monto COP']],[...d.ing.map(r=>[r.nombre,COP(r.valor)]),['TOTAL INGRESOS',COP(d.tI)]]  ,[5,150,105],[240,253,244]);
  y=doc.lastAutoTable.finalY+10;

  y=pdfSection(doc,'GASTOS FIJOS',y,[220,38,38]);
  tb(y,[['Concepto','Monto COP']],[...d.fij.map(r=>[r.nombre,COP(r.valor)]),['TOTAL FIJOS',COP(d.tF)]]  ,[220,38,38],[255,241,242]);
  y=doc.lastAutoTable.finalY+10;

  y=pdfSection(doc,'GASTOS VARIABLES',y,[234,88,12]);
  tb(y,[['Concepto','Monto COP']],[...d.var_.map(r=>[r.nombre,COP(r.valor)]),['TOTAL VARIABLES',COP(d.tV)]]  ,[234,88,12],[255,247,237]);
  y=doc.lastAutoTable.finalY+10;

  y=pdfSection(doc,'BALANCE PATRIMONIAL',y,[8,145,178]);
  const maxLen=Math.max(d.act.length,d.pas.length);
  const balBody=Array.from({length:maxLen},(_,i)=>[d.act[i]?.nombre||'',d.act[i]?COP(d.act[i].valor):'',d.pas[i]?.nombre||'',d.pas[i]?COP(d.pas[i].valor):'']);
  balBody.push(['TOTAL ACTIVOS',COP(d.tA),'TOTAL PASIVOS',COP(d.tP)]);
  balBody.push(['PATRIMONIO NETO',COP(d.patrim),'','']);
  doc.autoTable({
    startY:y,head:[['Activo','Valor COP','Pasivo','Valor COP']],body:balBody,
    theme:'grid',margin:{left:M,right:M},
    headStyles:{fillColor:[8,145,178],textColor:[255,255,255],fontSize:9,fontStyle:'bold'},
    bodyStyles:{fontSize:8.5,textColor:[30,41,59]},
    alternateRowStyles:{fillColor:[236,254,255]},
    columnStyles:{1:{halign:'right'},3:{halign:'right'}},
    didDrawPage:()=>pdfFooters(doc),
  });
  y=doc.lastAutoTable.finalY+10;

  if(d.rec.length){
    y=pdfSection(doc,'RECOMENDACIONES',y,[37,99,235]);
    doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(30,41,59);
    d.rec.forEach((r,i)=>{
      if(y>doc.internal.pageSize.getHeight()-25){doc.addPage();y=20;}
      const lines=doc.splitTextToSize((i+1)+'. '+r,W-M*2-6);
      doc.text(lines,M+4,y);y+=lines.length*5.5+3;
    });
  }

  pdfFooters(doc);
  const _fpdf=(_cl?.nombre?_cl.nombre.replace(/[^a-zA-Z0-9]/g,'-').toLowerCase()+'-':'')+'analisis-financiero-personal';
doc.save(_fpdf+'.pdf');
}

function generarExcel(d){const _cl_xls=JSON.parse(sessionStorage.getItem('finsuite_current_client')||'null');const _usr_xls=JSON.parse(sessionStorage.getItem('finsuite_auth')||'null');
  const XLSX=window.XLSX;const wb=XLSX.utils.book_new();
  const n=v=>Number(v)||0;
  const mk=(rows,hdr)=>{
    const ws=XLSX.utils.aoa_to_sheet([[hdr,'Monto (COP)'],...rows.map(r=>[r.nombre,n(r.valor)]),['TOTAL',rows.reduce((a,b)=>a+b.valor,0)]]);
    ws['!cols']=[{wch:40},{wch:20}];return ws;
  };
  const wsRes=XLSX.utils.aoa_to_sheet([
    ['ANÁLISIS FINANCIERO PERSONAL — FinSuite Pro v1.2'],
    ['Fecha de generación',new Date().toLocaleDateString('es-CO')],
    [''],
    ['DATOS DEL CLIENTE',''],
    ['Nombre',_cl_xls?.nombre||'No especificado'],
    [(_cl_xls?.tipoDoc||'Documento'),_cl_xls?.numeroDoc||'—'],
    ['Empresa',_cl_xls?.empresa||'—'],
    ['Email',_cl_xls?.email||'—'],
    ['Teléfono',_cl_xls?.celular||_cl_xls?.telefono||'—'],
    ['Ciudad',_cl_xls?.ciudad||'—'],
    [''],
    ['Asesor que genera',_usr_xls?.nombre||'—'],
    [''],['INDICADORES CLAVE',''],
    ['Flujo de Caja Mensual',n(d.flujo)],['Patrimonio Neto',n(d.patrim)],
    ['Total Ingresos',n(d.tI)],['Total Gastos Fijos',n(d.tF)],['Total Gastos Variables',n(d.tV)],
    ['Total Activos',n(d.tA)],['Total Pasivos',n(d.tP)],
    ['Ratio Endeudamiento (%)',Math.round(d.rd*10)/10],['Capacidad de Ahorro (%)',Math.round(d.ca*10)/10],
    [''],['DIAGNÓSTICO',d.sem.label],['Observación',d.sem.msg],
  ]);
  wsRes['!cols']=[{wch:35},{wch:20}];
  XLSX.utils.book_append_sheet(wb,wsRes,'Resumen');
  XLSX.utils.book_append_sheet(wb,mk(d.ing,'Concepto'),'Ingresos');
  XLSX.utils.book_append_sheet(wb,mk(d.fij,'Concepto'),'Gastos_Fijos');
  XLSX.utils.book_append_sheet(wb,mk(d.var_,'Concepto'),'Gastos_Variables');
  const apData=[['Activo','Valor COP','Pasivo','Valor COP']];
  for(let i=0;i<Math.max(d.act.length,d.pas.length);i++) apData.push([d.act[i]?.nombre||'',n(d.act[i]?.valor),d.pas[i]?.nombre||'',n(d.pas[i]?.valor)]);
  apData.push(['Total Activos',n(d.tA),'Total Pasivos',n(d.tP)],['Patrimonio Neto',n(d.patrim),'','']);
  const wsAP=XLSX.utils.aoa_to_sheet(apData);wsAP['!cols']=[{wch:35},{wch:20},{wch:35},{wch:20}];
  XLSX.utils.book_append_sheet(wb,wsAP,'Activos_Pasivos');
  const _fname_xls=(_cl_xls?.nombre?_cl_xls.nombre.replace(/[^a-zA-Z0-9]/g,'-').toLowerCase()+'-':'') + 'analisis-financiero-personal';
XLSX.writeFile(wb,_fname_xls+'.xlsx');
}

// ── App ───────────────────────────────────────────────────────────────────────
let uid=10;const nid=()=>++uid;
function App(){
  const DEF_ING=[{id:1,nombre:'Salario neto',valor:4500000},{id:2,nombre:'Ingresos extra / freelance',valor:800000}];
  const DEF_FIJ=[{id:3,nombre:'Arriendo / cuota hipotecaria',valor:1200000},{id:4,nombre:'Servicios públicos',valor:250000},{id:5,nombre:'Internet y telefonía',valor:120000},{id:6,nombre:'Seguro de salud',valor:180000}];
  const DEF_VAR=[{id:7,nombre:'Alimentación y mercado',valor:600000},{id:8,nombre:'Transporte',valor:200000},{id:9,nombre:'Entretenimiento',valor:150000},{id:10,nombre:'Ropa y cuidado personal',valor:100000}];
  const DEF_ACT=[{id:11,nombre:'Cuenta de ahorros / CDTs',valor:8000000},{id:12,nombre:'Vehículo',valor:25000000}];
  const DEF_PAS=[{id:13,nombre:'Tarjeta de crédito',valor:3500000},{id:14,nombre:'Crédito de consumo',valor:8000000}];
  const [ing,setIng]=useState(DEF_ING);
  const [fij,setFij]=useState(DEF_FIJ);
  const [var_,setVar]=useState(DEF_VAR);
  const [act,setAct]=useState(DEF_ACT);
  const [pas,setPas]=useState(DEF_PAS);
  const [gen,setGen]=useState('');
  const [client,setClient]=useState(null);
  const [saved,setSaved]=useState(false);
  const ready=useRef(false);

  useEffect(()=>{
    const c=JSON.parse(sessionStorage.getItem('finsuite_current_client')||'null');
    setClient(c);
    if(c){
      const raw=localStorage.getItem('finsuite_'+c.id+'_finanzas');
      if(raw){
        try{const d=JSON.parse(raw);setIng(d.ingresos||DEF_ING);setFij(d.fijos||DEF_FIJ);setVar(d.variables||DEF_VAR);setAct(d.activos||DEF_ACT);setPas(d.pasivos||DEF_PAS);}catch(e){}
      }
    }
    setTimeout(()=>{ ready.current=true; },100);
  },[]);

  useEffect(()=>{
    if(!ready.current) return;
    const c=JSON.parse(sessionStorage.getItem('finsuite_current_client')||'null');
    if(!c) return;
    const t=setTimeout(()=>{
      localStorage.setItem('finsuite_'+c.id+'_finanzas',JSON.stringify({ingresos:ing,fijos:fij,variables:var_,activos:act,pasivos:pas}));
      // Update client updatedAt
      try{const cls=JSON.parse(localStorage.getItem('finsuite_clients')||'[]');const idx=cls.findIndex(x=>x.id===c.id);if(idx>=0){cls[idx].updatedAt=new Date().toISOString();localStorage.setItem('finsuite_clients',JSON.stringify(cls));}}catch(e){}
      setSaved(true);setTimeout(()=>setSaved(false),2000);
    },600);
    return ()=>clearTimeout(t);
  },[ing,fij,var_,act,pas]);

  const mkA=(s,n)=>()=>s(a=>[...a,{id:nid(),nombre:n,valor:0}]);
  const mkD=s=>id=>s(a=>a.filter(x=>x.id!==id));
  const mkN=s=>(id,v)=>s(a=>a.map(x=>x.id===id?{...x,nombre:v}:x));
  const mkV=s=>(id,v)=>s(a=>a.map(x=>x.id===id?{...x,valor:v}:x));

  const sum=a=>a.reduce((s,x)=>s+x.valor,0);
  const tI=sum(ing),tF=sum(fij),tV=sum(var_),tG=tF+tV,tA=sum(act),tP=sum(pas);
  const flujo=tI-tG,patrim=tA-tP,rd=tI>0?(tG/tI)*100:0,ca=tI>0?(flujo/tI)*100:0;

  const sem=useMemo(()=>{
    if(rd<50&&ca>=20) return{level:3,label:'Excelente',color:'#15803d',bg:'#dcfce7',border:'#86efac',msg:'Tu flujo de caja es sólido. Considera diversificar inversiones para maximizar tu patrimonio.'};
    if(rd<70) return{level:2,label:'Moderada',color:'#92400e',bg:'#fef9c3',border:'#fde047',msg:'Tus gastos superan el 50% del ingreso. Revisa gastos variables y compromisos fijos.'};
    return{level:1,label:'En riesgo',color:'#991b1b',bg:'#fee2e2',border:'#fca5a5',msg:'Tus gastos igualan o superan tus ingresos. Toma acción para evitar endeudamiento.'};
  },[rd,ca]);

  const rec=[];
  if(ca<10) rec.push('Revisa gastos variables: son los más fáciles de recortar sin afectar calidad de vida.');
  if(rd>60) rec.push('Ratio de endeudamiento alto. Evalúa consolidar deudas a una tasa menor.');
  if(ca>=20) rec.push('Gran capacidad de ahorro. Considera CDTs, fondos de inversión o ETFs.');
  if(patrim>0) rec.push('Patrimonio neto positivo: activos superan pasivos. ¡Mantén esa tendencia!');
  if(patrim<0) rec.push('Patrimonio neto negativo. Prioriza reducir deudas de alto costo.');
  if(tG>0) rec.push('Fondo de emergencia recomendado (3 meses): '+COP(tG*3)+'.');

  const pieData=[{name:'G.Fijos',value:tF,color:'#ef4444'},{name:'G.Variables',value:tV,color:'#f97316'},{name:'Ahorro',value:Math.max(0,flujo),color:'#22c55e'}].filter(x=>x.value>0);
  const barData=[{name:'Ingresos',val:tI,fill:'#22c55e'},{name:'G.Fijos',val:tF,fill:'#ef4444'},{name:'G.Var.',val:tV,fill:'#f97316'},{name:'Flujo',val:Math.abs(flujo),fill:flujo>=0?'#2563eb':'#dc2626'}];

  const dPDF=()=>{setGen('pdf');setTimeout(()=>{generarPDF({ing,fij,var_,act,pas,tI,tF,tV,tA,tP,flujo,patrim,rd,ca,sem,rec});setGen('');},50);};
  const dXLS=()=>generarExcel({ing,fij,var_,act,pas,tI,tF,tV,tA,tP,flujo,patrim,rd,ca,sem,rec});

  const icon=(path)=><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" dangerouslySetInnerHTML={{__html:path}}/>;

  return <div style={{maxWidth:1200,margin:'0 auto',padding:'1.5rem'}}>
    {/* PAGE HEADER */}
    <div style={{marginBottom:'1.5rem',display:'flex',alignItems:'center',gap:'1rem',flexWrap:'wrap'}}>
      <div style={{background:'#ecfdf5',padding:'.75rem',borderRadius:14,border:'1px solid #a7f3d0'}}>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#059669" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      </div>
      <div style={{flex:1,minWidth:0}}>
        <h1 className="fs" style={{fontSize:'1.3rem',fontWeight:800,color:'#0f172a',margin:0}}>Análisis Financiero Personal</h1>
        <p style={{color:'#64748b',fontSize:'.84rem',margin:0}}>{client?<><strong style={{color:'#059669'}}>{client.nombre}</strong> — Diagnóstico financiero</>:'Diagnóstico completo de tu salud financiera mensual.'}</p>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:'.5rem',flexShrink:0}}>
          {saved&&<span style={{fontSize:'.75rem',color:'#059669',display:'flex',alignItems:'center',gap:'.3rem'}}><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>Guardado</span>}
        <button className="rpt-btn" style={{background:'linear-gradient(135deg,#dc2626,#b91c1c)',color:'#fff'}} onClick={dPDF} disabled={!!gen}>
          {gen==='pdf'?'Generando...':<><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>Informe PDF</>}
        </button>
        <button className="rpt-btn" style={{background:'linear-gradient(135deg,#059669,#047857)',color:'#fff'}} onClick={dXLS}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
          Exportar Excel
        </button>
      </div>
    </div>

    <div style={{display:'grid',gridTemplateColumns:'1fr 400px',gap:'1.5rem'}}>
      <div>
        <SectionCard title="Ingresos Mensuales" color="#059669" bg="#ecfdf5" icon={<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#059669" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>} rows={ing} onAdd={mkA(setIng,'Nuevo ingreso')} onDel={mkD(setIng)} onNom={mkN(setIng)} onVal={mkV(setIng)} total_label="Total ingresos"/>
        <SectionCard title="Gastos Fijos (compromisos recurrentes)" color="#dc2626" bg="#fef2f2" icon={<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>} rows={fij} onAdd={mkA(setFij,'Nuevo gasto fijo')} onDel={mkD(setFij)} onNom={mkN(setFij)} onVal={mkV(setFij)} total_label="Total fijos"/>
        <SectionCard title="Gastos Variables (discrecionales)" color="#ea580c" bg="#fff7ed" icon={<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ea580c" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>} rows={var_} onAdd={mkA(setVar,'Nuevo gasto variable')} onDel={mkD(setVar)} onNom={mkN(setVar)} onVal={mkV(setVar)} total_label="Total variables"/>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'1rem'}}>
          <SectionCard title="Activos" color="#0891b2" bg="#ecfeff" icon={<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#0891b2" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>} rows={act} onAdd={mkA(setAct,'Nuevo activo')} onDel={mkD(setAct)} onNom={mkN(setAct)} onVal={mkV(setAct)} total_label="Total activos"/>
          <SectionCard title="Pasivos" color="#7c3aed" bg="#f5f3ff" icon={<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#7c3aed" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>} rows={pas} onAdd={mkA(setPas,'Nuevo pasivo')} onDel={mkD(setPas)} onNom={mkN(setPas)} onVal={mkV(setPas)} total_label="Total pasivos"/>
        </div>
      </div>

      <div style={{position:'sticky',top:'62px',display:'flex',flexDirection:'column',gap:'1rem'}}>
        <div style={{borderRadius:14,padding:'1.1rem 1.4rem',background:sem.bg,border:'1.5px solid '+sem.border}}>
          <div style={{display:'flex',alignItems:'center',gap:'.6rem',marginBottom:'.4rem'}}>
            <div style={{width:10,height:10,borderRadius:'50%',background:sem.color,boxShadow:'0 0 6px '+sem.color}}></div>
            <span className="fs" style={{fontSize:'.9rem',fontWeight:800,color:sem.color}}>Salud Financiera {sem.label}</span>
          </div>
          <p style={{fontSize:'.82rem',color:sem.color,margin:0,lineHeight:1.55,opacity:.85}}>{sem.msg}</p>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'.75rem'}}>
          {[{l:'Flujo de Caja',v:COP(flujo),ok:flujo>=0,bg:flujo>=0?'#f0fdf4':'#fff1f2',bdr:flujo>=0?'#86efac':'#fca5a5',c:flujo>=0?'#15803d':'#991b1b',s:'Ingresos − Gastos'},
            {l:'Patrimonio Neto',v:COP(patrim),ok:patrim>=0,bg:patrim>=0?'#eff6ff':'#fff1f2',bdr:patrim>=0?'#93c5fd':'#fca5a5',c:patrim>=0?'#1d4ed8':'#991b1b',s:'Activos − Pasivos'},
            {l:'Endeudamiento',v:PCT(rd)+'%',ok:rd<50,bg:'#fffbeb',bdr:'#fde68a',c:rd<50?'#15803d':rd<70?'#92400e':'#991b1b',s:'Gastos / Ingresos'},
            {l:'Cap. Ahorro',v:PCT(ca)+'%',ok:ca>=10,bg:'#f5f3ff',bdr:'#c4b5fd',c:'#6d28d9',s:'Excedente / Ingresos'},
          ].map(k=><div key={k.l} style={{borderRadius:14,padding:'1.1rem 1.25rem',background:k.bg,border:'1.5px solid '+k.bdr}}>
            <div style={{fontSize:'.7rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'.08em',color:'#64748b',marginBottom:'.3rem'}}>{k.l}</div>
            <div className="fs" style={{fontSize:'1.25rem',fontWeight:800,color:k.c}}>{k.v}</div>
            <div style={{fontSize:'.72rem',color:'#94a3b8',marginTop:'.2rem'}}>{k.s}</div>
          </div>)}
        </div>
        {tI>0&&<div className="card" style={{padding:'1.1rem 1.3rem'}}>
          <div className="fs" style={{fontSize:'.75rem',fontWeight:700,color:'#374151',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:'.75rem'}}>Resumen mensual</div>
          <ResponsiveContainer width="100%" height={145}><BarChart data={barData} margin={{top:0,right:5,left:0,bottom:0}}><CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9"/><XAxis dataKey="name" tick={{fontSize:10,fill:'#94a3b8'}} axisLine={false} tickLine={false}/><YAxis tickFormatter={v=>`${(v/1e6).toFixed(1)}M`} tick={{fontSize:10,fill:'#94a3b8'}} axisLine={false} tickLine={false} width={36}/><Tooltip formatter={v=>COP(v)} cursor={{fill:'rgba(0,0,0,.04)'}}/><Bar dataKey="val" name="Monto" radius={[5,5,0,0]}>{barData.map((e,i)=><Cell key={i} fill={e.fill}/>)}</Bar></BarChart></ResponsiveContainer>
        </div>}
        {pieData.length>0&&<div className="card" style={{padding:'1.1rem 1.3rem'}}>
          <div className="fs" style={{fontSize:'.75rem',fontWeight:700,color:'#374151',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:'.5rem'}}>Distribución del ingreso</div>
          <ResponsiveContainer width="100%" height={160}><PieChart><Pie data={pieData} dataKey="value" nameKey="name" cx="50%" cy="50%" outerRadius={62} innerRadius={36} paddingAngle={3}>{pieData.map((e,i)=><Cell key={i} fill={e.color}/>)}</Pie><Tooltip formatter={v=>COP(v)}/><Legend formatter={v=><span style={{fontSize:'.73rem',color:'#374151'}}>{v}</span>}/></PieChart></ResponsiveContainer>
        </div>}
        {rec.length>0&&<div className="card" style={{padding:'1.1rem 1.3rem',background:'#f8fafc'}}>
          <div className="fs" style={{fontSize:'.75rem',fontWeight:700,color:'#374151',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:'.75rem'}}>Recomendaciones</div>
          {rec.map((r,i)=><div key={i} style={{display:'flex',gap:'.6rem',marginBottom:'.5rem'}}><div style={{width:6,height:6,borderRadius:'50%',background:'#059669',marginTop:5,flexShrink:0}}></div><p style={{margin:0,fontSize:'.82rem',color:'#374151',lineHeight:1.55}}>{r}</p></div>)}
        </div>}
      </div>
    </div>
  </div>;
}
createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>if(!sessionStorage.getItem('finsuite_auth'))window.location.href='../../index.html';if(!sessionStorage.getItem('finsuite_current_client'))window.location.href='../../clientes.html';</script>
</body>
</html>
