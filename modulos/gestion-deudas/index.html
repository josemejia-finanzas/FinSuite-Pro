const COP=v=>new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP',minimumFractionDigits:0,maximumFractionDigits:0}).format(v||0);
const N=(v,d=1)=>new Intl.NumberFormat('es-CO',{minimumFractionDigits:0,maximumFractionDigits:d}).format(v||0);
const COLORS=['#ef4444','#f97316','#eab308','#22c55e','#06b6d4','#8b5cf6','#ec4899','#14b8a6'];

// ── Simulation engine ─────────────────────────────────────────────────────────
function simularCompleto(deudasOrig,pool,estr){
  if(!deudasOrig.length||pool<=0) return null;
  const sorted=[...deudasOrig].sort((a,b)=>estr==='snowball'?a.saldo-b.saldo:b.tasa-a.tasa);
  const st=sorted.map(d=>({...d,saldoAct:d.saldo,intTotal:0,pagTotal:0,mesLiq:null,numPagos:0}));
  let mes=0;
  while(st.some(s=>s.saldoAct>0.5)&&mes<600){
    mes++;
    let rem=pool;
    // pay minimums
    for(const d of st){
      if(d.saldoAct<=0.5) continue;
      const int=d.saldoAct*d.tasa/100/12;
      const due=d.saldoAct+int;
      const pago=Math.min(due,Math.min(d.minimo,rem));
      d.saldoAct=Math.max(0,due-pago);
      d.intTotal+=int;d.pagTotal+=pago;d.numPagos++;rem-=pago;
      if(d.saldoAct<=0.5&&!d.mesLiq) d.mesLiq=mes;
    }
    // extra to first active
    for(const d of st){
      if(d.saldoAct>0.5&&rem>0){
        const pago=Math.min(d.saldoAct,rem);
        d.saldoAct-=pago;d.pagTotal+=pago;rem-=pago;
        if(d.saldoAct<=0.5&&!d.mesLiq) d.mesLiq=mes;
        break;
      }
    }
  }
  return st.map(d=>({id:d.id,nombre:d.nombre,tasa:d.tasa,minimo:d.minimo,saldoInicial:d.saldo,mesLiq:d.mesLiq||mes,intTotal:Math.round(d.intTotal),pagTotal:Math.round(d.pagTotal),numPagos:d.numPagos}));
}

function simularResumen(deudasOrig,pool){
  if(!deudasOrig.length||pool<=0) return{meses:0,totalIntereses:0};
  const st=deudasOrig.map(d=>({...d,saldoAct:d.saldo,intTotal:0}));
  let mes=0;
  while(st.some(s=>s.saldoAct>0.5)&&mes<600){
    mes++;let rem=pool;
    for(const d of st){if(d.saldoAct<=0.5)continue;const int=d.saldoAct*d.tasa/100/12;const due=d.saldoAct+int;const pago=Math.min(due,Math.min(d.minimo,rem));d.saldoAct=Math.max(0,due-pago);d.intTotal+=int;rem-=pago;}
    for(const d of st){if(d.saldoAct>0.5&&rem>0){const p=Math.min(d.saldoAct,rem);d.saldoAct-=p;rem-=p;break;}}
  }
  return{meses:mes,totalIntereses:Math.round(st.reduce((a,d)=>a+d.intTotal,0))};
}

// Only minimums scenario (no extra)
function simularMinimos(deudasOrig){
  if(!deudasOrig.length) return{meses:0,totalIntereses:0};
  const pool=deudasOrig.reduce((a,b)=>a+b.minimo,0);
  const st=deudasOrig.map(d=>({...d,saldoAct:d.saldo,intTotal:0}));
  let mes=0;
  while(st.some(s=>s.saldoAct>0.5)&&mes<600){
    mes++;let rem=pool;
    for(const d of st){if(d.saldoAct<=0.5)continue;const int=d.saldoAct*d.tasa/100/12;const due=d.saldoAct+int;const pago=Math.min(due,Math.min(d.minimo,rem));d.saldoAct=Math.max(0,due-pago);d.intTotal+=int;rem-=pago;}
  }
  return{meses:mes,totalIntereses:Math.round(st.reduce((a,d)=>a+d.intTotal,0))};
}

// ── PDF helper ────────────────────────────────────────────────────────────────
function pdfClientBlock(doc,client,user){
  const W=doc.internal.pageSize.getWidth();const M=14;const y0=43;const bh=36;
  doc.setFillColor(248,250,252);doc.roundedRect(M,y0,W-M*2,bh,3,3,'F');doc.setDrawColor(220,228,240);doc.setLineWidth(.4);doc.roundedRect(M,y0,W-M*2,bh,3,3,'S');
  doc.setFillColor(217,119,6);doc.roundedRect(M,y0,3,bh,1.5,1.5,'F');
  doc.setFont('helvetica','normal');doc.setFontSize(6.5);doc.setTextColor(148,163,184);doc.text('CLIENTE',M+8,y0+7);
  doc.setFont('helvetica','bold');doc.setFontSize(10.5);doc.setTextColor(15,23,42);doc.text((client?.nombre||'Sin cliente'),M+8,y0+15);
  const sub2=[];if(client?.empresa)sub2.push(client.empresa);if(client?.tipo)sub2.push(client.tipo);
  if(sub2.length){doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(100,116,139);doc.text(sub2.join(' · '),M+8,y0+22);}
  if(client?.tipoDoc&&client?.numeroDoc){const lbl=client.tipoDoc==='Cédula de Ciudadanía'?'CC':client.tipoDoc==='NIT'?'NIT':client.tipoDoc;doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(71,85,105);doc.text(lbl+': '+client.numeroDoc,M+8,y0+29);}
  const midX=W/2;doc.setDrawColor(226,232,240);doc.setLineWidth(.3);doc.line(midX,y0+6,midX,y0+bh-6);
  const rx=midX+8;let ry=y0+9;const rItems=[];
  if(client?.email)rItems.push('Email: '+client.email);
  if(client?.celular||client?.telefono)rItems.push('Tel: '+(client.celular||client.telefono));
  if(client?.ciudad)rItems.push('Ciudad: '+client.ciudad);
  doc.setFont('helvetica','normal');doc.setFontSize(7.5);doc.setTextColor(100,116,139);
  rItems.forEach(item=>{if(ry<y0+bh-5){doc.text(item,rx,ry);ry+=5.8;}});
  doc.setFont('helvetica','italic');doc.setFontSize(7);doc.setTextColor(148,163,184);doc.text('Asesor: '+(user?.nombre||'No especificado'),W-M-5,y0+bh-7,{align:'right'});
  return y0+bh+10;
}

function generarPDF(d){
  const {jsPDF}=window.jspdf;const doc=new jsPDF('p','mm','a4');const M=14;const W=doc.internal.pageSize.getWidth();const H=doc.internal.pageSize.getHeight();
  const _cl=JSON.parse(sessionStorage.getItem('finsuite_current_client')||'null');
  const _usr=JSON.parse(sessionStorage.getItem('finsuite_auth')||'null');
  const ftrs=()=>{const pg=doc.getNumberOfPages();for(let i=1;i<=pg;i++){doc.setPage(i);doc.setFillColor(248,250,252);doc.rect(0,H-10,W,10,'F');doc.setDrawColor(226,232,240);doc.setLineWidth(.3);doc.line(0,H-10,W,H-10);doc.setFont('helvetica','normal');doc.setFontSize(7.5);doc.setTextColor(148,163,184);doc.text('FinSuite Pro v1.2 — Estrategia de Gestion de Deudas',M,H-3.5);doc.text('Pag. '+i+' de '+pg,W-M,H-3.5,{align:'right'});}};

  doc.text('Generado: '+new Date().toLocaleDateString('es-CO',{day:'2-digit',month:'long',year:'numeric'}),W-M,27,{align:'right'});
  let y=pdfClientBlock(doc,_cl,_usr);
  // Resumen deudas
  doc.autoTable({startY:y,head:[['Deuda','Saldo Actual','Tasa EA','Cuota Minima']],body:[...d.deudas.map(dd=>[dd.nombre,COP(dd.saldo),N(dd.tasa,1)+'%',COP(dd.minimo)]),['TOTALES',COP(d.deudas.reduce((a,b)=>a+b.saldo,0)),'—',COP(d.totalMins)]],theme:'grid',margin:{left:M,right:M},headStyles:{fillColor:[217,119,6],textColor:[255,255,255],fontSize:9,fontStyle:'bold'},bodyStyles:{fontSize:8.5},alternateRowStyles:{fillColor:[255,251,235]},columnStyles:{1:{halign:'right'},2:{halign:'center'},3:{halign:'right'}},didDrawPage:()=>ftrs()});
  y=doc.lastAutoTable.finalY+10;
  // Presupuesto
  doc.autoTable({startY:y,head:[['Presupuesto Mensual','Monto']],body:[['Cuotas minimas',COP(d.totalMins)],['Abono extra',COP(d.extra)],['Total mensual',COP(d.pool)]],theme:'grid',margin:{left:M,right:M},headStyles:{fillColor:[15,118,110],textColor:[255,255,255],fontSize:9,fontStyle:'bold'},bodyStyles:{fontSize:8.5},columnStyles:{1:{halign:'right',fontStyle:'bold'}},didDrawPage:()=>ftrs()});
  y=doc.lastAutoTable.finalY+10;
  // Comparativa
  if(d.snowResult&&d.avalResult){

    y=doc.lastAutoTable.finalY+10;

  // Plan detallado
  if(d.planDetallado){
    doc.setFont('helvetica','bold');doc.setFontSize(10.5);doc.setTextColor(79,70,229);if(y>H-60){doc.addPage();y=20;}
    doc.text('PLAN DE AMORTIZACION DETALLADO — '+d.estrategia.toUpperCase(),M,y);doc.setDrawColor(79,70,229);doc.setLineWidth(.3);doc.line(M,y+1.5,W-M,y+1.5);y+=9;
    doc.autoTable({startY:y,head:[['Prioridad','Deuda','Saldo Inicial','Meses de Ataque','Intereses Pagados','Total Pagado']],body:d.planDetallado.map((dd,i)=>[i+1,dd.nombre,COP(dd.saldoInicial),dd.mesLiq+' meses',COP(dd.intTotal),COP(dd.pagTotal)]),theme:'striped',margin:{left:M,right:M},headStyles:{fillColor:[79,70,229],textColor:[255,255,255],fontSize:8.5,fontStyle:'bold'},bodyStyles:{fontSize:8.5},alternateRowStyles:{fillColor:[245,243,255]},columnStyles:{0:{halign:'center'},2:{halign:'right'},3:{halign:'center'},4:{halign:'right'},5:{halign:'right'}},didDrawPage:()=>ftrs()});
    y=doc.lastAutoTable.finalY+10;
  }
  // Alivios

    doc.autoTable({startY:y,head:[['Evento','Mes','Liberacion Mensual','Acumulado Liberado']],body:d.alivios.map(a=>[a.label,a.mes+' meses',COP(a.liberado),COP(a.acum)]),theme:'grid',margin:{left:M,right:M},headStyles:{fillColor:[5,150,105],textColor:[255,255,255],fontSize:9,fontStyle:'bold'},bodyStyles:{fontSize:8.5},alternateRowStyles:{fillColor:[240,253,244]},columnStyles:{1:{halign:'center'},2:{halign:'right'},3:{halign:'right'}},didDrawPage:()=>ftrs()});
  }
  ftrs();
  const _fn=(_cl?.nombre?_cl.nombre.replace(/[^a-zA-Z0-9]/g,'-').toLowerCase()+'-':'')+'estrategia-gestion-deudas';
  doc.save(_fn+'.pdf');
}

// ── Input components (OUTSIDE App) ───────────────────────────────────────────
function MoneyInput({value,onChange,style={}}){
  const [f,setF]=useState(false);const [r,setR]=useState('');
  return <input className="ni" style={{textAlign:'right',...style}}
    value={f?r:(value===0?'':new Intl.NumberFormat('es-CO').format(value))}
    onChange={e=>{const d=e.target.value.replace(/[^\d]/g,'');setR(d);onChange(d===''?0:parseInt(d,10));}}
    onFocus={()=>{setF(true);setR(value===0?'':String(value));}} onBlur={()=>setF(false)}
    placeholder="0" inputMode="numeric"/>;
}
function RateInput({value,onChange}){
  const [v,setV]=useState(String(value));
  useEffect(()=>setV(String(value)),[value]);
  return <input className="ni" style={{textAlign:'right'}} value={v}
    onChange={e=>{const s=e.target.value.replace(/[^\d.]/g,'');setV(s);onChange(parseFloat(s)||0);}}
    onBlur={()=>setV(String(value))} placeholder="0" inputMode="decimal"/>;
}
function TextInput({value,onChange,style={}}){
  return <input className="ni" style={style} value={value} onChange={e=>onChange(e.target.value)} placeholder="Nombre de la deuda..."/>;
}

  ]);
  const [extra,setExtra]=useState(500000);
  const [estr,setEstr]=useState('avalanche');
  const [gen,setGen]=useState('');
  const [tab,setTab]=useState('estrategia');
  const [client,setClient]=useState(null);
  const [saved,setSaved]=useState(false);
  const ready=useRef(false);

  useEffect(()=>{
    const auth=sessionStorage.getItem('finsuite_auth');
    if(!auth){window.location.href='../../index.html';return;}
    if(!sessionStorage.getItem('finsuite_current_client')){window.location.href='../../clientes.html';return;}
    const cl=JSON.parse(sessionStorage.getItem('finsuite_current_client')||'null');
    setClient(cl);
    if(cl){const raw=localStorage.getItem('finsuite_'+cl.id+'_deudas');if(raw){try{const d=JSON.parse(raw);setDeudas(d.deudas||deudas);setExtra(d.extra||500000);setEstr(d.estr||'avalanche');}catch(e){}}}
    setTimeout(()=>{ready.current=true;},200);
  },[]);

  useEffect(()=>{
    if(!ready.current) return;
    const cl=JSON.parse(sessionStorage.getItem('finsuite_current_client')||'null');
    if(!cl) return;
    const t=setTimeout(()=>{
      localStorage.setItem('finsuite_'+cl.id+'_deudas',JSON.stringify({deudas,extra,estr}));
      try{const cls=JSON.parse(localStorage.getItem('finsuite_clients')||'[]');const idx=cls.findIndex(x=>x.id===cl.id);if(idx>=0){cls[idx].updatedAt=new Date().toISOString();localStorage.setItem('finsuite_clients',JSON.stringify(cls));}}catch(e){}
      setSaved(true);setTimeout(()=>setSaved(false),2000);
    },700);
    return ()=>clearTimeout(t);
  },[deudas,extra,estr]);

  const upd=(id,k,v)=>setDeudas(a=>a.map(d=>d.id===id?{...d,[k]:v}:d));
  const del=id=>setDeudas(a=>a.filter(d=>d.id!==id));
  const add=()=>setDeudas(a=>[...a,{id:nid(),nombre:'Nueva deuda',saldo:0,tasa:20,minimo:0}]);

  const totalMins=useMemo(()=>deudas.reduce((a,b)=>a+b.minimo,0),[deudas]);
  const pool=totalMins+extra;
  const totalDeuda=useMemo(()=>deudas.reduce((a,b)=>a+b.saldo,0),[deudas]);

  const snowResult=useMemo(()=>simularResumen([...deudas].sort((a,b)=>a.saldo-b.saldo),pool),[deudas,pool]);
  const avalResult=useMemo(()=>simularResumen([...deudas].sort((a,b)=>b.tasa-a.tasa),pool),[deudas,pool]);
  const soloMins=useMemo(()=>simularMinimos(deudas),[deudas]);

  const planDetallado=useMemo(()=>simularCompleto(deudas,pool,estr),[deudas,pool,estr]);

  const orden=useMemo(()=>{const a=[...deudas];return estr==='snowball'?a.sort((a,b)=>a.saldo-b.saldo):a.sort((a,b)=>b.tasa-a.tasa);},[deudas,estr]);

  // Financial relief timeline
  const alivios=useMemo(()=>{
    if(!planDetallado) return [];
    const sorted=[...planDetallado].sort((a,b)=>a.mesLiq-b.mesLiq);
    let acum=0;
    return sorted.map(d=>{
      acum+=d.minimo;
      return{label:'Liquida: '+d.nombre,mes:d.mesLiq,liberado:d.minimo,acum};
    });
  },[planDetallado]);

  // vs solo minimos savings
  const ahorroInt=useMemo(()=>{
    const cur=estr==='snowball'?snowResult:avalResult;
    return{intereses:Math.max(0,soloMins.totalIntereses-cur.totalIntereses),meses:Math.max(0,soloMins.meses-cur.meses)};
  },[estr,snowResult,avalResult,soloMins]);

  const barData=[{name:'Bola de Nieve',val:snowResult.totalIntereses},{name:'Avalancha',val:avalResult.totalIntereses}];
  const mejorStr=avalResult.totalIntereses<snowResult.totalIntereses?'Avalancha':'Bola de Nieve';

  const handlePDF=()=>{setGen('pdf');setTimeout(()=>{generarPDF({deudas,totalMins,extra,pool,snowResult,avalResult,soloMins,planDetallado,alivios,estrategia:estr});setGen('');},80);};
  const handleXLS=()=>generarExcel({deudas,totalMins,extra,pool,snowResult,avalResult,soloMins,planDetallado,alivios,estrategia:estr});

  return <div style={{maxWidth:1200,margin:'0 auto',padding:'1.75rem 1.5rem'}}>
    {/* Header */}
    <div style={{display:'flex',alignItems:'center',gap:'1rem',marginBottom:'1.5rem',flexWrap:'wrap'}}>
      <div style={{background:'#fffbeb',padding:'.8rem',borderRadius:15,border:'1px solid #fde68a'}}>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#d97706" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
      </div>
      <div style={{flex:1,minWidth:0}}>
        <h1 className="fs" style={{fontSize:'1.3rem',fontWeight:900,color:'#0f172a',margin:0,letterSpacing:'-.03em'}}>Estrategia de Gestión de Deudas</h1>
        <p style={{color:'#64748b',fontSize:'.84rem',margin:'.15rem 0 0'}}>{client?<><strong style={{color:'#d97706'}}>{client.nombre}</strong> — Plan de liquidación de deudas</>:'Compara estrategias y planifica tu libertad financiera.'}</p>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:'.5rem',flexShrink:0}}>
        {saved&&<span style={{fontSize:'.75rem',color:'#059669',display:'flex',alignItems:'center',gap:'.3rem',fontWeight:600}}><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>Guardado</span>}
        <button className="rpt-btn" style={{background:'linear-gradient(135deg,#dc2626,#b91c1c)',color:'#fff'}} onClick={handlePDF} disabled={!!gen}>
          {gen==='pdf'?'Generando...':<><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>PDF</>}
        </button>
        <button className="rpt-btn" style={{background:'linear-gradient(135deg,#059669,#047857)',color:'#fff'}} onClick={handleXLS}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/></svg>Excel
        </button>
      </div>
    </div>

    {/* Tabs */}
    <div style={{display:'flex',gap:'.5rem',marginBottom:'1.5rem',background:'#fff',borderRadius:13,padding:'.35rem',border:'1.5px solid #e8edf5',boxShadow:'0 1px 4px rgba(15,23,42,.04)',width:'fit-content'}}>
      {[{k:'estrategia',l:'Comparativa de Estrategias'},{k:'plan',l:'Plan de Amortizacion'},{k:'alivio',l:'Alivio Financiero'}].map(t=><button key={t.k} style={{padding:'.5rem 1.1rem',borderRadius:9,border:'none',fontSize:'.82rem',fontWeight:700,cursor:'pointer',fontFamily:'DM Sans,sans-serif',transition:'.18s',background:tab===t.k?'#d97706':'transparent',color:tab===t.k?'#fff':'#6b7280',boxShadow:tab===t.k?'0 2px 8px rgba(217,119,6,.3)':'none'}} onClick={()=>setTab(t.k)}>{t.l}</button>)}
    </div>

    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'1.5rem',alignItems:'start'}}>
      {/* LEFT: inputs always visible */}
      <div style={{display:'flex',flexDirection:'column',gap:'1rem'}}>
        <div className="card">
          <div style={{padding:'1.1rem 1.4rem',borderBottom:'1px solid #f1f5f9',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div className="fs" style={{fontSize:'.88rem',fontWeight:800,color:'#0f172a'}}>Mis deudas actuales</div>
            <div style={{fontSize:'.78rem',fontWeight:600,color:'#d97706'}}>{COP(totalDeuda)} total</div>
          </div>
          <div style={{padding:'1.1rem 1.4rem'}}>
            <div style={{display:'grid',gridTemplateColumns:'1.8fr 1.2fr .85fr 1.1fr auto',gap:'.4rem',marginBottom:'.5rem'}}>
              {['Deuda','Saldo','Tasa EA','Cuota min.',''].map(h=><div key={h} style={{fontSize:'.68rem',fontWeight:700,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'.07em'}}>{h}</div>)}
            </div>
            {deudas.map((d,i)=><div key={d.id} style={{display:'grid',gridTemplateColumns:'1.8fr 1.2fr .85fr 1.1fr auto',gap:'.4rem',marginBottom:'.45rem',alignItems:'center'}}>
              <div style={{display:'flex',alignItems:'center',gap:'.45rem'}}>
                <div style={{width:8,height:8,borderRadius:'50%',background:COLORS[i%COLORS.length],flexShrink:0}}></div>
                <TextInput value={d.nombre} onChange={v=>upd(d.id,'nombre',v)} style={{minWidth:0}}/>
              </div>
              <MoneyInput value={d.saldo} onChange={v=>upd(d.id,'saldo',v)}/>
              <RateInput value={d.tasa} onChange={v=>upd(d.id,'tasa',v)}/>
              <MoneyInput value={d.minimo} onChange={v=>upd(d.id,'minimo',v)}/>
              <button className="del" onClick={()=>del(d.id)}><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg></button>
            </div>)}
            <button className="add-row" onClick={add}><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Agregar deuda</button>
          </div>
        </div>

        <div className="card" style={{padding:'1.2rem 1.4rem'}}>
          <div className="fs" style={{fontSize:'.82rem',fontWeight:800,color:'#0f172a',marginBottom:'.9rem'}}>Presupuesto mensual de pago</div>
          <div style={{background:'#fffbeb',border:'1px solid #fde68a',borderRadius:12,padding:'.9rem 1rem',marginBottom:'.85rem',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div><div style={{fontSize:'.75rem',color:'#92400e',fontWeight:600,marginBottom:'.15rem'}}>Suma cuotas minimas</div>
            <div className="fs" style={{fontSize:'1.1rem',fontWeight:900,color:'#d97706'}}>{COP(totalMins)}/mes</div></div>
          </div>
          <label style={{fontSize:'.8rem',fontWeight:700,color:'#374151',display:'block',marginBottom:'.4rem'}}>Abono extra disponible mensualmente</label>
          <MoneyInput value={extra} onChange={setExtra}/>
          <div style={{background:'#f0fdf4',border:'1px solid #86efac',borderRadius:11,padding:'.8rem 1rem',marginTop:'.75rem',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontSize:'.82rem',color:'#374151',fontWeight:600}}>Total mensual a deudas</span>
            <span className="fs" style={{fontSize:'1.05rem',fontWeight:900,color:'#059669'}}>{COP(pool)}</span>
          </div>
        </div>

        <div className="card" style={{padding:'1.2rem 1.4rem'}}>
          <div className="fs" style={{fontSize:'.82rem',fontWeight:800,color:'#0f172a',marginBottom:'.85rem'}}>Estrategia activa</div>
          <div style={{display:'flex',gap:'.5rem'}}>
            <button className={'tab-btn '+(estr==='avalanche'?'on':'off')} onClick={()=>setEstr('avalanche')}>Avalancha</button>
            <button className={'tab-btn '+(estr==='snowball'?'on':'off')} onClick={()=>setEstr('snowball')}>Bola de Nieve</button>
          </div>
          <p style={{fontSize:'.8rem',color:'#64748b',margin:'.7rem 0 0',lineHeight:1.55}}>
            {estr==='avalanche'?'Paga primero la deuda de mayor tasa. Minimiza el total de intereses pagados.':'Paga primero la deuda de menor saldo. Genera victorias rapidas para mantener la disciplina.'}
          </p>
        </div>
      </div>

      {/* RIGHT: tab content */}
      <div style={{display:'flex',flexDirection:'column',gap:'1rem'}}>

        {/* Tab: Estrategia */}
        {tab==='estrategia'&&<>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'.85rem'}}>
            {[{l:'Bola de Nieve',r:snowResult,c:'#ea580c',bg:'#fff7ed',b:'#fed7aa'},{l:'Avalancha',r:avalResult,c:'#0891b2',bg:'#ecfeff',b:'#a5f3fc'}].map(s=><div key={s.l} style={{background:s.bg,border:'1.5px solid '+s.b,borderRadius:16,padding:'1.1rem 1.25rem'}}>
              <div className="fs" style={{fontSize:'.82rem',fontWeight:800,color:s.c,marginBottom:'.75rem'}}>{s.l}</div>
              <div style={{marginBottom:'.55rem'}}><div style={{fontSize:'.68rem',color:'#6b7280',textTransform:'uppercase',letterSpacing:'.07em',fontWeight:700,marginBottom:'.2rem'}}>Meses hasta libertad</div><div className="fs" style={{fontSize:'1.4rem',fontWeight:900,color:'#0f172a'}}>{s.r.meses}<span style={{fontSize:'.75rem',color:'#6b7280',fontWeight:500}}> meses</span></div></div>
              <div><div style={{fontSize:'.68rem',color:'#6b7280',textTransform:'uppercase',letterSpacing:'.07em',fontWeight:700,marginBottom:'.2rem'}}>Total intereses</div><div className="fs" style={{fontSize:'.98rem',fontWeight:900,color:s.c}}>{COP(s.r.totalIntereses)}</div></div>
            </div>)}
          </div>
          {/* Bloque ahorro vs minimos mejorado */}
          {soloMins.meses>0&&<div style={{background:'linear-gradient(135deg,#064e3b,#065f46)',borderRadius:16,overflow:'hidden'}}>
            <div style={{padding:'1rem 1.3rem .8rem',borderBottom:'1px solid rgba(255,255,255,.08)'}}>
              <div style={{display:'flex',alignItems:'center',gap:'.5rem',marginBottom:'.2rem'}}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#34d399" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                <div className="fs" style={{fontSize:'.82rem',fontWeight:800,color:'#6ee7b7'}}>Ahorro con estrategia vs pagar solo mínimos</div>
              </div>
              <p style={{fontSize:'.75rem',color:'rgba(255,255,255,.45)',margin:0}}>
                Sin estrategia: {soloMins.meses} meses · {COP(soloMins.totalIntereses)} en intereses
              </p>
            </div>
            <div style={{padding:'1rem 1.3rem'}}>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'.75rem',marginBottom:'.85rem'}}>
                <div style={{background:'rgba(255,255,255,.06)',borderRadius:11,padding:'.75rem .85rem'}}>
                  <div style={{fontSize:'.65rem',color:'rgba(255,255,255,.45)',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:'.3rem'}}>Intereses que NO pagas</div>
                  <div className="fs" style={{fontSize:'1.05rem',fontWeight:900,color:'#34d399'}}>{COP(ahorroInt.intereses)}</div>
                  <div style={{fontSize:'.68rem',color:'rgba(255,255,255,.35)',marginTop:'.2rem'}}>dinero que queda en tu bolsillo</div>
                </div>
                <div style={{background:'rgba(255,255,255,.06)',borderRadius:11,padding:'.75rem .85rem'}}>
                  <div style={{fontSize:'.65rem',color:'rgba(255,255,255,.45)',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:'.3rem'}}>Tiempo que te ahorras</div>
                  <div className="fs" style={{fontSize:'1.05rem',fontWeight:900,color:'#6ee7b7'}}>{ahorroInt.meses} mes{ahorroInt.meses!==1?'es':''}</div>
                  <div style={{fontSize:'.68rem',color:'rgba(255,255,255,.35)',marginTop:'.2rem'}}>antes de quedar libre de deudas</div>
                </div>
                <div style={{background:'rgba(255,255,255,.06)',borderRadius:11,padding:'.75rem .85rem'}}>
                  <div style={{fontSize:'.65rem',color:'rgba(255,255,255,.45)',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:'.3rem'}}>Ahorro mensual equiv.</div>
                  <div className="fs" style={{fontSize:'1.05rem',fontWeight:900,color:'#a7f3d0'}}>{ahorroInt.meses>0?COP(Math.round(ahorroInt.intereses/Math.max(1,(estr==='avalanche'?avalResult:snowResult).meses))):'—'}</div>
                  <div style={{fontSize:'.68rem',color:'rgba(255,255,255,.35)',marginTop:'.2rem'}}>por mes de diferencia</div>
                </div>
              </div>
              {ahorroInt.intereses>0&&<div style={{background:'rgba(52,211,153,.08)',border:'1px solid rgba(52,211,153,.2)',borderRadius:10,padding:'.65rem .9rem',display:'flex',alignItems:'center',gap:'.6rem'}}>
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#34d399" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                <span style={{fontSize:'.78rem',color:'#6ee7b7',fontWeight:600}}>
                  Con la estrategia {estr==='avalanche'?'Avalancha':'Bola de Nieve'} pagas <strong style={{color:'#34d399'}}>{COP((estr==='avalanche'?avalResult:snowResult).totalIntereses)}</strong> en intereses en lugar de <strong style={{color:'#fca5a5'}}>{COP(soloMins.totalIntereses)}</strong> — un ahorro real de <strong style={{color:'#34d399'}}>{COP(ahorroInt.intereses)}</strong>.
                </span>
              </div>}
            </div>
          </div>}
          <div className="card" style={{padding:'1.1rem 1.4rem'}}>
            <div className="fs" style={{fontSize:'.78rem',fontWeight:700,color:'#374151',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:'.75rem'}}>Intereses por estrategia</div>
            <ResponsiveContainer width="100%" height={150}>
              <BarChart data={barData} margin={{top:0,right:5,left:0,bottom:0}}>
                <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9"/>
                <XAxis dataKey="name" tick={{fontSize:11,fill:'#94a3b8'}} axisLine={false} tickLine={false}/>
                <YAxis tickFormatter={v=>`${(v/1e6).toFixed(1)}M`} tick={{fontSize:10,fill:'#94a3b8'}} axisLine={false} tickLine={false} width={42}/>
                <Tooltip formatter={v=>COP(v)} cursor={{fill:'rgba(0,0,0,.04)'}}/>
                <Bar dataKey="val" name="Intereses" radius={[6,6,0,0]}><Cell fill="#ea580c"/><Cell fill="#0891b2"/></Bar>
              </BarChart>
            </ResponsiveContainer>
          </div>
          <div className="card" style={{padding:'1.1rem 1.4rem'}}>
            <div className="fs" style={{fontSize:'.82rem',fontWeight:800,color:'#0f172a',marginBottom:'.9rem'}}>Orden de ataque — {estr==='avalanche'?'Avalancha':'Bola de Nieve'}</div>
            {orden.map((d,i)=><div key={d.id} style={{display:'flex',alignItems:'center',gap:'.75rem',padding:'.75rem .9rem',background:i===0?'#fffbeb':'#fafafa',borderRadius:12,marginBottom:'.4rem',border:'1.5px solid '+(i===0?'#fde68a':'#f1f5f9')}}>
              <div style={{width:28,height:28,borderRadius:'50%',background:COLORS[i%COLORS.length],display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:'.78rem',fontWeight:800,flexShrink:0}}>{i+1}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:'.88rem',fontWeight:700,color:'#1e293b',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{d.nombre}</div>
                <div style={{fontSize:'.72rem',color:'#94a3b8',marginTop:'.1rem'}}>Saldo {COP(d.saldo)} · {N(d.tasa,1)}% EA · Min {COP(d.minimo)}</div>
              </div>
              {i===0&&<span style={{background:'#d97706',color:'#fff',fontSize:'.68rem',fontWeight:700,padding:'.2rem .6rem',borderRadius:99,flexShrink:0}}>ATACAR</span>}
            </div>)}
          </div>
        </>}

        {/* Tab: Plan de Amortizacion */}
        {tab==='plan'&&planDetallado&&<>
          <div style={{background:'linear-gradient(135deg,#4c1d95,#6d28d9)',borderRadius:16,overflow:'hidden',marginBottom:'.25rem'}}>
            <div style={{padding:'1rem 1.4rem .8rem',borderBottom:'1px solid rgba(255,255,255,.08)'}}>
              <div className="fs" style={{fontSize:'.85rem',fontWeight:800,color:'#c4b5fd',marginBottom:'.15rem'}}>Plan de Amortización — {estr==='avalanche'?'Avalancha':'Bola de Nieve'}</div>
              <div style={{fontSize:'.75rem',color:'rgba(255,255,255,.45)'}}>Deuda total: {COP(totalDeuda)} · Pool mensual: {COP(pool)}</div>
            </div>
            <div style={{padding:'1rem 1.4rem'}}>
              <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'.75rem',marginBottom:'.75rem'}}>
                <div><div style={{fontSize:'.65rem',color:'rgba(255,255,255,.45)',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:'.25rem'}}>Meses hasta libertad</div><div className="fs" style={{fontSize:'1.3rem',fontWeight:900,color:'#fff'}}>{(estr==='avalanche'?avalResult:snowResult).meses}</div></div>
                <div><div style={{fontSize:'.65rem',color:'rgba(255,255,255,.45)',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:'.25rem'}}>Intereses totales</div><div className="fs" style={{fontSize:'1.1rem',fontWeight:900,color:'#fca5a5'}}>{COP((estr==='avalanche'?avalResult:snowResult).totalIntereses)}</div></div>
                <div><div style={{fontSize:'.65rem',color:'rgba(255,255,255,.45)',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:'.25rem'}}>Ahorro real vs mínimos</div><div className="fs" style={{fontSize:'1.1rem',fontWeight:900,color:'#86efac'}}>-{COP(ahorroInt.intereses)}</div></div>
              </div>
              <div style={{background:'rgba(255,255,255,.06)',borderRadius:10,padding:'.6rem .9rem',fontSize:'.75rem',color:'rgba(255,255,255,.55)',lineHeight:1.55}}>
                Sin estrategia (solo mínimos): <span style={{color:'#fca5a5',fontWeight:700}}>{soloMins.meses} meses</span> y <span style={{color:'#fca5a5',fontWeight:700}}>{COP(soloMins.totalIntereses)}</span> en intereses.
                Con esta estrategia ahorras <span style={{color:'#86efac',fontWeight:700}}>{COP(ahorroInt.intereses)}</span> en intereses y terminas <span style={{color:'#86efac',fontWeight:700}}>{ahorroInt.meses} meses antes</span>.
              </div>
            </div>
          </div>
          {planDetallado.map((dd,i)=>{
            const col=COLORS[i%COLORS.length];
            const pagoAtaque=Math.round(pool-deudas.filter((d,j)=>j>i).reduce((a,b)=>a+b.minimo,0));
            return <div key={dd.id} style={{background:'#fff',borderRadius:16,border:'1.5px solid #e8edf5',overflow:'hidden',boxShadow:'0 2px 6px rgba(15,23,42,.05)'}}>
              <div style={{background:col,padding:'.6rem 1rem',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                <div style={{display:'flex',alignItems:'center',gap:'.55rem'}}>
                  <div style={{width:26,height:26,borderRadius:'50%',background:'rgba(255,255,255,.2)',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:'.8rem',fontWeight:900}}>#{i+1}</div>
                  <span className="fs" style={{color:'#fff',fontWeight:800,fontSize:'.88rem'}}>{dd.nombre}</span>
                </div>
                {i===0&&<span style={{background:'rgba(255,255,255,.2)',color:'#fff',fontSize:'.7rem',fontWeight:700,padding:'.2rem .65rem',borderRadius:99}}>ATACAR PRIMERO</span>}
              </div>
              <div style={{padding:'1rem 1.2rem'}}>
                <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:'.6rem .9rem'}}>
                  {[{l:'Saldo inicial',v:COP(dd.saldoInicial)},{l:'Tasa EA',v:N(dd.tasa,1)+'%'},{l:'Pago mensual al atacar',v:COP(pagoAtaque)},{l:'Meses hasta liquidar',v:dd.mesLiq+' meses'},{l:'Total intereses pagados',v:COP(dd.intTotal)},{l:'Total pagado',v:COP(dd.pagTotal)},].map((f,j)=><div key={j} style={{background:j%2===0?'#fafafa':'#f8fafc',borderRadius:9,padding:'.5rem .75rem'}}>
                    <div style={{fontSize:'.68rem',fontWeight:700,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:'.2rem'}}>{f.l}</div>
                    <div className="fs" style={{fontSize:'.92rem',fontWeight:900,color:j===4?'#dc2626':j===5?col:'#0f172a'}}>{f.v}</div>
                  </div>)}
                </div>
                {i<planDetallado.length-1&&<div style={{marginTop:'.75rem',padding:'.5rem .75rem',background:'#f0fdf4',borderRadius:9,border:'1px solid #bbf7d0',fontSize:'.75rem',color:'#15803d',fontWeight:600,display:'flex',alignItems:'center',gap:'.4rem'}}>
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="17 11 12 6 7 11"/><polyline points="17 18 12 13 7 18"/></svg>
                  Al liquidar esta deuda: {COP(dd.minimo)}/mes pasan al siguiente objetivo
                </div>}
              </div>
            </div>;
          })}
        </>}

        {/* Tab: Alivio Financiero */}
        {tab==='alivio'&&<>
          <div style={{background:'linear-gradient(135deg,#064e3b,#065f46)',borderRadius:16,padding:'1.4rem',color:'#fff'}}>
            <div className="fs" style={{fontSize:'.9rem',fontWeight:800,color:'#6ee7b7',marginBottom:'.4rem'}}>Alivio Financiero Progresivo</div>
            <p style={{fontSize:'.82rem',color:'rgba(255,255,255,.65)',margin:'.2rem 0 1rem',lineHeight:1.55}}>A medida que liquidas cada deuda, su cuota minima queda libre. Asi va creciendo tu flujo de caja disponible mes a mes.</p>
            <div style={{fontSize:'.8rem',color:'rgba(255,255,255,.7)',fontWeight:600}}>Al terminar de pagar todas las deudas:</div>
            <div className="fs" style={{fontSize:'2rem',fontWeight:900,color:'#34d399',letterSpacing:'-.04em',marginTop:'.2rem'}}>{COP(totalMins)}<span style={{fontSize:'.9rem',fontWeight:600,color:'rgba(255,255,255,.5)'}}>/mes liberados</span></div>
          </div>
          {alivios.map((a,i)=><div key={i} style={{background:'#fff',borderRadius:16,border:'1.5px solid #e8edf5',padding:'1rem 1.2rem',display:'flex',alignItems:'center',gap:'1rem',boxShadow:'0 2px 6px rgba(15,23,42,.05)'}}>
            <div style={{width:44,height:44,borderRadius:12,background:'linear-gradient(135deg,#ecfdf5,#d1fae5)',border:'1.5px solid #86efac',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
              <span className="fs" style={{fontSize:'.75rem',fontWeight:900,color:'#059669'}}>M{a.mes}</span>
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:'.88rem',fontWeight:700,color:'#0f172a',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{a.label}</div>
              <div style={{fontSize:'.75rem',color:'#64748b',marginTop:'.15rem'}}>Acumulado liberado: <strong style={{color:'#059669'}}>{COP(a.acum)}/mes</strong></div>
            </div>
            <div style={{textAlign:'right',flexShrink:0}}>
              <div style={{fontSize:'.68rem',color:'#94a3b8',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:'.15rem'}}>Libera</div>
              <div className="fs" style={{fontSize:'1rem',fontWeight:900,color:'#059669'}}>+{COP(a.liberado)}</div>
            </div>
          </div>)}
          <div style={{background:'#f0f9ff',borderRadius:14,border:'1.5px solid #bae6fd',padding:'1.1rem 1.2rem'}}>
            <div className="fs" style={{fontSize:'.8rem',fontWeight:800,color:'#0369a1',marginBottom:'.65rem'}}>Que podrias hacer con {COP(totalMins)}/mes</div>
            {[{icono:'📈',titulo:'Invertirlo a 8% EA durante 10 anos',v:Math.round(totalMins*((Math.pow(1+0.08/12,120)-1)/(0.08/12)))},{icono:'🏦',titulo:'Fondo de emergencia (3 meses) en',v:null,sfx:Math.round(3*totalMins/totalMins)+' meses'},{icono:'🎯',titulo:'Ahorro adicional al ano',v:totalMins*12}].map((r,i)=><div key={i} style={{display:'flex',alignItems:'center',gap:'.75rem',marginBottom:'.5rem'}}>
              <span style={{fontSize:'1.1rem',flexShrink:0}}>{r.icono}</span>
              <div style={{flex:1}}><span style={{fontSize:'.8rem',color:'#374151'}}>{r.titulo}: </span><strong style={{color:'#0369a1',fontSize:'.85rem'}}>{r.v?COP(r.v):r.sfx}</strong></div>
            </div>)}
          </div>
        </>}
      </div>
    </div>
  </div>;
}
createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>if(!sessionStorage.getItem('finsuite_auth'))window.location.href='../../index.html';if(!sessionStorage.getItem('finsuite_current_client'))window.location.href='../../clientes.html';</script>
</body>
