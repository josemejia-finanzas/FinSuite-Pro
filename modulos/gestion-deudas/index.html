<div class="bar">

<script type="text/babel" data-type="module">
import React,{useState,useMemo} from 'react';
import {createRoot} from 'react-dom/client';
import {BarChart,Bar,XAxis,YAxis,CartesianGrid,Tooltip,ResponsiveContainer,Cell} from 'recharts';

const COP=v=>new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP',minimumFractionDigits:0,maximumFractionDigits:0}).format(v||0);
const N=(v,d=1)=>new Intl.NumberFormat('es-CO',{minimumFractionDigits:0,maximumFractionDigits:d}).format(v||0);

function MoneyInput({value,onChange,style={}}){
  const [f,setF]=useState(false);const [r,setR]=useState('');
  return <input className="ni" style={{textAlign:'right',...style}}
    value={f?r:(value===0?'':new Intl.NumberFormat('es-CO').format(value))}
    onChange={e=>{const d=e.target.value.replace(/[^\d]/g,'');setR(d);onChange(d===''?0:parseInt(d,10));}}
    onFocus={()=>{setF(true);setR(value===0?'':String(value));}} onBlur={()=>setF(false)}
    placeholder="0" inputMode="numeric"/>;
}
function RateInput({value,onChange}){
  const [v,setV]=useState(String(value));
  return <input className="ni" style={{textAlign:'right'}} value={v}
    onChange={e=>{const s=e.target.value.replace(/[^\d.]/g,'');setV(s);onChange(parseFloat(s)||0);}}
    onBlur={()=>setV(String(value))} placeholder="0" inputMode="decimal"/>;
}
function TextInput({value,onChange,style={}}){
  return <input className="ni" style={style} value={value} onChange={e=>onChange(e.target.value)} placeholder="Nombre de la deuda..."/>;
}

function simular(deudas,pool){
  if(!deudas.length||pool<=0) return null;
  let ds=deudas.map(d=>({...d,saldo:d.saldo}));
  let mes=0,totalInt=0;
  while(ds.some(d=>d.saldo>1)&&mes<600){
    mes++;let extra=pool;
    for(let d of ds){
      if(d.saldo<=0) continue;
      const int=d.saldo*d.tasa/100/12;
      const pagMin=Math.min(d.saldo+int,d.minimo);
      const pagReal=Math.min(pagMin,extra+int);
      totalInt+=int;
      d.saldo=Math.max(0,d.saldo+int-Math.min(pagReal,d.saldo+int));
      extra-=Math.max(0,pagReal-int);
      if(extra<0)extra=0;
    }
    for(let d of ds){if(d.saldo>0&&extra>0){const p=Math.min(d.saldo,extra);d.saldo-=p;extra-=p;}}
  }
  return{meses:mes,totalIntereses:totalInt};
}

// ── Generadores ───────────────────────────────────────────────────────────────

function pdfHdr(doc,titulo){
  const W=doc.internal.pageSize.getWidth();
  doc.setFillColor(15,23,42);doc.rect(0,0,W,36,'F');
  doc.setFillColor(217,119,6);doc.rect(0,36,W,3,'F');
  doc.setFont('helvetica','bold');doc.setFontSize(20);doc.setTextColor(241,245,249);
  doc.text('FinSuite Pro',14,16);
  doc.setFont('helvetica','normal');doc.setFontSize(10);doc.setTextColor(148,163,184);
  doc.text(titulo,14,27);
  doc.text('Generado: '+new Date().toLocaleDateString('es-CO',{day:'2-digit',month:'long',year:'numeric'}),W-14,27,{align:'right'});
}
function pdfFtrs(doc){
  const pg=doc.getNumberOfPages();const W=doc.internal.pageSize.getWidth();const H=doc.internal.pageSize.getHeight();
  for(let i=1;i<=pg;i++){
    doc.setPage(i);
    doc.setFillColor(248,250,252);doc.rect(0,H-10,W,10,'F');
    doc.setDrawColor(226,232,240);doc.setLineWidth(.3);doc.line(0,H-10,W,H-10);
    doc.setFont('helvetica','normal');doc.setFontSize(7.5);doc.setTextColor(148,163,184);
    doc.text('FinSuite Pro v1.2 — Estrategia de Gestión de Deudas',14,H-3.5);
    doc.text('Pág. '+i+' de '+pg,W-14,H-3.5,{align:'right'});
  }
}
function pdfSec(doc,title,y,rgb){
  if(y>doc.internal.pageSize.getHeight()-50){doc.addPage();y=20;}
  doc.setFont('helvetica','bold');doc.setFontSize(10.5);doc.setTextColor(...rgb);
  doc.text(title,14,y);
  doc.setDrawColor(...rgb);doc.setLineWidth(.3);doc.line(14,y+1.5,doc.internal.pageSize.getWidth()-14,y+1.5);
  return y+9;
}

function generarPDF(d){
  const {jsPDF}=window.jspdf;const doc=new jsPDF('p','mm','a4');const M=14;
  pdfHdr(doc,'Estrategia de Gestión de Deudas');
  let y=48;

  // Resumen de deudas
  y=pdfSec(doc,'RESUMEN DE DEUDAS',y,[217,119,6]);
  doc.autoTable({
    startY:y,
    head:[['Deuda','Saldo','Tasa EA','Cuota Mínima']],
    body:[...d.deudas.map(dd=>[dd.nombre,COP(dd.saldo),N(dd.tasa,1)+'%',COP(dd.minimo)]),
      ['TOTALES',COP(d.deudas.reduce((a,b)=>a+b.saldo,0)),'—',COP(d.deudas.reduce((a,b)=>a+b.minimo,0))]],
    theme:'grid',margin:{left:M,right:M},
    headStyles:{fillColor:[217,119,6],textColor:[255,255,255],fontSize:9,fontStyle:'bold'},
    bodyStyles:{fontSize:8.5,textColor:[30,41,59]},
    alternateRowStyles:{fillColor:[255,251,235]},
    columnStyles:{1:{halign:'right'},2:{halign:'center'},3:{halign:'right'}},
    didDrawPage:()=>pdfFtrs(doc),
  });
  y=doc.lastAutoTable.finalY+10;

  // Presupuesto
  y=pdfSec(doc,'PRESUPUESTO MENSUAL DE PAGO',y,[15,118,110]);
  doc.autoTable({
    startY:y,head:[['Concepto','Monto']],
    body:[['Suma de cuotas mínimas',COP(d.totalMins)],['Abono extra disponible',COP(d.extra)],['Total mensual a deudas',COP(d.pool)]],
    theme:'grid',margin:{left:M,right:M},
    headStyles:{fillColor:[15,118,110],textColor:[255,255,255],fontSize:9,fontStyle:'bold'},
    bodyStyles:{fontSize:8.5,textColor:[30,41,59]},
    columnStyles:{1:{halign:'right',fontStyle:'bold'}},
    didDrawPage:()=>pdfFtrs(doc),
  });
  y=doc.lastAutoTable.finalY+10;

  // Comparativa
  if(d.snow&&d.aval){
    y=pdfSec(doc,'COMPARATIVA DE ESTRATEGIAS',y,[30,64,175]);
    doc.autoTable({
      startY:y,head:[['Métrica','⛄ Bola de Nieve','🌊 Avalancha','Diferencia']],
      body:[
        ['Meses hasta liquidar deudas',d.snow.meses+' meses',d.aval.meses+' meses',Math.abs(d.snow.meses-d.aval.meses)+' meses'],
        ['Total intereses pagados',COP(Math.round(d.snow.totalIntereses)),COP(Math.round(d.aval.totalIntereses)),COP(Math.round(Math.abs(d.snow.totalIntereses-d.aval.totalIntereses)))],
        ['Estrategia óptima (menos intereses)','','','✅ '+d.mejorStr],
      ],
      theme:'grid',margin:{left:M,right:M},
      headStyles:{fillColor:[30,64,175],textColor:[255,255,255],fontSize:9,fontStyle:'bold'},
      bodyStyles:{fontSize:8.5,textColor:[30,41,59]},
      alternateRowStyles:{fillColor:[239,246,255]},
      columnStyles:{1:{halign:'right'},2:{halign:'right'},3:{halign:'right',fontStyle:'bold'}},
      didDrawPage:()=>pdfFtrs(doc),
    });
    y=doc.lastAutoTable.finalY+10;
  }

  // Orden de ataque
  y=pdfSec(doc,'ORDEN DE ATAQUE — '+d.estrategia.toUpperCase(),y,[79,70,229]);
  doc.autoTable({
    startY:y,head:[['#','Deuda','Saldo','Tasa EA','Cuota Mín.','Acción']],
    body:d.orden.map((dd,i)=>[i+1,dd.nombre,COP(dd.saldo),N(dd.tasa,1)+'%',COP(dd.minimo),i===0?'⚡ ATACAR YA':'Esperar']),
    theme:'grid',margin:{left:M,right:M},
    headStyles:{fillColor:[79,70,229],textColor:[255,255,255],fontSize:9,fontStyle:'bold'},
    bodyStyles:{fontSize:8.5,textColor:[30,41,59]},
    alternateRowStyles:{fillColor:[245,243,255]},
    columnStyles:{0:{halign:'center'},2:{halign:'right'},3:{halign:'center'},4:{halign:'right'},5:{halign:'center'}},
    didDrawPage:()=>pdfFtrs(doc),
  });

  pdfFtrs(doc);
  doc.save('estrategia-gestion-deudas.pdf');
}

function generarExcel(d){
  const XLSX=window.XLSX;const wb=XLSX.utils.book_new();const n=v=>Number(v)||0;

  const wsRes=XLSX.utils.aoa_to_sheet([
    ['ESTRATEGIA DE GESTIÓN DE DEUDAS — FinSuite Pro v1.2'],
    ['Fecha',new Date().toLocaleDateString('es-CO')],[''],
    ['RESUMEN GENERAL',''],
    ['Total deuda pendiente',n(d.deudas.reduce((a,b)=>a+b.saldo,0))],
    ['Cuotas mínimas mensuales',n(d.totalMins)],
    ['Abono extra disponible',n(d.extra)],
    ['Total mensual a deudas',n(d.pool)],[''],
    ['COMPARATIVA ESTRATEGIAS',''],
    ['','Bola de Nieve','Avalancha'],
    ['Meses hasta libertad',d.snow?.meses||'N/A',d.aval?.meses||'N/A'],
    ['Total intereses',n(d.snow?.totalIntereses),n(d.aval?.totalIntereses)],
    ['Ahorro con Avalancha',Math.abs(n(d.snow?.totalIntereses)-n(d.aval?.totalIntereses)),''],
    ['Estrategia óptima',d.mejorStr,''],
  ]);
  wsRes['!cols']=[{wch:35},{wch:20},{wch:20}];
  XLSX.utils.book_append_sheet(wb,wsRes,'Resumen');

  const wsD=XLSX.utils.aoa_to_sheet([
    ['Deuda','Saldo (COP)','Tasa EA (%)','Cuota Mínima (COP)','Tipo'],
    ...d.deudas.map(dd=>[dd.nombre,n(dd.saldo),n(dd.tasa),n(dd.minimo),'Deuda']),
    ['TOTAL',d.deudas.reduce((a,b)=>a+b.saldo,0),'',d.deudas.reduce((a,b)=>a+b.minimo,0),''],
  ]);
  wsD['!cols']=[{wch:35},{wch:20},{wch:15},{wch:22},{wch:15}];
  XLSX.utils.book_append_sheet(wb,wsD,'Deudas');

  const wsPlan=XLSX.utils.aoa_to_sheet([
    ['ORDEN DE ATAQUE — '+d.estrategia.toUpperCase()],
    ['Prioridad','Deuda','Saldo','Tasa EA','Cuota Mín.','Acción'],
    ...d.orden.map((dd,i)=>[i+1,dd.nombre,n(dd.saldo),n(dd.tasa),n(dd.minimo),i===0?'ATACAR PRIMERO':'Esperar turno']),
  ]);
  wsPlan['!cols']=[{wch:12},{wch:35},{wch:20},{wch:15},{wch:22},{wch:20}];
  XLSX.utils.book_append_sheet(wb,wsPlan,'Plan_de_Pago');

  XLSX.writeFile(wb,'estrategia-gestion-deudas.xlsx');
}

// ── App ───────────────────────────────────────────────────────────────────────
let uid=5;const nid=()=>++uid;
const COLORS=['#ef4444','#f97316','#eab308','#22c55e','#06b6d4','#8b5cf6','#ec4899'];

function App(){
  const [deudas,setDeudas]=useState([
    {id:1,nombre:'Tarjeta Visa',saldo:5000000,tasa:28,minimo:150000},
    {id:2,nombre:'Crédito de consumo',saldo:12000000,tasa:18,minimo:380000},
    {id:3,nombre:'Tarjeta Mastercard',saldo:2500000,tasa:32,minimo:75000},
  ]);
  const [extra,setExtra]=useState(500000);
  const [estr,setEstr]=useState('avalanche');
  const [gen,setGen]=useState('');

  const upd=(id,k,v)=>setDeudas(a=>a.map(d=>d.id===id?{...d,[k]:v}:d));
  const del=id=>setDeudas(a=>a.filter(d=>d.id!==id));
  const add=()=>setDeudas(a=>[...a,{id:nid(),nombre:'Nueva deuda',saldo:0,tasa:20,minimo:0}]);

  const totalMins=deudas.reduce((a,b)=>a+b.minimo,0);
  const pool=totalMins+extra;
  const snow=useMemo(()=>simular([...deudas].sort((a,b)=>a.saldo-b.saldo),pool),[deudas,pool]);
  const aval=useMemo(()=>simular([...deudas].sort((a,b)=>b.tasa-a.tasa),pool),[deudas,pool]);
  const orden=useMemo(()=>{const a=[...deudas];return estr==='snowball'?a.sort((a,b)=>a.saldo-b.saldo):a.sort((a,b)=>b.tasa-a.tasa);},[deudas,estr]);

  const ahorro=snow&&aval?Math.abs(snow.totalIntereses-aval.totalIntereses):0;
  const mejorStr=snow&&aval&&aval.totalIntereses<snow.totalIntereses?'Avalancha':'Bola de Nieve';
  const barData=snow&&aval?[{name:'Bola de Nieve',val:Math.round(snow.totalIntereses)},{name:'Avalancha',val:Math.round(aval.totalIntereses)}]:[];

  const dPDF=()=>{setGen('pdf');setTimeout(()=>{generarPDF({deudas,totalMins,extra,pool,snow,aval,orden,mejorStr,estrategia:estr});setGen('');},50);};
  const dXLS=()=>generarExcel({deudas,totalMins,extra,pool,snow,aval,orden,mejorStr,estrategia:estr});

  return <div style={{maxWidth:1200,margin:'0 auto',padding:'1.5rem'}}>
    {/* Header */}
    <div style={{marginBottom:'1.5rem',display:'flex',alignItems:'center',gap:'1rem',flexWrap:'wrap'}}>
      <div style={{background:'#fffbeb',padding:'.75rem',borderRadius:14,border:'1px solid #fde68a'}}>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#d97706" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
      </div>
      <div style={{flex:1,minWidth:0}}>
        <h1 className="fs" style={{fontSize:'1.3rem',fontWeight:800,color:'#0f172a',margin:0}}>Estrategia de Gestión de Deudas</h1>
        <p style={{color:'#64748b',fontSize:'.84rem',margin:0}}>Compara Bola de Nieve vs. Avalancha y planifica el camino hacia la libertad financiera.</p>
      </div>
      <div style={{display:'flex',gap:'.5rem',flexShrink:0}}>
        <button className="rpt-btn" style={{background:'linear-gradient(135deg,#dc2626,#b91c1c)',color:'#fff'}} onClick={dPDF} disabled={!!gen}>
          {gen==='pdf'?'Generando...':<><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Informe PDF</>}
        </button>
        <button className="rpt-btn" style={{background:'linear-gradient(135deg,#059669,#047857)',color:'#fff'}} onClick={dXLS}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
          Exportar Excel
        </button>
      </div>
    </div>

    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'1.5rem',alignItems:'start'}}>
      <div style={{display:'flex',flexDirection:'column',gap:'1rem'}}>
        {/* Tabla deudas */}
        <div className="card">
          <div style={{padding:'1.1rem 1.4rem',borderBottom:'1px solid #f1f5f9',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div className="fs" style={{fontSize:'.88rem',fontWeight:700,color:'#0f172a'}}>💳 Mis deudas actuales</div>
            <div style={{fontSize:'.75rem',color:'#94a3b8'}}>Total: <strong style={{color:'#d97706'}}>{COP(deudas.reduce((a,b)=>a+b.saldo,0))}</strong></div>
          </div>
          <div style={{padding:'1.1rem 1.4rem'}}>
            <div style={{display:'grid',gridTemplateColumns:'1.8fr 1.2fr .85fr 1.1fr auto',gap:'.4rem',marginBottom:'.5rem'}}>
              {['Deuda','Saldo','Tasa EA','Cuota mín.',''].map(h=><div key={h} style={{fontSize:'.68rem',fontWeight:700,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'.07em'}}>{h}</div>)}
            </div>
            {deudas.map((d,i)=><div key={d.id} style={{display:'grid',gridTemplateColumns:'1.8fr 1.2fr .85fr 1.1fr auto',gap:'.4rem',marginBottom:'.45rem',alignItems:'center'}}>
              <div style={{display:'flex',alignItems:'center',gap:'.5rem'}}>
                <div style={{width:8,height:8,borderRadius:'50%',background:COLORS[i%COLORS.length],flexShrink:0}}></div>
                <TextInput value={d.nombre} onChange={v=>upd(d.id,'nombre',v)} style={{minWidth:0}}/>
              </div>
              <MoneyInput value={d.saldo} onChange={v=>upd(d.id,'saldo',v)}/>
              <RateInput value={d.tasa} onChange={v=>upd(d.id,'tasa',v)}/>
              <MoneyInput value={d.minimo} onChange={v=>upd(d.id,'minimo',v)}/>
              <button className="del" onClick={()=>del(d.id)}><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg></button>
            </div>)}
            <button className="add-row" onClick={add}><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Agregar deuda</button>
          </div>
        </div>

        {/* Presupuesto */}
        <div className="card" style={{padding:'1.1rem 1.4rem'}}>
          <div className="fs" style={{fontSize:'.88rem',fontWeight:700,color:'#0f172a',marginBottom:'1rem'}}>💵 Presupuesto mensual</div>
          <div style={{background:'#fffbeb',border:'1px solid #fde68a',borderRadius:12,padding:'1rem',marginBottom:'1rem',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div><div style={{fontSize:'.78rem',color:'#92400e',fontWeight:600}}>Cuotas mínimas</div>
            <div className="fs" style={{fontSize:'1.1rem',fontWeight:800,color:'#d97706'}}>{COP(totalMins)}<span style={{fontSize:'.75rem',fontWeight:500,color:'#92400e'}}>/mes</span></div></div>
          </div>
          <label style={{fontSize:'.82rem',fontWeight:600,color:'#374151',display:'block',marginBottom:'.4rem'}}>Abono extra mensual disponible</label>
          <MoneyInput value={extra} onChange={setExtra}/>
          <div style={{background:'#f0fdf4',border:'1px solid #86efac',borderRadius:10,padding:'.75rem 1rem',marginTop:'.75rem',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontSize:'.82rem',color:'#374151',fontWeight:600}}>Total mensual a deudas</span>
            <span className="fs" style={{fontSize:'1rem',fontWeight:800,color:'#059669'}}>{COP(pool)}</span>
          </div>
        </div>

        {/* Selector */}
        <div className="card" style={{padding:'1.1rem 1.4rem'}}>
          <div className="fs" style={{fontSize:'.88rem',fontWeight:700,color:'#0f172a',marginBottom:'.85rem'}}>⚙️ Estrategia activa</div>
          <div style={{display:'flex',gap:'.5rem'}}>
            <button className={'tab-btn '+(estr==='avalanche'?'on':'off')} onClick={()=>setEstr('avalanche')}>🌊 Avalancha</button>
            <button className={'tab-btn '+(estr==='snowball'?'on':'off')} onClick={()=>setEstr('snowball')}>⛄ Bola de Nieve</button>
          </div>
          <p style={{fontSize:'.8rem',color:'#64748b',margin:'.75rem 0 0',lineHeight:1.55}}>
            {estr==='avalanche'?'Paga primero la deuda con mayor tasa. Minimiza el total de intereses pagados a largo plazo.':'Paga primero la deuda de menor saldo. Genera victorias rápidas que mantienen la disciplina.'}
          </p>
        </div>
      </div>

      <div style={{display:'flex',flexDirection:'column',gap:'1rem'}}>
        {snow&&aval&&<>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'.85rem'}}>
            {[{l:'⛄ Bola de Nieve',r:snow,c:'#ea580c',bg:'#fff7ed',b:'#fed7aa'},{l:'🌊 Avalancha',r:aval,c:'#0891b2',bg:'#ecfeff',b:'#a5f3fc'}].map(s=><div key={s.l} className="card" style={{padding:'1.1rem 1.25rem',background:s.bg,border:'1.5px solid '+s.b}}>
              <div className="fs" style={{fontSize:'.82rem',fontWeight:700,color:s.c,marginBottom:'.75rem'}}>{s.l}</div>
              <div style={{marginBottom:'.6rem'}}>
                <div style={{fontSize:'.68rem',color:'#6b7280',textTransform:'uppercase',letterSpacing:'.07em',fontWeight:700}}>Meses hasta 0 deuda</div>
                <div className="fs" style={{fontSize:'1.5rem',fontWeight:800,color:'#0f172a'}}>{s.r.meses}<span style={{fontSize:'.78rem',color:'#6b7280',fontWeight:500}}> meses</span></div>
              </div>
              <div>
                <div style={{fontSize:'.68rem',color:'#6b7280',textTransform:'uppercase',letterSpacing:'.07em',fontWeight:700}}>Total en intereses</div>
                <div className="fs" style={{fontSize:'.98rem',fontWeight:800,color:s.c}}>{COP(Math.round(s.r.totalIntereses))}</div>
              </div>
            </div>)}
          </div>
          {ahorro>1000&&<div style={{background:'#f0fdf4',border:'1.5px solid #86efac',borderRadius:14,padding:'1rem 1.25rem',display:'flex',gap:'.85rem',alignItems:'center'}}>
            <div style={{fontSize:'1.5rem',lineHeight:1}}>💡</div>
            <div>
              <div className="fs" style={{fontSize:'.9rem',fontWeight:800,color:'#15803d'}}>Avalancha ahorra {COP(Math.round(ahorro))} en intereses</div>
              <div style={{fontSize:'.78rem',color:'#166534',marginTop:'.15rem'}}>La estrategia Avalancha es más eficiente económicamente en este caso.</div>
            </div>
          </div>}
          <div className="card" style={{padding:'1.1rem 1.4rem'}}>
            <div className="fs" style={{fontSize:'.78rem',fontWeight:700,color:'#374151',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:'.75rem'}}>Intereses totales por estrategia</div>
            <ResponsiveContainer width="100%" height={160}>
              <BarChart data={barData} margin={{top:0,right:5,left:0,bottom:0}}>
                <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9"/>
                <XAxis dataKey="name" tick={{fontSize:11,fill:'#94a3b8'}} axisLine={false} tickLine={false}/>
                <YAxis tickFormatter={v=>`${(v/1e6).toFixed(1)}M`} tick={{fontSize:10,fill:'#94a3b8'}} axisLine={false} tickLine={false} width={42}/>
                <Tooltip formatter={v=>COP(v)} cursor={{fill:'rgba(0,0,0,.04)'}}/>
                <Bar dataKey="val" name="Intereses" radius={[6,6,0,0]}><Cell fill="#ea580c"/><Cell fill="#0891b2"/></Bar>
              </BarChart>
            </ResponsiveContainer>
          </div>
        </>}
        <div className="card" style={{padding:'1.1rem 1.4rem'}}>
          <div className="fs" style={{fontSize:'.88rem',fontWeight:700,color:'#0f172a',marginBottom:'1rem'}}>🎯 Orden de ataque — {estr==='avalanche'?'Avalancha':'Bola de Nieve'}</div>
          {orden.map((d,i)=><div key={d.id} style={{display:'flex',alignItems:'center',gap:'.75rem',padding:'.8rem 1rem',background:i===0?'#fffbeb':'#fafafa',borderRadius:12,marginBottom:'.5rem',border:'1.5px solid '+(i===0?'#fde68a':'#f1f5f9')}}>
            <div style={{width:28,height:28,borderRadius:'50%',background:COLORS[i%COLORS.length],display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:'.78rem',fontWeight:800,flexShrink:0}}>{i+1}</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:'.88rem',fontWeight:700,color:'#1e293b',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{d.nombre}</div>
              <div style={{fontSize:'.73rem',color:'#94a3b8',marginTop:'.1rem'}}>Saldo {COP(d.saldo)} · {N(d.tasa,1)}% EA · Mín {COP(d.minimo)}</div>
            </div>
            {i===0&&<span style={{background:'#d97706',color:'#fff',fontSize:'.68rem',fontWeight:700,padding:'.2rem .6rem',borderRadius:99,flexShrink:0}}>ATACAR YA</span>}
          </div>)}
        </div>
      </div>
    </div>
  </div>;
}
createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>if(!sessionStorage.getItem('finsuite_auth'))window.location.href='../../index.html';</script>
</body></html>
