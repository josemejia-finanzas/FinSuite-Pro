// ── Formatters ────────────────────────────────────────────────────────────────
const COP=v=>new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP',minimumFractionDigits:0,maximumFractionDigits:0}).format(v||0);
const N=(v,d=1)=>new Intl.NumberFormat('es-CO',{minimumFractionDigits:0,maximumFractionDigits:d}).format(v||0);
const fmtM=v=>{const a=Math.abs(v);return a>=1e9?N(v/1e9,2)+'B':a>=1e6?N(v/1e6,2)+'M':a>=1e3?N(v/1e3,1)+'K':COP(v);};

// ── PDF helpers ───────────────────────────────────────────────────────────────
function pdfClientBlock(doc,client,user){
  const W=doc.internal.pageSize.getWidth();const M=14;
  const y0=43;const bh=36;
  doc.setFillColor(248,250,252);doc.roundedRect(M,y0,W-M*2,bh,3,3,'F');
  doc.setDrawColor(220,228,240);doc.setLineWidth(.4);doc.roundedRect(M,y0,W-M*2,bh,3,3,'S');
  doc.setFillColor(124,58,237);doc.roundedRect(M,y0,3,bh,1.5,1.5,'F');
  doc.setFont('helvetica','normal');doc.setFontSize(6.5);doc.setTextColor(148,163,184);
  doc.text('CLIENTE',M+8,y0+7);
  doc.setFont('helvetica','bold');doc.setFontSize(10.5);doc.setTextColor(15,23,42);
  doc.text((client?.nombre||'Sin cliente'),M+8,y0+15);
  const sub2=[];if(client?.empresa)sub2.push(client.empresa);if(client?.tipo)sub2.push(client.tipo);
  if(sub2.length){doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(100,116,139);doc.text(sub2.join(' · '),M+8,y0+22);}
  if(client?.tipoDoc&&client?.numeroDoc){const lbl=client.tipoDoc==='Cédula de Ciudadanía'?'CC':client.tipoDoc==='NIT'?'NIT':client.tipoDoc;doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(71,85,105);doc.text(lbl+': '+client.numeroDoc,M+8,y0+29);}
  const midX=W/2;doc.setDrawColor(226,232,240);doc.setLineWidth(.3);doc.line(midX,y0+6,midX,y0+bh-6);
  const rx=midX+8;let ry=y0+9;const rItems=[];
  if(client?.email)rItems.push('Email: '+client.email);
  if(client?.celular||client?.telefono)rItems.push('Tel: '+(client.celular||client.telefono));
  if(client?.ciudad)rItems.push('Ciudad: '+client.ciudad);
  doc.setFont('helvetica','normal');doc.setFontSize(7.5);doc.setTextColor(100,116,139);
  rItems.forEach(item=>{if(ry<y0+bh-5){doc.text(item,rx,ry);ry+=5.8;}});
  doc.setFont('helvetica','italic');doc.setFontSize(7);doc.setTextColor(148,163,184);
  doc.text('Asesor: '+(user?.nombre||'No especificado'),W-M-5,y0+bh-7,{align:'right'});
  return y0+bh+10;
}

function generarPDF(d){
  const {jsPDF}=window.jspdf;const doc=new jsPDF('p','mm','a4');const M=14;const W=doc.internal.pageSize.getWidth();const H=doc.internal.pageSize.getHeight();
  const _cl=JSON.parse(sessionStorage.getItem('finsuite_current_client')||'null');
  const _usr=JSON.parse(sessionStorage.getItem('finsuite_auth')||'null');
  const ftrs=()=>{const pg=doc.getNumberOfPages();for(let i=1;i<=pg;i++){doc.setPage(i);doc.setFillColor(248,250,252);doc.rect(0,H-10,W,10,'F');doc.setDrawColor(226,232,240);doc.setLineWidth(.3);doc.line(0,H-10,W,H-10);doc.setFont('helvetica','normal');doc.setFontSize(7.5);doc.setTextColor(148,163,184);doc.text('FinSuite Pro v1.2 — Planificación para el Retiro',M,H-3.5);doc.text('Pág. '+i+' de '+pg,W-M,H-3.5,{align:'right'});}};
  doc.setFillColor(76,29,149);doc.rect(0,0,W,36,'F');doc.setFillColor(124,58,237);doc.rect(0,36,W,3,'F');
  doc.setFont('helvetica','bold');doc.setFontSize(20);doc.setTextColor(241,245,249);doc.text('FinSuite Pro',M,16);
  doc.setFont('helvetica','normal');doc.setFontSize(10);doc.setTextColor(196,181,253);doc.text('Planificación para el Retiro',M,27);
  doc.text('Generado: '+new Date().toLocaleDateString('es-CO',{day:'2-digit',month:'long',year:'numeric'}),W-M,27,{align:'right'});
  let y=pdfClientBlock(doc,_cl,_usr);
  doc.autoTable({startY:y,head:[['Parámetro','Valor']],body:[['Edad actual',d.edadActual+' años'],['Edad de retiro',d.edadRetiro+' años'],['Horizonte',d.anios+' años'],['Ahorro actual',COP(d.ahorroActual)],['Aporte mensual',COP(d.aporteMensual)],['Rendimiento anual',d.tasaAnual+'% EA'],['Meta de retiro',COP(d.meta)]],theme:'grid',margin:{left:M,right:M},headStyles:{fillColor:[76,29,149],textColor:[255,255,255],fontSize:9,fontStyle:'bold'},bodyStyles:{fontSize:8.5},alternateRowStyles:{fillColor:[245,243,255]},columnStyles:{1:{halign:'right',fontStyle:'bold'}},didDrawPage:()=>ftrs()});
  y=doc.lastAutoTable.finalY+8;
  const pct=d.meta>0?Math.min(100,(d.fv/d.meta)*100):100;const ok=d.fv>=d.meta;
  doc.setFillColor(ok?220:254,ok?252:243,ok?231:199);doc.roundedRect(M,y,W-M*2,22,3,3,'F');doc.setDrawColor(ok?22:161,ok?163:98,ok?74:7);doc.setLineWidth(.4);doc.roundedRect(M,y,W-M*2,22,3,3,'S');
  doc.setFont('helvetica','bold');doc.setFontSize(13);doc.setTextColor(ok?21:161,ok?128:98,ok?61:7);doc.text('Fondo proyectado: '+fmtM(d.fv),M+6,y+9);
  doc.setFont('helvetica','normal');doc.setFontSize(9);doc.text((ok?'META ALCANZADA':'Meta no alcanzada')+' · '+N(pct,1)+'% de '+COP(d.meta),M+6,y+17);
  y+=30;
  doc.autoTable({startY:y,head:[['Indicador','Valor']],body:[['Fondo proyectado',fmtM(d.fv)],['Total aportado',COP(d.totalAportado)],['Intereses ganados',COP(Math.max(0,d.totalIntereses))],['Multiplicador del capital',N(d.mult,2)+'x'],['% de la meta',N(pct,1)+'%']],theme:'grid',margin:{left:M,right:M},headStyles:{fillColor:[124,58,237],textColor:[255,255,255],fontSize:9,fontStyle:'bold'},bodyStyles:{fontSize:8.5},alternateRowStyles:{fillColor:[245,243,255]},columnStyles:{1:{halign:'right',fontStyle:'bold',textColor:[124,58,237]}},didDrawPage:()=>ftrs()});
  y=doc.lastAutoTable.finalY+10;
  doc.setFont('helvetica','bold');doc.setFontSize(10.5);doc.setTextColor(76,29,149);doc.text('PROYECCION ANO A ANO',M,y);doc.setDrawColor(76,29,149);doc.setLineWidth(.3);doc.line(M,y+1.5,W-M,y+1.5);y+=9;
  const rows=d.chart.filter((_,i)=>i%Math.max(1,Math.floor(d.chart.length/30))===0||i===d.chart.length-1);
  doc.autoTable({startY:y,head:[['Edad','Fondo Total','Aportado','Intereses Acum.']],body:rows.map(r=>[r.edad+' años',COP(r.fondo),COP(r.aportado),COP(Math.max(0,r.fondo-r.aportado))]),theme:'striped',margin:{left:M,right:M},headStyles:{fillColor:[76,29,149],textColor:[255,255,255],fontSize:8.5,fontStyle:'bold'},bodyStyles:{fontSize:8},alternateRowStyles:{fillColor:[245,243,255]},columnStyles:{0:{halign:'center'},1:{halign:'right'},2:{halign:'right'},3:{halign:'right'}},didDrawPage:()=>ftrs()});
  y=doc.lastAutoTable.finalY+10;
  doc.setFont('helvetica','bold');doc.setFontSize(10.5);doc.setTextColor(76,29,149);if(y>H-60){doc.addPage();y=20;}doc.text('HITOS DE LA META',M,y);doc.setDrawColor(76,29,149);doc.setLineWidth(.3);doc.line(M,y+1.5,W-M,y+1.5);y+=9;
  doc.autoTable({startY:y,head:[['Hito','Monto objetivo','Edad estimada','Estado']],body:d.milestones.map(m=>[m.pct+'% de la meta',COP(d.meta*m.pct/100),m.edad?'A los '+m.edad+' años':'No alcanzado',m.edad?'Alcanzado':'Pendiente']),theme:'grid',margin:{left:M,right:M},headStyles:{fillColor:[124,58,237],textColor:[255,255,255],fontSize:9,fontStyle:'bold'},bodyStyles:{fontSize:8.5},columnStyles:{1:{halign:'right'},2:{halign:'center'},3:{halign:'center'}},didDrawPage:()=>ftrs()});
  ftrs();
  const _fn=(_cl?.nombre?_cl.nombre.replace(/[^a-zA-Z0-9]/g,'-').toLowerCase()+'-':'')+'planificacion-retiro';
  doc.save(_fn+'.pdf');
}

function generarExcel(d){
  const XLSX=window.XLSX;const wb=XLSX.utils.book_new();
  const _cl_xls=JSON.parse(sessionStorage.getItem('finsuite_current_client')||'null');
  const _usr_xls=JSON.parse(sessionStorage.getItem('finsuite_auth')||'null');
  const n=v=>Number(v)||0;
  const wsP=XLSX.utils.aoa_to_sheet([['PLANIFICACION PARA EL RETIRO — FinSuite Pro v1.2'],['Fecha',new Date().toLocaleDateString('es-CO')],[''],['DATOS DEL CLIENTE',''],['Nombre',_cl_xls?.nombre||'No especificado'],[(_cl_xls?.tipoDoc||'Documento'),_cl_xls?.numeroDoc||'—'],['Empresa',_cl_xls?.empresa||'—'],['Email',_cl_xls?.email||'—'],['Asesor',_usr_xls?.nombre||'—'],[''],['PARAMETROS',''],['Edad actual',d.edadActual],['Edad de retiro',d.edadRetiro],['Horizonte (años)',d.anios],['Ahorro actual',n(d.ahorroActual)],['Aporte mensual',n(d.aporteMensual)],['Tasa anual (%)',d.tasaAnual],['Meta de retiro',n(d.meta)],[''],['RESULTADOS',''],['Fondo proyectado',n(d.fv)],['Total aportado',n(d.totalAportado)],['Intereses ganados',n(d.totalIntereses)],['Multiplicador',n(d.mult)],['% meta',Math.round(Math.min(100,d.fv/d.meta*100)*10)/10]]);
  wsP['!cols']=[{wch:35},{wch:20}];XLSX.utils.book_append_sheet(wb,wsP,'Parametros');
  const wsC=XLSX.utils.aoa_to_sheet([['Edad','Fondo Total','Total Aportado','Intereses Acumulados'],...d.chart.map(r=>[r.edad,n(r.fondo),n(r.aportado),Math.max(0,r.fondo-r.aportado)])]);
  wsC['!cols']=[{wch:10},{wch:22},{wch:22},{wch:25}];XLSX.utils.book_append_sheet(wb,wsC,'Proyeccion_Anual');
  const wsH=XLSX.utils.aoa_to_sheet([['Hito','Monto Objetivo','Edad Estimada','Estado'],...d.milestones.map(m=>[m.pct+'% de la meta',n(d.meta*m.pct/100),m.edad||'No alcanzado',m.edad?'Alcanzado':'Pendiente'])]);
  wsH['!cols']=[{wch:20},{wch:22},{wch:18},{wch:15}];XLSX.utils.book_append_sheet(wb,wsH,'Hitos');
  const _fn=(_cl_xls?.nombre?_cl_xls.nombre.replace(/[^a-zA-Z0-9]/g,'-').toLowerCase()+'-':'')+'planificacion-retiro';

}

// ── UI Components — ALL DEFINED OUTSIDE App ───────────────────────────────────

function MoneyInput({label,value,onChange,note}){
  const [f,setF]=useState(false);const [r,setR]=useState('');
  return <div>
    {label&&<label style={{fontSize:'.82rem',fontWeight:700,color:'#374151',display:'block',marginBottom:'.35rem'}}>{label}</label>}
    <input className="ni" value={f?r:(value===0?'':new Intl.NumberFormat('es-CO').format(value))}
      onChange={e=>{const d=e.target.value.replace(/[^\d]/g,'');setR(d);onChange(d===''?0:parseInt(d,10));}}
      onFocus={()=>{setF(true);setR(value===0?'':String(value));}} onBlur={()=>setF(false)}
      placeholder="0" inputMode="numeric"/>
    {note&&<p style={{fontSize:'.72rem',color:'#94a3b8',margin:'.2rem 0 0',lineHeight:1.4}}>{note}</p>}
  </div>;
}

function SliderField({label,value,onChange,min,max,step,unit,sfx}){
  const step_=step||1;const unit_=unit||'años';const sfx_=sfx||'';
  return <div>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'.4rem'}}>
      <label style={{fontSize:'.82rem',fontWeight:700,color:'#374151'}}>{label}</label>
      <span style={{fontSize:'1rem',fontWeight:900,color:'#7c3aed',fontFamily:'Sora,sans-serif',letterSpacing:'-.02em'}}>{value}{unit_}{sfx_}</span>
    </div>
    <input type="range" className="slider" min={min} max={max} step={step_} value={value}
      onChange={e=>onChange(step_===1?parseInt(e.target.value):parseFloat(e.target.value))}/>
    <div style={{display:'flex',justifyContent:'space-between',marginTop:'.2rem'}}>
      <span style={{fontSize:'.65rem',color:'#94a3b8'}}>{min}{unit_}</span>
      <span style={{fontSize:'.65rem',color:'#94a3b8'}}>{max}{unit_}</span>
    </div>
  </div>;
}

function ChartTooltip({active,payload,label}){
  if(!active||!payload?.length) return null;
  return <div style={{background:'#fff',border:'1.5px solid #e8edf5',borderRadius:12,padding:'.75rem 1rem',boxShadow:'0 8px 24px rgba(15,23,42,.12)'}}>
    <div style={{fontSize:'.78rem',fontWeight:700,color:'#374151',marginBottom:'.4rem',fontFamily:'Sora,sans-serif'}}>Edad: {label} años</div>
    {payload.map((p,i)=><div key={i} style={{fontSize:'.78rem',color:p.stroke||p.color,fontWeight:600,marginBottom:'.15rem'}}>{p.name}: {COP(p.value)}</div>)}
  </div>;
}

function MilestoneItem({pct,edad,meta}){
  const done=!!edad;
  const icons=['25%','50%','75%','100%'];
  const colors=[{ok:'#0891b2',bg:'#ecfeff',bdr:'#a5f3fc'},{ok:'#7c3aed',bg:'#f5f3ff',bdr:'#ddd6fe'},{ok:'#d97706',bg:'#fffbeb',bdr:'#fde68a'},{ok:'#059669',bg:'#f0fdf4',bdr:'#86efac'}];
  const idx=[25,50,75,100].indexOf(pct);const c=colors[idx]||colors[0];
  return <div style={{display:'flex',alignItems:'center',gap:'.75rem',padding:'.85rem 1rem',background:done?c.bg:'#f8fafc',borderRadius:13,border:'1.5px solid '+(done?c.bdr:'#e8edf5'),marginBottom:'.5rem'}}>
    <div style={{width:38,height:38,borderRadius:11,background:done?c.ok:'#e2e8f0',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'.75rem',fontWeight:900,color:'#fff',fontFamily:'Sora,sans-serif',flexShrink:0}}>{icons[idx]}</div>
    <div style={{flex:1}}>
      <div style={{fontSize:'.88rem',fontWeight:700,color:'#0f172a'}}>{pct}% — {fmtM(meta*pct/100)}</div>
      <div style={{fontSize:'.72rem',color:'#94a3b8'}}>{COP(meta*pct/100)}</div>
    </div>
    {done?<span style={{fontFamily:'Sora,sans-serif',fontSize:'.82rem',fontWeight:800,color:c.ok,flexShrink:0}}>Edad {edad}a</span>
         :<span style={{fontSize:'.75rem',color:'#94a3b8',flexShrink:0}}>No alcanzado</span>}
  </div>;
}

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  const [edadActual,setEdad]=useState(30);
  const [edadRetiro,setRetiro]=useState(65);
  const [ahorroActual,setAhorro]=useState(20000000);
  const [aporteMensual,setAporte]=useState(600000);
  const [tasaAnual,setTasa]=useState(8);
  const [meta,setMeta]=useState(500000000);
  const [gen,setGen]=useState('');
  const [client,setClient]=useState(null);
  const [saved,setSaved]=useState(false);
  const ready=useRef(false);

  useEffect(()=>{
    const auth=sessionStorage.getItem('finsuite_auth');
    if(!auth){window.location.href='../../index.html';return;}
    if(!sessionStorage.getItem('finsuite_current_client')){window.location.href='../../clientes.html';return;}
    const cl=JSON.parse(sessionStorage.getItem('finsuite_current_client')||'null');
    setClient(cl);
    if(cl){
      const raw=localStorage.getItem('finsuite_'+cl.id+'_retiro');
      if(raw){
        try{
          const d=JSON.parse(raw);
          if(d.edadActual) setEdad(d.edadActual);
          if(d.edadRetiro) setRetiro(d.edadRetiro);
          if(d.ahorroActual) setAhorro(d.ahorroActual);
          if(d.aporteMensual) setAporte(d.aporteMensual);
          if(d.tasaAnual) setTasa(d.tasaAnual);
          if(d.meta) setMeta(d.meta);
        }catch(e){console.warn('Error loading retiro data',e);}
      }
    }
    setTimeout(()=>{ready.current=true;},200);
  },[]);

  useEffect(()=>{
    if(!ready.current) return;
    const cl=JSON.parse(sessionStorage.getItem('finsuite_current_client')||'null');
    if(!cl) return;
    const t=setTimeout(()=>{
      localStorage.setItem('finsuite_'+cl.id+'_retiro',JSON.stringify({edadActual,edadRetiro,ahorroActual,aporteMensual,tasaAnual,meta}));
      try{const cls=JSON.parse(localStorage.getItem('finsuite_clients')||'[]');const idx=cls.findIndex(x=>x.id===cl.id);if(idx>=0){cls[idx].updatedAt=new Date().toISOString();localStorage.setItem('finsuite_clients',JSON.stringify(cls));}}catch(e){}
      setSaved(true);setTimeout(()=>setSaved(false),2200);
    },700);
    return ()=>clearTimeout(t);
  },[edadActual,edadRetiro,ahorroActual,aporteMensual,tasaAnual,meta]);

  const anios=Math.max(0,edadRetiro-edadActual);
  const r=tasaAnual/100/12;
  const n=anios*12;

  const fv=useMemo(()=>{
    if(anios<=0) return ahorroActual;
    const fvPV=ahorroActual*Math.pow(1+r,n);
    const fvPMT=r>0?aporteMensual*((Math.pow(1+r,n)-1)/r):aporteMensual*n;
    return fvPV+fvPMT;
  },[ahorroActual,aporteMensual,r,n,anios]);

  const chart=useMemo(()=>{
    let bal=ahorroActual;
    const data=[{edad:edadActual,fondo:Math.round(bal),aportado:Math.round(ahorroActual)}];
    for(let y=1;y<=Math.min(anios,80);y++){
      for(let m=0;m<12;m++) bal=bal*(1+r)+aporteMensual;
      data.push({edad:edadActual+y,fondo:Math.round(bal),aportado:Math.round(ahorroActual+aporteMensual*12*y)});
    }
    return data;
  },[ahorroActual,aporteMensual,r,anios,edadActual]);

  const pct=meta>0?Math.min(100,(fv/meta)*100):100;
  const alcanza=fv>=meta;
  const totalAportado=ahorroActual+aporteMensual*12*anios;
  const totalIntereses=Math.max(0,fv-totalAportado);
  const mult=ahorroActual>0?fv/ahorroActual:0;
  const milestones=[25,50,75,100].map(p=>{const dp=chart.find(d=>d.fondo>=meta*p/100);return{pct:p,edad:dp?dp.edad:null};});

  const dPDF=()=>{setGen('pdf');setTimeout(()=>{generarPDF({edadActual,edadRetiro,ahorroActual,aporteMensual,tasaAnual,meta,anios,fv,totalAportado,totalIntereses,mult,chart,milestones});setGen('');},80);};
  const dXLS=()=>generarExcel({edadActual,edadRetiro,ahorroActual,aporteMensual,tasaAnual,meta,anios,fv,totalAportado,totalIntereses,mult,chart,milestones});

  return <div style={{maxWidth:1200,margin:'0 auto',padding:'1.75rem 1.5rem'}}>
    {/* Header */}
    <div style={{display:'flex',alignItems:'center',gap:'1rem',marginBottom:'1.5rem',flexWrap:'wrap'}}>
      <div style={{background:'#f5f3ff',padding:'.8rem',borderRadius:15,border:'1px solid #ddd6fe'}}>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#7c3aed" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      </div>
      <div style={{flex:1,minWidth:0}}>
        <h1 className="fs" style={{fontSize:'1.3rem',fontWeight:900,color:'#0f172a',margin:0,letterSpacing:'-.03em'}}>Planificación para el Retiro</h1>
        <p style={{color:'#64748b',fontSize:'.84rem',margin:'.15rem 0 0'}}>{client?<><strong style={{color:'#7c3aed'}}>{client.nombre}</strong> — Proyección de fondo pensional</>:'Proyecta tu fondo pensional con interés compuesto.'}</p>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:'.5rem',flexShrink:0}}>
        {saved&&<span style={{fontSize:'.75rem',color:'#059669',display:'flex',alignItems:'center',gap:'.3rem',fontWeight:600}}><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>Guardado</span>}
        <button className="rpt-btn" style={{background:'linear-gradient(135deg,#dc2626,#b91c1c)',color:'#fff'}} onClick={dPDF} disabled={!!gen}>
          {gen==='pdf'?'Generando...':<><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Informe PDF</>}
        </button>
        <button className="rpt-btn" style={{background:'linear-gradient(135deg,#059669,#047857)',color:'#fff'}} onClick={dXLS}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
          Excel
        </button>
      </div>
    </div>

    <div style={{display:'grid',gridTemplateColumns:'340px 1fr',gap:'1.5rem',alignItems:'start'}}>
      {/* Controls */}
      <div style={{display:'flex',flexDirection:'column',gap:'1rem'}}>
        <div className="card" style={{padding:'1.4rem'}}>
          <div style={{fontSize:'.7rem',fontWeight:800,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:'1.1rem'}}>Perfil del ahorrador</div>
          <div style={{display:'flex',flexDirection:'column',gap:'1.2rem'}}>
            <SliderField label="Edad actual" value={edadActual} onChange={setEdad} min={18} max={70}/>
            <SliderField label="Edad de retiro" value={edadRetiro} onChange={v=>setRetiro(Math.max(edadActual+1,v))} min={edadActual+1} max={85}/>
            <div style={{background:'linear-gradient(135deg,#f5f3ff,#ede9fe)',borderRadius:11,padding:'.8rem 1rem',display:'flex',justifyContent:'space-between',alignItems:'center',border:'1px solid #ddd6fe'}}>
              <span style={{fontSize:'.82rem',color:'#6d28d9',fontWeight:600}}>Horizonte de ahorro</span>
              <span className="fs" style={{fontSize:'1.25rem',fontWeight:900,color:'#7c3aed'}}>{anios} <span style={{fontSize:'.75rem',fontWeight:600}}>años</span></span>
            </div>
          </div>
        </div>
        <div className="card" style={{padding:'1.4rem'}}>
          <div style={{fontSize:'.7rem',fontWeight:800,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:'1.1rem'}}>Capital de inversión</div>
          <div style={{display:'flex',flexDirection:'column',gap:'1rem'}}>
            <MoneyInput label="Ahorro actual acumulado" value={ahorroActual} onChange={setAhorro} note="Capital ya ahorrado o invertido hoy"/>
            <MoneyInput label="Aporte mensual" value={aporteMensual} onChange={setAporte} note="Cuánto puedes aportar de forma constante cada mes"/>
          </div>
        </div>
        <div className="card" style={{padding:'1.4rem'}}>
          <div style={{fontSize:'.7rem',fontWeight:800,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:'1.1rem'}}>Parámetros de inversión</div>
          <div style={{display:'flex',flexDirection:'column',gap:'1.2rem'}}>
            <SliderField label="Rendimiento anual esperado" value={tasaAnual} onChange={setTasa} min={1} max={25} step={0.5} unit="%" sfx=" EA"/>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'.5rem',fontSize:'.7rem',color:'#94a3b8'}}>
              <div style={{background:'#f0fdf4',padding:'.4rem .6rem',borderRadius:8,textAlign:'center',border:'1px solid #bbf7d0'}}><div style={{color:'#15803d',fontWeight:700}}>Conservador</div><div>4–6% EA</div></div>
              <div style={{background:'#fef3c7',padding:'.4rem .6rem',borderRadius:8,textAlign:'center',border:'1px solid #fde68a'}}><div style={{color:'#92400e',fontWeight:700}}>Moderado</div><div>7–12% EA</div></div>
            </div>
            <MoneyInput label="Meta total para el retiro" value={meta} onChange={setMeta} note="¿Cuánto necesitas acumulado al jubilarte?"/>
          </div>
        </div>
      </div>

      {/* Results */}
      <div style={{display:'flex',flexDirection:'column',gap:'1rem'}}>
        {/* Hero result */}
        <div style={{background:'linear-gradient(135deg,#4c1d95,#6d28d9,#7c3aed)',borderRadius:20,padding:'1.75rem 2rem',position:'relative',overflow:'hidden'}}>
          <div style={{position:'absolute',top:'-60px',right:'-60px',width:'200px',height:'200px',background:'radial-gradient(circle,rgba(196,181,253,.2),transparent 65%)',pointerEvents:'none'}}/>
          <div style={{position:'relative'}}>
            <div style={{fontSize:'.72rem',fontWeight:700,color:'rgba(255,255,255,.55)',textTransform:'uppercase',letterSpacing:'.12em',marginBottom:'.4rem'}}>Fondo proyectado al retiro</div>
            <div className="fs" style={{fontSize:'clamp(2rem,4.5vw,3.2rem)',fontWeight:900,color:'#fff',letterSpacing:'-.05em',lineHeight:1}}>{fmtM(fv)}</div>
            <div style={{fontSize:'.88rem',color:'rgba(255,255,255,.6)',margin:'.4rem 0 1.25rem'}}>A los {edadRetiro} años · {anios} años de crecimiento compuesto</div>
            <div style={{background:'rgba(255,255,255,.12)',borderRadius:99,height:10,overflow:'hidden',marginBottom:'.4rem'}}>
              <div style={{height:'100%',width:pct+'%',background:'linear-gradient(90deg,#a78bfa,#e9d5ff)',borderRadius:99,transition:'width .6s ease'}}/>
            </div>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:'.78rem',color:'rgba(255,255,255,.55)'}}>
              <span className="fs" style={{fontWeight:700,color:alcanza?'#86efac':'#fcd34d'}}>{N(pct,1)}% de la meta {alcanza?'ALCANZADA':'no alcanzada'}</span>
              <span>Meta: {fmtM(meta)}</span>
            </div>
          </div>
        </div>

        {/* KPIs */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'.85rem'}}>
          {[{l:'Total aportado',v:COP(totalAportado),c:'#7c3aed',bg:'#f5f3ff',b:'#ddd6fe'},{l:'Intereses ganados',v:COP(totalIntereses),c:'#059669',bg:'#f0fdf4',b:'#86efac'},{l:'Multiplicador',v:'x'+N(mult,1),c:'#0891b2',bg:'#ecfeff',b:'#a5f3fc'}].map((k,i)=><div key={i} style={{background:k.bg,border:'1.5px solid '+k.b,borderRadius:14,padding:'1rem 1.1rem'}}>
            <div style={{fontSize:'.7rem',fontWeight:700,color:'#6b7280',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:'.3rem'}}>{k.l}</div>
            <div className="fs" style={{fontSize:'1.1rem',fontWeight:900,color:k.c}}>{k.v}</div>
          </div>)}
        </div>

        {/* Chart */}
        <div className="card" style={{padding:'1.3rem 1.4rem'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'.85rem'}}>
            <div className="fs" style={{fontSize:'.8rem',fontWeight:700,color:'#374151',textTransform:'uppercase',letterSpacing:'.07em'}}>Crecimiento del fondo año a año</div>
            <div style={{display:'flex',gap:'1rem',fontSize:'.73rem',color:'#94a3b8'}}>
              <div style={{display:'flex',alignItems:'center',gap:'.35rem'}}><div style={{width:20,height:2.5,background:'#7c3aed',borderRadius:2}}></div>Fondo total</div>
              <div style={{display:'flex',alignItems:'center',gap:'.35rem'}}><div style={{width:16,height:2,background:'#94a3b8',borderRadius:2,borderTop:'1px dashed #94a3b8'}}></div>Aportado</div>
            </div>
          </div>
          <ResponsiveContainer width="100%" height={230}>
            <AreaChart data={chart} margin={{top:5,right:5,left:0,bottom:0}}>
              <defs>
                <linearGradient id="gFondo" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor="#7c3aed" stopOpacity={0.25}/><stop offset="95%" stopColor="#7c3aed" stopOpacity={0}/></linearGradient>
                <linearGradient id="gAport" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor="#94a3b8" stopOpacity={0.12}/><stop offset="95%" stopColor="#94a3b8" stopOpacity={0}/></linearGradient>
              </defs>
              <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9"/>
              <XAxis dataKey="edad" tickFormatter={v=>v+'a'} tick={{fontSize:10,fill:'#94a3b8'}} axisLine={false} tickLine={false} interval={Math.max(1,Math.floor(anios/8))}/>
              <YAxis tickFormatter={v=>fmtM(v)} tick={{fontSize:10,fill:'#94a3b8'}} axisLine={false} tickLine={false} width={54}/>
              <Tooltip content={<ChartTooltip/>}/>
              {meta>0&&<ReferenceLine y={meta} stroke="#22c55e" strokeDasharray="5 3" strokeWidth={1.5} label={{value:'Meta',position:'right',fill:'#22c55e',fontSize:10}}/>}
              <Area type="monotone" dataKey="aportado" name="Aportado" stroke="#94a3b8" strokeDasharray="4 3" strokeWidth={1.5} fill="url(#gAport)"/>
              <Area type="monotone" dataKey="fondo" name="Fondo total" stroke="#7c3aed" strokeWidth={2.5} fill="url(#gFondo)"/>
            </AreaChart>
          </ResponsiveContainer>
        </div>

        {/* Milestones */}
        <div className="card" style={{padding:'1.3rem 1.4rem'}}>
          <div className="fs" style={{fontSize:'.8rem',fontWeight:700,color:'#374151',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:'1rem'}}>Hitos hacia la meta</div>
          {milestones.map(m=><MilestoneItem key={m.pct} pct={m.pct} edad={m.edad} meta={meta}/>)}
        </div>
      </div>
    </div>
  </div>;
}

createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>if(!sessionStorage.getItem('finsuite_auth'))window.location.href='../../index.html';if(!sessionStorage.getItem('finsuite_current_client'))window.location.href='../../clientes.html';</script>
</body>
</html>
