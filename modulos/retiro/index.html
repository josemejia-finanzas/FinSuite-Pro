<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Planificación para el Retiro — FinSuite Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
    <script type="importmap">{"imports":{"react":"https://esm.sh/react@18.2.0","react-dom/client":"https://esm.sh/react-dom@18.2.0/client","recharts":"https://esm.sh/recharts@2.12.0?deps=react@18.2.0","lucide-react":"https://esm.sh/lucide-react@0.292.0"}}</script>
    <style>
        body{font-family:'DM Sans',sans-serif;background:#f8fafc;margin:0;}
        .font-sora{font-family:'Sora',sans-serif;}
        ::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px;}
        .suite-bar{background:#0f172a;height:44px;display:flex;align-items:center;padding:0 1.25rem;gap:.6rem;position:sticky;top:0;z-index:50;}
        .suite-bar a{color:#94a3b8;text-decoration:none;font-size:.8rem;font-weight:600;padding:.3rem .65rem;border-radius:8px;display:flex;align-items:center;gap:.45rem;transition:all .2s;}
        .suite-bar a:hover{background:rgba(255,255,255,.07);color:#f1f5f9;}
        .suite-bar .sep{color:rgba(255,255,255,.2);}
        .suite-bar .cur{color:#c4b5fd;font-size:.8rem;font-weight:700;}
        .card{background:#fff;border-radius:16px;border:1px solid #e2e8f0;padding:1.4rem;}
        .stitle{font-family:'Sora',sans-serif;font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:1rem;}
        .ni{width:100%;border:1.5px solid #e2e8f0;border-radius:10px;padding:.65rem .85rem;font-size:.9rem;font-family:'DM Sans',sans-serif;outline:none;transition:border .2s;}
        .ni:focus{border-color:#7c3aed;box-shadow:0 0 0 3px rgba(124,58,237,.1);}
        .slider{width:100%;height:6px;border-radius:3px;background:#e2e8f0;-webkit-appearance:none;outline:none;cursor:pointer;}
        .slider::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#7c3aed;cursor:pointer;box-shadow:0 2px 6px rgba(124,58,237,.4);}
        .milestone{border-radius:10px;padding:.7rem 1rem;display:flex;align-items:center;gap:.75rem;}
    </style>
</head>
<body>
<div class="suite-bar">
    <a href="../../index.html">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        Inicio
    </a>
    <span class="sep">›</span>
    <span class="cur">Planificación para el Retiro</span>
    <div style="margin-left:auto;background:linear-gradient(135deg,#2563eb,#4f46e5);padding:.28rem .65rem;border-radius:7px;">
        <span style="color:#fff;font-size:.68rem;font-weight:700;letter-spacing:.05em;">FinSuite Pro</span>
    </div>
</div>
<div id="root"></div>
<script type="text/babel" data-type="module">
import React, { useState, useMemo } from 'react';
import { createRoot } from 'react-dom/client';
import { AreaChart, Area, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer } from 'recharts';

const fmt = v => new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP',minimumFractionDigits:0,maximumFractionDigits:0}).format(v||0);
const fmtN = (v,d=1) => new Intl.NumberFormat('es-CO',{minimumFractionDigits:0,maximumFractionDigits:d}).format(v||0);
const fmtM = v => v>=1e9?`${fmtN(v/1e9,2)}B`:v>=1e6?`${fmtN(v/1e6,2)}M`:v>=1e3?`${fmtN(v/1e3,1)}K`:fmt(v);

function NumInput({label, value, onChange, note, min=0}){
    const display = value===0?'': new Intl.NumberFormat('es-CO').format(value);
    return (
        <div>
            <label style={{fontSize:'.82rem',fontWeight:600,color:'#374151',display:'block',marginBottom:'.3rem'}}>{label}</label>
            <input className="ni" value={display} onChange={e=>{const s=e.target.value.replace(/[^\d]/g,'');onChange(s===''?0:parseInt(s,10));}} placeholder="0"/>
            {note && <p style={{fontSize:'.72rem',color:'#9ca3af',marginTop:'.25rem'}}>{note}</p>}
        </div>
    );
}

function App(){
    const [edadActual, setEdadActual]     = useState(30);
    const [edadRetiro, setEdadRetiro]     = useState(65);
    const [ahorroActual, setAhorroActual] = useState(20000000);
    const [aporteMensual, setAporteMensual] = useState(600000);
    const [tasaAnual, setTasaAnual]       = useState(8);
    const [metaRetiro, setMetaRetiro]     = useState(500000000);

    const anios = Math.max(0, edadRetiro - edadActual);
    const r     = tasaAnual / 100 / 12;
    const n     = anios * 12;

    const fv = useMemo(()=>{
        if(anios <= 0) return ahorroActual;
        const fvPV  = ahorroActual * Math.pow(1 + r, n);
        const fvPMT = r > 0 ? aporteMensual * ((Math.pow(1+r,n)-1)/r) : aporteMensual * n;
        return fvPV + fvPMT;
    },[ahorroActual, aporteMensual, r, n, anios]);

    const chartData = useMemo(()=>{
        let balance = ahorroActual;
        const data = [{año: edadActual, fondo: balance, ahorros: ahorroActual, interes: 0}];
        for(let y=1; y<=anios; y++){
            let fondoAnterior = balance;
            for(let m=0; m<12; m++){
                const int = balance * r;
                balance += int + aporteMensual;
            }
            data.push({
                año: edadActual + y,
                fondo: Math.round(balance),
                ahorros: Math.round(ahorroActual + aporteMensual * 12 * y),
                interes: Math.round(balance - (ahorroActual + aporteMensual*12*y)),
            });
        }
        return data;
    },[ahorroActual, aporteMensual, r, anios, edadActual]);

    const metaAlcanzada = fv >= metaRetiro;
    const porcentajeMeta = metaRetiro > 0 ? Math.min(100, (fv/metaRetiro)*100) : 100;
    const multiplicador  = ahorroActual > 0 ? fv / ahorroActual : 0;
    const totalAportado  = ahorroActual + aporteMensual * 12 * anios;
    const totalIntereses = fv - totalAportado;

    const milestones = [
        {pct:25, label:'25% de la meta'},
        {pct:50, label:'50% de la meta'},
        {pct:75, label:'75% de la meta'},
        {pct:100, label:'Meta alcanzada 🎉'},
    ].map(m => {
        // find the year when fondo >= metaRetiro * m.pct / 100
        const target = metaRetiro * m.pct / 100;
        const dp = chartData.find(d => d.fondo >= target);
        return {...m, edad: dp ? dp.año : null};
    });

    return (
        <div style={{maxWidth:1100,margin:'0 auto',padding:'1.5rem'}}>
            <div style={{marginBottom:'1.5rem',display:'flex',alignItems:'center',gap:'.75rem'}}>
                <div style={{background:'#f5f3ff',padding:'.6rem',borderRadius:12}}>
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#7c3aed" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 5c-1.5 0-2.8 1.4-3 2-3.5 1.5-7.5 1.5-11 0-.2-.6-1.5-2-3-2H2C2 5 .8 6.3 1 8c.5 3 2.3 5.5 4.5 6.5l-.5 2a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1l-.5-2c2.2-1 4-3.5 4.5-6.5.2-1.7-1-3-1-3h-1z"/></svg>
                </div>
                <div>
                    <h1 className="font-sora" style={{fontSize:'1.3rem',fontWeight:800,color:'#0f172a',margin:0}}>Planificación para el Retiro</h1>
                    <p style={{color:'#64748b',fontSize:'.82rem',margin:0}}>Proyecta tu fondo de retiro con interés compuesto y aportes mensuales sistemáticos.</p>
                </div>
            </div>

            <div style={{display:'grid',gridTemplateColumns:'340px 1fr',gap:'1.5rem'}}>
                {/* INPUTS */}
                <div style={{display:'flex',flexDirection:'column',gap:'1rem'}}>
                    <div className="card">
                        <div className="stitle" style={{color:'#7c3aed'}}>👤 Datos personales</div>
                        <div style={{display:'flex',flexDirection:'column',gap:'1rem'}}>
                            <div>
                                <div style={{display:'flex',justifyContent:'space-between',marginBottom:'.3rem'}}>
                                    <label style={{fontSize:'.82rem',fontWeight:600,color:'#374151'}}>Edad actual</label>
                                    <span className="font-sora" style={{fontSize:'.9rem',fontWeight:700,color:'#7c3aed'}}>{edadActual} años</span>
                                </div>
                                <input type="range" className="slider" min="18" max="70" value={edadActual} onChange={e=>setEdadActual(parseInt(e.target.value))}/>
                            </div>
                            <div>
                                <div style={{display:'flex',justifyContent:'space-between',marginBottom:'.3rem'}}>
                                    <label style={{fontSize:'.82rem',fontWeight:600,color:'#374151'}}>Edad de retiro</label>
                                    <span className="font-sora" style={{fontSize:'.9rem',fontWeight:700,color:'#7c3aed'}}>{edadRetiro} años</span>
                                </div>
                                <input type="range" className="slider" min={edadActual+1} max="85" value={edadRetiro} onChange={e=>setEdadRetiro(parseInt(e.target.value))}/>
                            </div>
                            <div style={{background:'#f5f3ff',borderRadius:10,padding:'.75rem',textAlign:'center'}}>
                                <span style={{fontSize:'.82rem',color:'#7c3aed'}}>Tiempo de ahorro:</span>
                                <span className="font-sora" style={{fontSize:'1.1rem',fontWeight:800,color:'#6d28d9',marginLeft:'.5rem'}}>{anios} años</span>
                            </div>
                        </div>
                    </div>

                    <div className="card">
                        <div className="stitle" style={{color:'#7c3aed'}}>💰 Ahorros y aportes</div>
                        <div style={{display:'flex',flexDirection:'column',gap:.9+'rem'}}>
                            <NumInput label="Ahorro actual acumulado" value={ahorroActual} onChange={setAhorroActual} note="Capital inicial que ya tienes ahorrado"/>
                            <NumInput label="Aporte mensual" value={aporteMensual} onChange={setAporteMensual} note="Cuánto puedes aportar cada mes"/>
                        </div>
                    </div>

                    <div className="card">
                        <div className="stitle" style={{color:'#7c3aed'}}>📈 Parámetros de inversión</div>
                        <div style={{marginBottom:'1rem'}}>
                            <div style={{display:'flex',justifyContent:'space-between',marginBottom:'.3rem'}}>
                                <label style={{fontSize:'.82rem',fontWeight:600,color:'#374151'}}>Tasa de rendimiento anual</label>
                                <span className="font-sora" style={{fontSize:'.9rem',fontWeight:700,color:'#7c3aed'}}>{tasaAnual}% EA</span>
                            </div>
                            <input type="range" className="slider" min="1" max="25" step="0.5" value={tasaAnual} onChange={e=>setTasaAnual(parseFloat(e.target.value))}/>
                            <div style={{display:'flex',justifyContent:'space-between',marginTop:'.25rem'}}>
                                <span style={{fontSize:'.7rem',color:'#94a3b8'}}>Conservador (4-6%)</span>
                                <span style={{fontSize:'.7rem',color:'#94a3b8'}}>Agresivo (12-15%)</span>
                            </div>
                        </div>
                        <NumInput label="Meta de fondo para retiro" value={metaRetiro} onChange={setMetaRetiro} note="¿Cuánto quieres tener al jubilarte?"/>
                    </div>
                </div>

                {/* RESULTADOS */}
                <div style={{display:'flex',flexDirection:'column',gap:'1rem'}}>
                    {/* Gran número */}
                    <div style={{background:'linear-gradient(135deg,#4c1d95,#7c3aed)',borderRadius:18,padding:'1.75rem',color:'#fff',textAlign:'center'}}>
                        <div style={{fontSize:'.82rem',fontWeight:600,color:'rgba(255,255,255,.7)',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:'.5rem'}}>Fondo proyectado al retiro</div>
                        <div className="font-sora" style={{fontSize:'clamp(1.8rem,4vw,2.6rem)',fontWeight:800,letterSpacing:'-.03em',marginBottom:'.25rem'}}>{fmtM(fv)}</div>
                        <div style={{fontSize:'.9rem',color:'rgba(255,255,255,.7)'}}>A los {edadRetiro} años · {anios} años de ahorro</div>
                        <div style={{marginTop:'1.25rem',background:'rgba(255,255,255,.1)',borderRadius:999,height:'10px',overflow:'hidden'}}>
                            <div style={{height:'100%',width:`${porcentajeMeta}%`,background:'linear-gradient(90deg,#a78bfa,#c4b5fd)',borderRadius:999,transition:'width .5s'}}></div>
                        </div>
                        <div style={{fontSize:'.82rem',color:'rgba(255,255,255,.7)',marginTop:'.4rem'}}>{fmtN(porcentajeMeta)}% de tu meta · {metaAlcanzada?'✅ Meta alcanzada':'Sigue ahorrando'}</div>
                    </div>

                    {/* KPIs */}
                    <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'.85rem'}}>
                        {[
                            {label:'Total Aportado',val:fmt(totalAportado),color:'#7c3aed',bg:'#f5f3ff'},
                            {label:'Intereses Ganados',val:fmt(Math.max(0,totalIntereses)),color:'#059669',bg:'#f0fdf4'},
                            {label:'Multiplicador',val:`×${fmtN(multiplicador,1)}`,color:'#0891b2',bg:'#ecfeff'},
                        ].map(k=>(
                            <div key={k.label} className="card" style={{padding:'1rem',textAlign:'center',background:k.bg}}>
                                <div style={{fontSize:'.7rem',fontWeight:700,color:'#6b7280',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:'.35rem'}}>{k.label}</div>
                                <div className="font-sora" style={{fontSize:'1.05rem',fontWeight:800,color:k.color}}>{k.val}</div>
                            </div>
                        ))}
                    </div>

                    {/* Gráfico */}
                    <div className="card">
                        <div className="stitle" style={{color:'#374151'}}>📈 Crecimiento del fondo año a año</div>
                        <ResponsiveContainer width="100%" height={220}>
                            <AreaChart data={chartData} margin={{top:5,right:10,left:0,bottom:5}}>
                                <defs>
                                    <linearGradient id="gFondo" x1="0" y1="0" x2="0" y2="1">
                                        <stop offset="5%" stopColor="#7c3aed" stopOpacity={0.3}/>
                                        <stop offset="95%" stopColor="#7c3aed" stopOpacity={0.02}/>
                                    </linearGradient>
                                    <linearGradient id="gAhorros" x1="0" y1="0" x2="0" y2="1">
                                        <stop offset="5%" stopColor="#94a3b8" stopOpacity={0.2}/>
                                        <stop offset="95%" stopColor="#94a3b8" stopOpacity={0.02}/>
                                    </linearGradient>
                                </defs>
                                <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9"/>
                                <XAxis dataKey="año" tick={{fontSize:10,fill:'#94a3b8'}} axisLine={false} tickLine={false} interval={Math.max(1,Math.floor(anios/8))}/>
                                <YAxis tickFormatter={v=>fmtM(v)} tick={{fontSize:10,fill:'#94a3b8'}} axisLine={false} tickLine={false} width={55}/>
                                <Tooltip formatter={v=>fmt(v)} labelFormatter={v=>`Edad: ${v} años`}/>
                                <Area type="monotone" dataKey="ahorros" name="Aportado" stroke="#94a3b8" fill="url(#gAhorros)" strokeWidth={1.5} strokeDasharray="4 2"/>
                                <Area type="monotone" dataKey="fondo" name="Fondo Total" stroke="#7c3aed" fill="url(#gFondo)" strokeWidth={2.5}/>
                            </AreaChart>
                        </ResponsiveContainer>
                    </div>

                    {/* Hitos */}
                    <div className="card">
                        <div className="stitle" style={{color:'#374151'}}>🏆 Hitos de la Meta</div>
                        {milestones.map((m,i)=>(
                            <div key={i} className="milestone" style={{background: m.edad ? '#f0fdf4':'#f8fafc',marginBottom:'.5rem',border:`1.5px solid ${m.edad?'#86efac':'#e2e8f0'}`}}>
                                <div style={{width:36,height:36,borderRadius:10,background:m.edad?'#dcfce7':'#f1f5f9',display:'flex',alignItems:'center',justifyContent:'center'}}>
                                    <span style={{fontSize:'1rem'}}>{m.edad?'✅':'⏳'}</span>
                                </div>
                                <div style={{flex:1}}>
                                    <div style={{fontSize:'.85rem',fontWeight:700,color:'#1e293b'}}>{m.label}</div>
                                    <div style={{fontSize:'.75rem',color:'#94a3b8'}}>{fmt(metaRetiro*m.pct/100)}</div>
                                </div>
                                {m.edad
                                    ? <span className="font-sora" style={{fontSize:'.82rem',fontWeight:700,color:'#15803d'}}>A los {m.edad} años</span>
                                    : <span style={{fontSize:'.78rem',color:'#9ca3af'}}>No alcanzado</span>
                                }
                            </div>
                        ))}
                    </div>
                </div>
            </div>
        </div>
    );
}

const root = createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
<script>if(!sessionStorage.getItem('finsuite_auth'))window.location.href='../../index.html';</script>
</body>
</html>
