// ── Math functions ────────────────────────────────────────────────────────────
function calcNPV(r,inv,flows){
  return -inv+flows.reduce((acc,cf,i)=>acc+cf/Math.pow(1+r,i+1),0);
}
function calcIRR(inv,flows){
  if(!flows.some(f=>f>0)) return null;
  let lo=-0.99,hi=10;
  for(let i=0;i<300;i++){
    const mid=(lo+hi)/2,v=calcNPV(mid,inv,flows);
    if(Math.abs(v)<0.1) return mid*100;
    v>0?lo=mid:hi=mid;
  }
  return null;
}

// ── Formatters ────────────────────────────────────────────────────────────────
const COP=v=>new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP',minimumFractionDigits:0,maximumFractionDigits:0}).format(v||0);
const N=(v,d=2)=>new Intl.NumberFormat('es-CO',{minimumFractionDigits:0,maximumFractionDigits:d}).format(v||0);
const fmtM=v=>{const a=Math.abs(v);return a>=1e9?N(v/1e9,2)+'B':a>=1e6?N(v/1e6,2)+'M':a>=1e3?N(v/1e3,1)+'K':COP(v);};

const YRC=['#0891b2','#06b6d4','#0e7490','#155e75','#164e63','#0c4a6e','#1e3a5f','#1e40af','#1d4ed8','#2563eb'];

// ── PDF helpers ───────────────────────────────────────────────────────────────
function pdfClientBlock(doc,client,user){
  const W=doc.internal.pageSize.getWidth();const M=14;const y0=43;const bh=36;
  doc.setFillColor(248,250,252);doc.roundedRect(M,y0,W-M*2,bh,3,3,'F');
  doc.setDrawColor(220,228,240);doc.setLineWidth(.4);doc.roundedRect(M,y0,W-M*2,bh,3,3,'S');
  doc.setFillColor(8,145,178);doc.roundedRect(M,y0,3,bh,1.5,1.5,'F');
  doc.setFont('helvetica','normal');doc.setFontSize(6.5);doc.setTextColor(148,163,184);
  doc.text('CLIENTE',M+8,y0+7);
  doc.setFont('helvetica','bold');doc.setFontSize(10.5);doc.setTextColor(15,23,42);
  doc.text(client?.nombre||'Sin cliente',M+8,y0+15);
  const sub2=[];if(client?.empresa)sub2.push(client.empresa);if(client?.tipo)sub2.push(client.tipo);
  if(sub2.length){doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(100,116,139);doc.text(sub2.join(' · '),M+8,y0+22);}
  if(client?.tipoDoc&&client?.numeroDoc){const lbl=client.tipoDoc==='Cédula de Ciudadanía'?'CC':'NIT';doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(71,85,105);doc.text(lbl+': '+client.numeroDoc,M+8,y0+29);}
  const midX=W/2;doc.setDrawColor(226,232,240);doc.setLineWidth(.3);doc.line(midX,y0+6,midX,y0+bh-6);
  const rx=midX+8;let ry=y0+9;const ri=[];
  if(client?.email)ri.push('Email: '+client.email);
  if(client?.celular||client?.telefono)ri.push('Tel: '+(client.celular||client.telefono));
  if(client?.ciudad)ri.push('Ciudad: '+client.ciudad);
  doc.setFont('helvetica','normal');doc.setFontSize(7.5);doc.setTextColor(100,116,139);
  ri.forEach(item=>{if(ry<y0+bh-5){doc.text(item,rx,ry);ry+=5.8;}});
  doc.setFont('helvetica','italic');doc.setFontSize(7);doc.setTextColor(148,163,184);
  doc.text('Asesor: '+(user?.nombre||'No especificado'),W-M-5,y0+bh-7,{align:'right'});
  return y0+bh+10;
}

function generarPDF(params){
  const {inv,tasa,nY,flowsArr,npv,irr,payback,totalVP,totalFlujos,breakdown} = params;
  const {jsPDF}=window.jspdf;const doc=new jsPDF('p','mm','a4');const M=14;const W=doc.internal.pageSize.getWidth();const H=doc.internal.pageSize.getHeight();
  const cl=JSON.parse(sessionStorage.getItem('finsuite_current_client')||'null');
  const usr=JSON.parse(sessionStorage.getItem('finsuite_auth')||'null');
  const addFooters=()=>{const pg=doc.getNumberOfPages();for(let i=1;i<=pg;i++){doc.setPage(i);doc.setFillColor(248,250,252);doc.rect(0,H-10,W,10,'F');doc.setFont('helvetica','normal');doc.setFontSize(7.5);doc.setTextColor(148,163,184);doc.text('FinSuite Pro v1.2 — Valoracion de Proyectos',M,H-3.5);doc.text('Pag. '+i+' de '+pg,W-M,H-3.5,{align:'right'});}};
  doc.setFillColor(7,89,133);doc.rect(0,0,W,36,'F');doc.setFillColor(8,145,178);doc.rect(0,36,W,3,'F');
  doc.setFont('helvetica','bold');doc.setFontSize(20);doc.setTextColor(241,245,249);doc.text('FinSuite Pro',M,16);
  doc.setFont('helvetica','normal');doc.setFontSize(10);doc.setTextColor(165,243,252);
  doc.text('Valoracion de Proyectos e Inversiones',M,27);
  doc.text('Generado: '+new Date().toLocaleDateString('es-CO',{day:'2-digit',month:'long',year:'numeric'}),W-M,27,{align:'right'});
  let y=pdfClientBlock(doc,cl,usr);
  // Veredicto
  const ok=npv>0;
  doc.setFillColor(ok?6:127,ok?78:29,ok?59:29);doc.roundedRect(M,y,W-M*2,20,3,3,'F');
  doc.setFont('helvetica','bold');doc.setFontSize(13);doc.setTextColor(255,255,255);
  doc.text('PROYECTO '+(ok?'VIABLE':'NO VIABLE'),M+6,y+9);
  doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(ok?134:252,ok?239:165,ok?172:165);
  doc.text(ok?'VPN positivo: genera valor por encima del costo del capital':'VPN negativo: no cubre el costo de oportunidad del '+tasa+'% EA',M+6,y+17);
  y+=28;
  doc.autoTable({startY:y,head:[['Parametro','Valor']],body:[['Inversion inicial',COP(inv)],['Tasa de descuento',tasa+'% EA'],['Horizonte',nY+' anos'],['Flujos sin descontar',COP(totalFlujos)]],theme:'grid',margin:{left:M,right:M},headStyles:{fillColor:[7,89,133],textColor:[255,255,255],fontSize:9,fontStyle:'bold'},bodyStyles:{fontSize:8.5},alternateRowStyles:{fillColor:[236,254,255]},columnStyles:{1:{halign:'right',fontStyle:'bold'}},didDrawPage:addFooters});
  y=doc.lastAutoTable.finalY+8;
  doc.autoTable({startY:y,head:[['Indicador','Valor','Interpretacion']],body:[['VPN',COP(npv),npv>0?'Positivo — genera valor':'Negativo — destruye valor'],['TIR',irr!==null?N(irr,2)+'%':'N/A',irr!==null?(irr>tasa?'Mayor que tasa requerida':'Menor que tasa requerida'):'No calculable'],['Payback',payback?payback+' ano(s)':'No recupera',payback?'Recuperacion en ano '+payback:'No se recupera'],['VP Total',COP(totalVP),'Flujos traidos a hoy']],theme:'grid',margin:{left:M,right:M},headStyles:{fillColor:[8,145,178],textColor:[255,255,255],fontSize:9,fontStyle:'bold'},bodyStyles:{fontSize:8.5},alternateRowStyles:{fillColor:[236,254,255]},columnStyles:{1:{halign:'right',fontStyle:'bold'},2:{textColor:[100,116,139]}},didDrawPage:addFooters});
  y=doc.lastAutoTable.finalY+10;
  if(y>H-80){doc.addPage();y=20;}
  doc.setFont('helvetica','bold');doc.setFontSize(10.5);doc.setTextColor(7,89,133);
  doc.text('DESGLOSE DE FLUJOS',M,y);doc.setDrawColor(7,89,133);doc.setLineWidth(.3);doc.line(M,y+1.5,W-M,y+1.5);y+=9;
  doc.autoTable({startY:y,head:[['Ano','Flujo Nominal','Factor VP','Valor Presente','Acumulado']],body:[['0 (Inversion)',COP(-inv),'1.0000',COP(-inv),COP(-inv)],...breakdown.map(b=>['Ano '+b.ano,COP(b.flujo),b.factor.toFixed(4),COP(b.vp),COP(b.acum)]),['TOTALES',COP(totalFlujos),'—',COP(totalVP),COP(npv)]],theme:'striped',margin:{left:M,right:M},headStyles:{fillColor:[7,89,133],textColor:[255,255,255],fontSize:8.5,fontStyle:'bold'},bodyStyles:{fontSize:8},alternateRowStyles:{fillColor:[236,254,255]},columnStyles:{0:{halign:'center'},1:{halign:'right'},2:{halign:'center'},3:{halign:'right'},4:{halign:'right'}},didDrawPage:addFooters});
  addFooters();
  const fn=(cl?.nombre?cl.nombre.replace(/[^a-zA-Z0-9]/g,'-').toLowerCase()+'-':'')+'valoracion-proyecto';
  doc.save(fn+'.pdf');
}

function generarExcel(params){
  const {inv,tasa,nY,flowsArr,npv,irr,payback,totalVP,totalFlujos,breakdown}=params;
  const XLSX=window.XLSX;const wb=XLSX.utils.book_new();const n=v=>Number(v)||0;
  const cl=JSON.parse(sessionStorage.getItem('finsuite_current_client')||'null');
  const usr=JSON.parse(sessionStorage.getItem('finsuite_auth')||'null');
  const wsR=XLSX.utils.aoa_to_sheet([['VALORACION DE PROYECTO — FinSuite Pro v1.2'],['Fecha',new Date().toLocaleDateString('es-CO')],[''],['DATOS DEL CLIENTE',''],['Nombre',cl?.nombre||'—'],[cl?.tipoDoc||'Documento',cl?.numeroDoc||'—'],['Empresa',cl?.empresa||'—'],['Email',cl?.email||'—'],['Asesor',usr?.nombre||'—'],[''],['PARAMETROS',''],['Inversion inicial',n(inv)],['Tasa descuento (%)',tasa],['Horizonte (anos)',nY],[''],['RESULTADOS',''],['VPN',n(npv)],['TIR (%)',irr!==null?n(irr):'N/A'],['Payback (anos)',payback||'No recupera'],['VP Total',n(totalVP)],['Flujos sin descontar',n(totalFlujos)]]);
  wsR['!cols']=[{wch:35},{wch:20}];XLSX.utils.book_append_sheet(wb,wsR,'Resumen');
  const wsF=XLSX.utils.aoa_to_sheet([['Ano','Flujo Nominal','Factor VP','Valor Presente','Flujo Acumulado'],['0 (Inversion)',-n(inv),1,-n(inv),-n(inv)],...breakdown.map(b=>['Ano '+b.ano,n(b.flujo),b.factor,n(b.vp),n(b.acum)]),['TOTALES',n(totalFlujos),'',n(totalVP),n(npv)]]);
  wsF['!cols']=[{wch:15},{wch:22},{wch:14},{wch:22},{wch:22}];XLSX.utils.book_append_sheet(wb,wsF,'Flujos_de_Caja');
  const sensRows=[];for(let rt=0;rt<=0.5;rt+=0.025) sensRows.push([Math.round(rt*100),Math.round(calcNPV(rt,inv,flowsArr))]);
  const wsS=XLSX.utils.aoa_to_sheet([['Tasa (%)','VPN (COP)'],...sensRows]);
  wsS['!cols']=[{wch:15},{wch:22}];XLSX.utils.book_append_sheet(wb,wsS,'Sensibilidad_VPN');
  const fn=(cl?.nombre?cl.nombre.replace(/[^a-zA-Z0-9]/g,'-').toLowerCase()+'-':'')+'valoracion-proyecto';
  XLSX.writeFile(wb,fn+'.xlsx');
}

// ── UI Components — ALL OUTSIDE App ──────────────────────────────────────────
function MoneyInput({label,value,onChange,note,style}){
  const [focused,setFocused]=useState(false);
  const [raw,setRaw]=useState('');
  const disp=focused?raw:(value===0?'':new Intl.NumberFormat('es-CO').format(value));
  return (
    <div style={style}>
      {label&&<label style={{fontSize:'.82rem',fontWeight:700,color:'#374151',display:'block',marginBottom:'.35rem'}}>{label}</label>}
      <input className="ni" style={{textAlign:'right'}} value={disp}
        onChange={e=>{const d=e.target.value.replace(/[^\d]/g,'');setRaw(d);onChange(d===''?0:parseInt(d,10));}}

      {note&&<p style={{fontSize:'.72rem',color:'#94a3b8',margin:'.2rem 0 0'}}>{note}</p>}

function SliderField({label,value,onChange,min,max,step,unit,sfx}){

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  const [inv,setInv]=useState(100000000);
  const [tasa,setTasa]=useState(12);
  const [nY,setNY]=useState(5);
  const [flujos,setFlujos]=useState([30000000,45000000,50000000,55000000,60000000,0,0,0,0,0]);
  const [gen,setGen]=useState('');
  const [client,setClient]=useState(null);
  const [saved,setSaved]=useState(false);
  const ready=useRef(false);

  useEffect(()=>{
    const auth=sessionStorage.getItem('finsuite_auth');
    if(!auth){window.location.href='../../index.html';return;}
    if(!sessionStorage.getItem('finsuite_current_client')){window.location.href='../../clientes.html';return;}
    const cl=JSON.parse(sessionStorage.getItem('finsuite_current_client')||'null');
    setClient(cl);
    if(cl){
      const raw=localStorage.getItem('finsuite_'+cl.id+'_valoracion');
      if(raw){
        try{
          const d=JSON.parse(raw);
          if(typeof d.inv==='number') setInv(d.inv);
          if(typeof d.tasa==='number') setTasa(d.tasa);
          if(typeof d.nY==='number') setNY(d.nY);
          if(Array.isArray(d.flujos)) setFlujos(d.flujos);
        }catch(e){console.warn('Load error',e);}
      }
    }
    setTimeout(()=>{ready.current=true;},200);
  },[]);

  useEffect(()=>{
    if(!ready.current) return;
    const cl=JSON.parse(sessionStorage.getItem('finsuite_current_client')||'null');
    if(!cl) return;
    const t=setTimeout(()=>{
      localStorage.setItem('finsuite_'+cl.id+'_valoracion',JSON.stringify({inv,tasa,nY,flujos}));
      try{const cls=JSON.parse(localStorage.getItem('finsuite_clients')||'[]');const idx=cls.findIndex(x=>x.id===cl.id);if(idx>=0){cls[idx].updatedAt=new Date().toISOString();localStorage.setItem('finsuite_clients',JSON.stringify(cls));}}catch(e){}
      setSaved(true);setTimeout(()=>setSaved(false),2000);
    },700);
    return ()=>clearTimeout(t);
  },[inv,tasa,nY,flujos]);

  const setFlujo=(i,v)=>setFlujos(f=>f.map((x,j)=>j===i?v:x));
  const flowsArr=flujos.slice(0,nY);
  const r=tasa/100;

  const npv=useMemo(()=>calcNPV(r,inv,flowsArr),[r,inv,flowsArr]);
  const irr=useMemo(()=>calcIRR(inv,flowsArr),[inv,flowsArr]);
  const viable=npv>0;

  const breakdown=useMemo(()=>{
    let cumul=-inv;
    return flowsArr.map((cf,i)=>{
      const factor=1/Math.pow(1+r,i+1);
      const vp=Math.round(cf*factor);
      cumul+=cf;
      return{ano:i+1,flujo:cf,factor,vp,acum:Math.round(cumul)};
    });
  },[flowsArr,r,inv]);

  const payback=useMemo(()=>{
    const found=breakdown.find(b=>b.acum>=0);
    return found?found.ano:null;
  },[breakdown]);

  const totalVP=useMemo(()=>breakdown.reduce((a,b)=>a+b.vp,0),[breakdown]);
  const totalFlujos=useMemo(()=>flowsArr.reduce((a,b)=>a+b,0),[flowsArr]);
  const barData=useMemo(()=>breakdown.map(b=>({name:'Año '+b.ano,nominal:b.flujo,vp:b.vp})),[breakdown]);
  const sensData=useMemo(()=>{
    const pts=[];
    for(let rt=0;rt<=0.5;rt+=0.025) pts.push({tasa:Math.round(rt*100),npv:Math.round(calcNPV(rt,inv,flowsArr))});
    return pts;
  },[inv,flowsArr]);

  const params={inv,tasa,nY,flowsArr,npv,irr,payback,totalVP,totalFlujos,breakdown};
  const doPDF=()=>{setGen('pdf');setTimeout(()=>{generarPDF(params);setGen('');},80);};
  const doXLS=()=>generarExcel(params);

  return (
    <div style={{maxWidth:1260,margin:'0 auto',padding:'1.75rem 1.5rem'}}>
      {/* Header */}
      <div style={{display:'flex',alignItems:'center',gap:'1rem',marginBottom:'1.5rem',flexWrap:'wrap'}}>
        <div style={{background:'#ecfeff',padding:'.8rem',borderRadius:15,border:'1px solid #a5f3fc'}}>
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#0891b2" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
        </div>
        <div style={{flex:1,minWidth:0}}>
          <h1 className="fs" style={{fontSize:'1.3rem',fontWeight:900,color:'#0f172a',margin:0,letterSpacing:'-.03em'}}>Valoración de Proyectos e Inversiones</h1>
          <p style={{color:'#64748b',fontSize:'.84rem',margin:'.15rem 0 0'}}>
            {client?<><strong style={{color:'#0891b2'}}>{client.nombre}</strong> — VPN, TIR y período de recuperación</>:'Calcula VPN, TIR y payback para evaluar viabilidad económica.'}
          </p>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:'.5rem',flexShrink:0}}>
          {saved&&<span style={{fontSize:'.75rem',color:'#059669',fontWeight:600,display:'flex',alignItems:'center',gap:'.3rem'}}><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>Guardado</span>}
          <div style={{background:viable?'#dcfce7':'#fee2e2',border:'1.5px solid '+(viable?'#86efac':'#fca5a5'),borderRadius:10,padding:'.4rem .85rem'}}>
            <span className="fs" style={{fontSize:'.78rem',fontWeight:800,color:viable?'#15803d':'#991b1b'}}>{viable?'Proyecto Viable':'No Viable'}</span>
          </div>
          <button className="rpt-btn" style={{background:'linear-gradient(135deg,#dc2626,#b91c1c)',color:'#fff'}} onClick={doPDF} disabled={!!gen}>
            {gen==='pdf'?'Generando...':<><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>PDF</>}
          </button>
          <button className="rpt-btn" style={{background:'linear-gradient(135deg,#059669,#047857)',color:'#fff'}} onClick={doXLS}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/></svg>Excel
          </button>
        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'380px 1fr',gap:'1.5rem',alignItems:'start'}}>
        {/* ── Inputs ── */}
        <div style={{display:'flex',flexDirection:'column',gap:'1rem'}}>
          <div className="card" style={{padding:'1.4rem'}}>
            <div style={{fontSize:'.7rem',fontWeight:800,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:'1.1rem'}}>Parámetros del proyecto</div>
            <div style={{display:'flex',flexDirection:'column',gap:'1.1rem'}}>
              <MoneyInput label="Inversión inicial (año 0)" value={inv} onChange={setInv} note="Capital total requerido para iniciar el proyecto"/>
              <SliderField label="Tasa de descuento (WACC / COK)" value={tasa} onChange={setTasa} min={1} max={50} step={0.5} unit="%" sfx=" EA"/>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'.5rem',fontSize:'.7rem',color:'#94a3b8'}}>
                <div style={{background:'#f0fdf4',padding:'.4rem .6rem',borderRadius:8,border:'1px solid #bbf7d0',textAlign:'center'}}><div style={{color:'#15803d',fontWeight:700}}>Bajo riesgo</div><div>8–12% EA</div></div>
                <div style={{background:'#fff7ed',padding:'.4rem .6rem',borderRadius:8,border:'1px solid #fde68a',textAlign:'center'}}><div style={{color:'#92400e',fontWeight:700}}>Alto riesgo</div><div>25%+ EA</div></div>
              </div>
              <SliderField label="Horizonte de análisis" value={nY} onChange={setNY} min={1} max={10} unit=" años"/>
            </div>
          </div>

          <div className="card" style={{padding:'1.4rem'}}>
            <div style={{fontSize:'.7rem',fontWeight:800,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:'.85rem'}}>Flujos de caja proyectados</div>
            <div style={{display:'flex',alignItems:'center',gap:'.5rem',marginBottom:'.6rem',paddingLeft:'46px'}}>
              <span style={{flex:1,fontSize:'.68rem',fontWeight:700,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'.07em',textAlign:'right',paddingRight:'.85rem'}}>Flujo neto esperado (COP)</span>
            </div>
            {Array.from({length:nY},(_,i)=>(
              <div key={i} className="yr-row">
                <div style={{width:34,height:34,borderRadius:9,background:YRC[i],display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:'.8rem',fontWeight:800,flexShrink:0,fontFamily:'Sora,sans-serif'}}>{i+1}</div>
                <MoneyInput value={flujos[i]} onChange={v=>setFlujo(i,v)}/>
              </div>
            ))}
            <div style={{background:'#f0f9ff',borderRadius:10,padding:'.75rem 1rem',marginTop:'.5rem',display:'flex',justifyContent:'space-between',alignItems:'center',border:'1px solid #bae6fd'}}>
              <span style={{fontSize:'.8rem',color:'#0c4a6e',fontWeight:600}}>Suma sin descontar</span>
              <span className="fs" style={{fontSize:'.95rem',fontWeight:900,color:'#0891b2'}}>{fmtM(totalFlujos)}</span>
            </div>
          </div>
        </div>

        {/* ── Results ── */}
        <div style={{display:'flex',flexDirection:'column',gap:'1rem'}}>
          {/* Veredicto */}
          <div style={{background:viable?'linear-gradient(135deg,#064e3b,#065f46)':'linear-gradient(135deg,#7f1d1d,#991b1b)',borderRadius:18,padding:'1.4rem 1.75rem',display:'flex',alignItems:'center',gap:'1.25rem'}}>
            <div style={{width:52,height:52,borderRadius:15,background:'rgba(255,255,255,.1)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
              <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke={viable?'#34d399':'#fca5a5'} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                {viable?<polyline points="20 6 9 17 4 12"/>:<><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>}
              </svg>
            </div>
            <div>
              <div className="fs" style={{color:'#fff',fontSize:'1.2rem',fontWeight:900,marginBottom:'.25rem'}}>Proyecto {viable?'VIABLE':'NO VIABLE'}</div>
              <div style={{color:'rgba(255,255,255,.7)',fontSize:'.85rem',lineHeight:1.55}}>
                {viable?`VPN de ${COP(npv)} positivo — el proyecto genera valor real por encima del ${tasa}% EA requerido.`:`VPN de ${COP(Math.abs(npv))} negativo — la inversión no cubre la tasa mínima requerida del ${tasa}% EA.`}
              </div>
            </div>
          </div>

          {/* KPIs */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'.75rem'}}>
            {[
              {l:'VPN',v:(npv>=0?'+':'')+fmtM(npv),c:npv>=0?'#059669':'#dc2626',bg:npv>=0?'#f0fdf4':'#fff1f2',b:npv>=0?'#86efac':'#fca5a5',n:'Valor Presente Neto'},
              {l:'TIR',v:irr!==null?N(irr,2)+'%':'N/A',c:'#0891b2',bg:'#ecfeff',b:'#a5f3fc',n:'Tasa Interna Retorno'},
              {l:'Payback',v:payback?payback+' año'+(payback>1?'s':''):'N/A',c:'#7c3aed',bg:'#f5f3ff',b:'#ddd6fe',n:'Período recuperación'},
              {l:'VP Total',v:fmtM(totalVP),c:'#374151',bg:'#f8fafc',b:'#e2e8f0',n:'Flujos descontados'},
            ].map((k,i)=>(
              <div key={i} style={{background:k.bg,border:'1.5px solid '+k.b,borderRadius:14,padding:'1rem'}}>
                <div style={{fontSize:'.68rem',fontWeight:700,color:'#6b7280',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:'.3rem'}}>{k.l}</div>
                <div className="fs" style={{fontSize:'1.1rem',fontWeight:900,color:k.c,letterSpacing:'-.02em'}}>{k.v}</div>
                <div style={{fontSize:'.67rem',color:'#9ca3af',marginTop:'.2rem'}}>{k.n}</div>
              </div>
            ))}
          </div>

          {/* Bar chart */}
          <div className="card" style={{padding:'1.3rem 1.4rem'}}>
            <div className="fs" style={{fontSize:'.78rem',fontWeight:700,color:'#374151',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:'.85rem'}}>Flujos nominales vs. valor presente</div>
            <ResponsiveContainer width="100%" height={170}>
              <BarChart data={barData} margin={{top:0,right:5,left:0,bottom:0}} barCategoryGap="25%">
                <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9"/>
                <XAxis dataKey="name" tick={{fontSize:10,fill:'#94a3b8'}} axisLine={false} tickLine={false}/>
                <YAxis tickFormatter={v=>fmtM(v)} tick={{fontSize:10,fill:'#94a3b8'}} axisLine={false} tickLine={false} width={52}/>
                <Tooltip content={<BarTooltip/>}/>
                <Bar dataKey="nominal" name="Flujo nominal" fill="#06b6d4" radius={[4,4,0,0]}/>
                <Bar dataKey="vp" name="Valor presente" fill="#7c3aed" radius={[4,4,0,0]} opacity={0.82}/>
              </BarChart>
            </ResponsiveContainer>
          </div>

          {/* Sensitivity curve */}
          <div className="card" style={{padding:'1.3rem 1.4rem'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'.85rem'}}>
              <div className="fs" style={{fontSize:'.78rem',fontWeight:700,color:'#374151',textTransform:'uppercase',letterSpacing:'.07em'}}>Curva de sensibilidad del VPN</div>
              {irr!==null&&<span style={{fontSize:'.75rem',fontWeight:700,color:'#0891b2',background:'#ecfeff',padding:'.2rem .6rem',borderRadius:7,border:'1px solid #a5f3fc'}}>TIR ≈ {N(irr,2)}%</span>}
            </div>
            <ResponsiveContainer width="100%" height={150}>
              <LineChart data={sensData} margin={{top:0,right:5,left:0,bottom:0}}>
                <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9"/>
                <XAxis dataKey="tasa" tickFormatter={v=>v+'%'} tick={{fontSize:10,fill:'#94a3b8'}} axisLine={false} tickLine={false}/>
                <YAxis tickFormatter={v=>fmtM(v)} tick={{fontSize:9,fill:'#94a3b8'}} axisLine={false} tickLine={false} width={54}/>
                <Tooltip content={<LineTooltip/>}/>
                <ReferenceLine y={0} stroke="#94a3b8" strokeDasharray="4 2" strokeWidth={1.5}/>
                {irr!==null&&<ReferenceLine x={Math.round(irr)} stroke="#0891b2" strokeDasharray="3 2" strokeWidth={1.5} label={{value:'TIR',position:'top',fill:'#0891b2',fontSize:10}}/>}
                <Line type="monotone" dataKey="npv" name="VPN" stroke="#0891b2" strokeWidth={2.5} dot={false} activeDot={{r:4,fill:'#0891b2'}}/>
              </LineChart>
            </ResponsiveContainer>
          </div>

          {/* Breakdown table */}
          <div className="card" style={{overflow:'hidden'}}>
            <div style={{padding:'1.1rem 1.4rem',borderBottom:'1px solid #f1f5f9',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div className="fs" style={{fontSize:'.82rem',fontWeight:700,color:'#374151',textTransform:'uppercase',letterSpacing:'.07em'}}>Desglose por año</div>
              <div style={{fontSize:'.75rem',color:'#94a3b8'}}>Inversión inicial: <strong style={{color:'#dc2626'}}>{COP(inv)}</strong></div>
            </div>
            <div style={{overflowX:'auto'}}>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:'.83rem'}}>
                <thead>
                  <tr style={{borderBottom:'1.5px solid #f1f5f9'}}>
                    {['Año','Flujo Nominal','Factor VP','Valor Presente','Acumulado'].map(h=>(
                      <th key={h} style={{padding:'.65rem .9rem',textAlign:'right',fontSize:'.68rem',fontWeight:700,color:'#9ca3af',textTransform:'uppercase',letterSpacing:'.07em'}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {breakdown.map((b,i)=>(
                    <tr key={i} style={{borderBottom:'1px solid #f8fafc'}}>
                      <td style={{padding:'.7rem .9rem',textAlign:'right'}}>
                        <div style={{display:'inline-flex',alignItems:'center',gap:'.5rem'}}>
                          <div style={{width:8,height:8,borderRadius:'50%',background:YRC[i],flexShrink:0}}></div>
                          <span style={{fontWeight:700,color:'#374151'}}>Año {b.ano}</span>
                        </div>
                      </td>
                      <td style={{padding:'.7rem .9rem',textAlign:'right',color:'#1e293b'}}>{COP(b.flujo)}</td>
                      <td style={{padding:'.7rem .9rem',textAlign:'right',color:'#94a3b8',fontFamily:'monospace',fontSize:'.78rem'}}>{b.factor.toFixed(4)}</td>
                      <td style={{padding:'.7rem .9rem',textAlign:'right',fontWeight:700,color:'#7c3aed'}}>{COP(b.vp)}</td>
                      <td style={{padding:'.7rem .9rem',textAlign:'right',fontWeight:700,color:b.acum>=0?'#059669':'#dc2626'}}>{COP(b.acum)}</td>
                    </tr>
                  ))}
                  <tr style={{background:'#f8fafc',borderTop:'2px solid #e2e8f0'}}>
                    <td style={{padding:'.75rem .9rem',fontWeight:800,color:'#374151',textAlign:'right'}}>TOTALES</td>
                    <td style={{padding:'.75rem .9rem',textAlign:'right',fontWeight:800}}>{COP(totalFlujos)}</td>
                    <td></td>
                    <td style={{padding:'.75rem .9rem',textAlign:'right',fontWeight:800,color:'#7c3aed'}}>{COP(totalVP)}</td>
                    <td style={{padding:'.75rem .9rem',textAlign:'right',fontWeight:800,color:npv>=0?'#059669':'#dc2626'}}>{COP(npv)}</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>if(!sessionStorage.getItem('finsuite_auth'))window.location.href='../../index.html';if(!sessionStorage.getItem('finsuite_current_client'))window.location.href='../../clientes.html';</script>
</body>
</html>
