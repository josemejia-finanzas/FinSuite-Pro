import React,{useState,useMemo,useEffect,useRef} from 'react';

const COP=v=>new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP',minimumFractionDigits:0,maximumFractionDigits:0}).format(v||0);
const N=(v,d=2)=>new Intl.NumberFormat('es-CO',{minimumFractionDigits:0,maximumFractionDigits:d}).format(v||0);
const fmtM=v=>v>=1e9?N(v/1e9,2)+'B':v>=1e6?N(v/1e6,2)+'M':v>=1e3?N(v/1e3,1)+'K':COP(v);

function calcNPV(r,inv,flows){return -inv+flows.reduce((a,cf,i)=>a+cf/Math.pow(1+r,i+1),0);}
function calcIRR(inv,flows){
  if(flows.every(f=>f<=0)) return null;
  let lo=-0.99,hi=10;
  for(let i=0;i<300;i++){const mid=(lo+hi)/2,v=calcNPV(mid,inv,flows);if(Math.abs(v)<0.1) return mid*100;v>0?lo=mid:hi=mid;}
  return null;
}

function MoneyInput({label,value,onChange,note,style={}}){

      onChange={e=>{const d=e.target.value.replace(/[^\d]/g,'');setR(d);onChange(d===''?0:parseInt(d,10));}}
      onFocus={()=>{setF(true);setR(value===0?'':String(value));}} onBlur={()=>setF(false)}
      placeholder="0" inputMode="numeric"/>
    {note&&<p style={{fontSize:'.72rem',color:'#94a3b8',margin:'.2rem 0 0'}}>{note}</p>}
  </div>;
}

function pdfClientBlock(doc,client,user){
  const W=doc.internal.pageSize.getWidth();const M=14;
  const y0=43;const bh=36;
  // Background
  doc.setFillColor(248,250,252);doc.roundedRect(M,y0,W-M*2,bh,3,3,'F');
  doc.setDrawColor(220,228,240);doc.setLineWidth(.4);doc.roundedRect(M,y0,W-M*2,bh,3,3,'S');
  // Accent left bar
  doc.setFillColor(37,99,235);doc.roundedRect(M,y0,3,bh,1.5,1.5,'F');

  doc.text('CLIENTE',M+8,y0+7);
  // Name

  const nombre=(client?.nombre||'Sin cliente');
  const maxW=(W-M*2)/2-16;
  const nameTxt=doc.splitTextToSize(nombre,maxW)[0]||nombre;
  doc.text(nameTxt,M+8,y0+15);
  // Company + type
  const sub2=[];
  if(client?.empresa)sub2.push(client.empresa);
  if(client?.tipo)sub2.push(client.tipo);
  if(sub2.length){
    doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(100,116,139);
    doc.text(sub2.join(' · '),M+8,y0+22);
  }
  // ID
  if(client?.tipoDoc&&client?.numeroDoc){
    const lbl=client.tipoDoc==='Cédula de Ciudadanía'?'CC':client.tipoDoc==='NIT'?'NIT':client.tipoDoc;
    doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(71,85,105);
    doc.text(lbl+': '+client.numeroDoc,M+8,y0+29);
  }
  // Divider
  const midX=W/2;
  doc.setDrawColor(226,232,240);doc.setLineWidth(.3);
  doc.line(midX,y0+6,midX,y0+bh-6);
  // Right column
  const rx=midX+8;let ry=y0+9;
  const rItems=[];
  if(client?.email)rItems.push('Email: '+client.email);
  if(client?.celular||client?.telefono)rItems.push('Tel: '+(client.celular||client.telefono));
  if(client?.ciudad)rItems.push('Ciudad: '+client.ciudad);
  if(client?.direccion)rItems.push('Dir: '+client.direccion);
  doc.setFont('helvetica','normal');doc.setFontSize(7.5);doc.setTextColor(100,116,139);
  const maxRW=W-midX-M-12;
  rItems.forEach(item=>{
    if(ry<y0+bh-5){
      const short=doc.splitTextToSize(item,maxRW)[0]||item;
      doc.text(short,rx,ry);ry+=5.8;
    }
  });
  // Asesor bottom right - with enough padding from border
  doc.setFont('helvetica','italic');doc.setFontSize(7);doc.setTextColor(148,163,184);
  doc.text('Asesor: '+(user?.nombre||'No especificado'),W-M-5,y0+bh-7,{align:'right'});
  return y0+bh+10;
}

  // ID
  if(client?.tipoDoc&&client?.numeroDoc){
    const lbl=client.tipoDoc==='Cédula de Ciudadanía'?'CC':client.tipoDoc==='NIT'?'NIT':client.tipoDoc;
    doc.setFont('helvetica','bold');doc.setFontSize(7.5);doc.setTextColor(71,85,105);
    doc.text(lbl+': '+client.numeroDoc,M+5,y0+25);
  }
  // Right column
  const rx=W/2+2;let ry=y0+6;
  const rItems=[];
  if(client?.email)rItems.push('Email: '+client.email);
  if(client?.celular||client?.telefono)rItems.push('Tel: '+(client.celular||client.telefono));
  if(client?.ciudad)rItems.push('Ciudad: '+client.ciudad);
  if(client?.direccion)rItems.push('Dir: '+client.direccion);
  doc.setFont('helvetica','normal');doc.setFontSize(7.5);doc.setTextColor(100,116,139);
  rItems.forEach(item=>{
    if(ry<y0+h-4){doc.text(item,rx,ry);ry+=5.2;}
  });
  // Asesor + date
  doc.setFont('helvetica','italic');doc.setFontSize(7);doc.setTextColor(148,163,184);
  doc.text('Asesor: '+(user?.nombre||'No especificado'),W-M,y0+h-5,{align:'right'});

}
function generarPDF(d){
  const {jsPDF}=window.jspdf;const doc=new jsPDF('p','mm','a4');const M=14;const W=doc.internal.pageSize.getWidth();const H=doc.internal.pageSize.getHeight();

  const ftrs=()=>{
    const pg=doc.getNumberOfPages();
    for(let i=1;i<=pg;i++){
      doc.setPage(i);doc.setFillColor(248,250,252);doc.rect(0,H-10,W,10,'F');
      doc.setDrawColor(226,232,240);doc.setLineWidth(.3);doc.line(0,H-10,W,H-10);
      doc.setFont('helvetica','normal');doc.setFontSize(7.5);doc.setTextColor(148,163,184);
      doc.text('FinSuite Pro v1.2 — Valoración de Proyectos e Inversiones',M,H-3.5);
      doc.text('Pág. '+i+' de '+pg,W-M,H-3.5,{align:'right'});
    }
  };

  doc.setFillColor(7,89,133);doc.rect(0,0,W,36,'F');
  doc.setFillColor(8,145,178);doc.rect(0,36,W,3,'F');
  doc.setFont('helvetica','bold');doc.setFontSize(20);doc.setTextColor(241,245,249);
  doc.text('FinSuite Pro',M,16);
  doc.setFont('helvetica','normal');doc.setFontSize(10);doc.setTextColor(165,243,252);
  doc.text('Valoración de Proyectos e Inversiones',M,27);
  doc.text('Generado: '+new Date().toLocaleDateString('es-CO',{day:'2-digit',month:'long',year:'numeric'}),W-M,27,{align:'right'});
  const _cl=JSON.parse(sessionStorage.getItem('finsuite_current_client')||'null');
  const _usr=JSON.parse(sessionStorage.getItem('finsuite_auth')||'null');
  let y=pdfClientBlock(doc,_cl,_usr);

  // Veredicto
  const ok=d.npv>0;
  doc.setFillColor(ok?6:127,ok?78:29,ok?59:29);doc.roundedRect(M,y,W-M*2,22,3,3,'F');
  doc.setFont('helvetica','bold');doc.setFontSize(13);doc.setTextColor(255,255,255);
  doc.text((ok?'PROYECTO VIABLE':'PROYECTO NO VIABLE'),M+6,y+10);
  doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(ok?134:252,ok?239:165,ok?172:165);
  doc.text(ok?'El VPN positivo indica que el proyecto genera valor real por encima de la tasa mínima requerida.':'El VPN negativo indica que el proyecto no cubre el costo de oportunidad del capital.',M+6,y+18);
  y+=30;

  // Parámetros
  doc.autoTable({
    startY:y,head:[['Parámetro','Valor']],
    body:[['Inversión inicial',COP(d.inv)],['Tasa de descuento (WACC/COK)',N(d.tasa,1)+'% EA'],['Horizonte de análisis',d.nY+' años'],['Suma flujos de caja (sin descontar)',COP(d.totalFlujos)]],
    theme:'grid',margin:{left:M,right:M},
    headStyles:{fillColor:[7,89,133],textColor:[255,255,255],fontSize:9,fontStyle:'bold'},
    bodyStyles:{fontSize:8.5,textColor:[30,41,59]},
    alternateRowStyles:{fillColor:[236,254,255]},
    columnStyles:{1:{halign:'right',fontStyle:'bold'}},
    didDrawPage:()=>ftrs(),
  });
  y=doc.lastAutoTable.finalY+10;

  // KPIs
  doc.autoTable({
    startY:y,head:[['Indicador Financiero','Valor','Interpretación']],
    body:[
      ['Valor Presente Neto (VPN)',COP(d.npv),d.npv>0?'Positivo — genera valor':'Negativo — destruye valor'],
      ['Tasa Interna de Retorno (TIR)',d.irr!==null?N(d.irr,2)+'%':'No calculable',d.irr!==null?(d.irr>d.tasa?'Mayor que WACC — viable':'Menor que WACC — no viable'):'Flujos no permiten cálculo'],
      ['Período de recuperación (Payback)',d.payback?d.payback+' año(s)':'No se recupera en el horizonte',d.payback?'Recuperación en año '+d.payback:'Inversión no se recupera'],
      ['Suma VP de flujos',COP(d.totalVP),'Total flujos traídos a valor presente'],
    ],
    theme:'grid',margin:{left:M,right:M},
    headStyles:{fillColor:[8,145,178],textColor:[255,255,255],fontSize:9,fontStyle:'bold'},
    bodyStyles:{fontSize:8.5,textColor:[30,41,59]},
    alternateRowStyles:{fillColor:[236,254,255]},
    columnStyles:{1:{halign:'right',fontStyle:'bold'},2:{textColor:[100,116,139]}},
    didDrawPage:()=>ftrs(),
  });
  y=doc.lastAutoTable.finalY+10;

  // Tabla flujos
  doc.setFont('helvetica','bold');doc.setFontSize(10.5);doc.setTextColor(7,89,133);
  doc.text('DESGLOSE DE FLUJOS DE CAJA',M,y);
  doc.setDrawColor(7,89,133);doc.setLineWidth(.3);doc.line(M,y+1.5,W-M,y+1.5);y+=9;
  doc.autoTable({
    startY:y,
    head:[['Año','Flujo Nominal','Factor de Descuento','Valor Presente','Flujo Acumulado','Estado']],
    body:[
      ['0 (Inversión)',COP(-d.inv),'1.0000',COP(-d.inv),COP(-d.inv),'Salida'],
      ...d.breakdown.map(b=>[
        'Año '+b.año,COP(b.flujo),b.factor.toFixed(4),COP(b.vp),COP(b.cumulativo),
        b.cumulativo>=0?'Recuperado':'Pendiente',
      ]),
      ['TOTALES',COP(d.totalFlujos),'—',COP(d.totalVP),COP(d.npv),'VPN final'],
    ],
    theme:'striped',margin:{left:M,right:M},
    headStyles:{fillColor:[7,89,133],textColor:[255,255,255],fontSize:8.5,fontStyle:'bold'},
    bodyStyles:{fontSize:8,textColor:[30,41,59]},
    alternateRowStyles:{fillColor:[236,254,255]},
    columnStyles:{0:{halign:'center'},1:{halign:'right'},2:{halign:'center'},3:{halign:'right'},4:{halign:'right'},5:{halign:'center'}},
    didDrawPage:()=>ftrs(),
  });

  ftrs();const _fpdf=(_cl?.nombre?_cl.nombre.replace(/[^a-zA-Z0-9]/g,'-').toLowerCase()+'-':'')+'valoracion-proyecto';
doc.save(_fpdf+'.pdf');
}

function generarExcel(d){const _cl_xls=JSON.parse(sessionStorage.getItem('finsuite_current_client')||'null');const _usr_xls=JSON.parse(sessionStorage.getItem('finsuite_auth')||'null');
  const XLSX=window.XLSX;const wb=XLSX.utils.book_new();const n=v=>Number(v)||0;

  const wsR=XLSX.utils.aoa_to_sheet([
    ['VALORACIÓN DE PROYECTO — FinSuite Pro v1.2'],
    ['Fecha',new Date().toLocaleDateString('es-CO')],[''],
    ['DATOS DEL CLIENTE',''],
    ['Nombre',_cl_xls?.nombre||'No especificado'],
    [(_cl_xls?.tipoDoc||'Documento'),_cl_xls?.numeroDoc||'—'],
    ['Empresa',_cl_xls?.empresa||'—'],
    ['Email',_cl_xls?.email||'—'],
    ['Teléfono',_cl_xls?.celular||_cl_xls?.telefono||'—'],
    ['Ciudad',_cl_xls?.ciudad||'—'],
    ['Asesor',_usr_xls?.nombre||'—'],[''],
    ['PARÁMETROS DE ENTRADA',''],
    ['Inversión inicial (COP)',n(d.inv)],['Tasa de descuento (% EA)',d.tasa],
    ['Horizonte de análisis (años)',d.nY],[''],
    ['RESULTADOS FINANCIEROS',''],
    ['Valor Presente Neto (VPN)',n(d.npv)],
    ['Tasa Interna de Retorno (TIR %)',d.irr!==null?n(d.irr):'N/A'],
    ['Período de recuperación (años)',d.payback||'No recupera'],
    ['Suma flujos sin descontar',n(d.totalFlujos)],
    ['Suma VP de flujos',n(d.totalVP)],[''],
    ['VEREDICTO',d.npv>0?'VIABLE':'NO VIABLE'],
  ]);
  wsR['!cols']=[{wch:35},{wch:20}];
  XLSX.utils.book_append_sheet(wb,wsR,'Resumen');

  const wsCF=XLSX.utils.aoa_to_sheet([
    ['Año','Flujo Nominal (COP)','Factor VP','Valor Presente (COP)','Flujo Acumulado (COP)'],
    ['0 (Inversión)',-n(d.inv),1,-n(d.inv),-n(d.inv)],
    ...d.breakdown.map(b=>['Año '+b.año,n(b.flujo),b.factor,n(b.vp),n(b.cumulativo)]),
    ['TOTALES',n(d.totalFlujos),'',n(d.totalVP),n(d.npv)],
  ]);
  wsCF['!cols']=[{wch:15},{wch:22},{wch:15},{wch:22},{wch:25}];
  XLSX.utils.book_append_sheet(wb,wsCF,'Flujos_de_Caja');

  const nRows=[];
  for(let rt=0;rt<=0.5;rt+=0.025) nRows.push([Math.round(rt*100),Math.round(calcNPV(rt,d.inv,d.flows))]);
  const wsS=XLSX.utils.aoa_to_sheet([['Tasa de Descuento (%)','VPN (COP)'],...nRows]);
  wsS['!cols']=[{wch:25},{wch:20}];
  XLSX.utils.book_append_sheet(wb,wsS,'Sensibilidad_VPN');

  const _fn_xls=(_cl_xls?.nombre?_cl_xls.nombre.replace(/[^a-zA-Z0-9]/g,'-').toLowerCase()+'-':'')+'valoracion-proyecto';
XLSX.writeFile(wb,_fn_xls+'.xlsx');
}

function SliderVal({label,value,onChange,min,max,step,unit,sfx}){
  const s=step||1;const u=unit||'';const sf=sfx||'';
  return <div>
    <div style={{display:'flex',justifyContent:'space-between',marginBottom:'.35rem'}}>
      <label style={{fontSize:'.82rem',fontWeight:700,color:'#374151'}}>{label}</label>
      <span className="fs" style={{fontSize:'.9rem',fontWeight:700,color:'#0891b2'}}>{value}{u}{sf}</span>
    </div>
    <input type="range" className="slider" min={min} max={max} step={s} value={value} onChange={e=>onChange(s===1?parseInt(e.target.value):parseFloat(e.target.value))}/>
  </div>;
}

const YRC=['#0891b2','#06b6d4','#0e7490','#155e75','#164e63','#0c4a6e','#1e3a5f','#1e40af','#1d4ed8','#2563eb'];

function App(){
  const [inv,setInv]=useState(100000000);
  const [tasa,setTasa]=useState(12);
  const [nY,setNY]=useState(5);
  const [flujos,setFlujos]=useState([30000000,45000000,50000000,55000000,60000000,0,0,0,0,0]);
  const [gen,setGen]=useState('');
  const [client,setClient]=useState(null);
  const [saved,setSaved]=useState(false);
  const ready=useRef(false);

  useEffect(()=>{
    const cl=JSON.parse(sessionStorage.getItem('finsuite_current_client')||'null');
    setClient(cl);
    if(cl){const raw=localStorage.getItem('finsuite_'+cl.id+'_valoracion');if(raw){try{const d=JSON.parse(raw);setInv(d.inv||100000000);setTasa(d.tasa||12);setNY(d.nY||5);setFlujos(d.flujos||[30000000,45000000,50000000,55000000,60000000,0,0,0,0,0]);}catch(e){}}}
    setTimeout(()=>{ready.current=true;},100);
  },[]);

  useEffect(()=>{
    if(!ready.current) return;
    const cl=JSON.parse(sessionStorage.getItem('finsuite_current_client')||'null');
    if(!cl) return;
    const t=setTimeout(()=>{
      localStorage.setItem('finsuite_'+cl.id+'_valoracion',JSON.stringify({inv,tasa,nY,flujos}));
      try{const cls=JSON.parse(localStorage.getItem('finsuite_clients')||'[]');const idx=cls.findIndex(x=>x.id===cl.id);if(idx>=0){cls[idx].updatedAt=new Date().toISOString();localStorage.setItem('finsuite_clients',JSON.stringify(cls));}}catch(e){}
      setSaved(true);setTimeout(()=>setSaved(false),2000);
    },600);
    return ()=>clearTimeout(t);
  },[inv,tasa,nY,flujos]);

  const setF=(i,v)=>setFlujos(f=>f.map((x,j)=>j===i?v:x));
  const flows=flujos.slice(0,nY);const r=tasa/100;

  const npv=useMemo(()=>calcNPV(r,inv,flows),[r,inv,flows]);
  const irr=useMemo(()=>calcIRR(inv,flows),[inv,flows]);
  const viable=npv>0;

  const breakdown=useMemo(()=>{let c=-inv;return flows.map((cf,i)=>{const f=1/Math.pow(1+r,i+1);const vp=cf*f;c+=cf;return{año:i+1,flujo:cf,factor:f,vp:Math.round(vp),cumulativo:Math.round(c)};});},[flows,r,inv]);
  const payback=breakdown.find(b=>b.cumulativo>=0)?.año||null;
  const totalVP=breakdown.reduce((a,b)=>a+b.vp,0);
  const totalFlujos=flows.reduce((a,b)=>a+b,0);
  const barData=breakdown.map(b=>({name:'Año '+b.año,nominal:b.flujo,vp:b.vp}));
  const sensData=useMemo(()=>{const p=[];for(let rt=0;rt<=0.5;rt+=0.025) p.push({tasa:Math.round(rt*100),npv:Math.round(calcNPV(rt,inv,flows))});return p;},[inv,flows]);

  const dPDF=()=>{setGen('pdf');setTimeout(()=>{generarPDF({inv,tasa,nY,flows,npv,irr,payback,totalVP,totalFlujos,breakdown,viable});setGen('');},50);};
  const dXLS=()=>generarExcel({inv,tasa,nY,flows,npv,irr,payback,totalVP,totalFlujos,breakdown});



  return <div style={{maxWidth:1250,margin:'0 auto',padding:'1.5rem'}}>
    <div style={{marginBottom:'1.5rem',display:'flex',alignItems:'center',gap:'1rem',flexWrap:'wrap'}}>
      <div style={{background:'#ecfeff',padding:'.75rem',borderRadius:14,border:'1px solid #a5f3fc'}}>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#0891b2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
      </div>
      <div style={{flex:1,minWidth:0}}>
        <h1 className="fs" style={{fontSize:'1.3rem',fontWeight:800,color:'#0f172a',margin:0}}>Valoración de Proyectos e Inversiones</h1>
        <p style={{color:'#64748b',fontSize:'.84rem',margin:0}}>{client?<><strong style={{color:'#0891b2'}}>{client.nombre}</strong> — Valoración de proyecto</>:'Calcula VPN, TIR y payback de inversiones.'}</p>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:'.5rem',flexShrink:0}}>
          {saved&&<span style={{fontSize:'.75rem',color:'#059669',display:'flex',alignItems:'center',gap:'.3rem'}}><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>Guardado</span>}
        <button className="rpt-btn" style={{background:'linear-gradient(135deg,#dc2626,#b91c1c)',color:'#fff'}} onClick={dPDF} disabled={!!gen}>
          {gen==='pdf'?'Generando...':<><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Informe PDF</>}
        </button>
        <button className="rpt-btn" style={{background:'linear-gradient(135deg,#059669,#047857)',color:'#fff'}} onClick={dXLS}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
          Exportar Excel
        </button>
      </div>
    </div>

    <div style={{display:'grid',gridTemplateColumns:'380px 1fr',gap:'1.5rem',alignItems:'start'}}>
      <div style={{display:'flex',flexDirection:'column',gap:'1rem'}}>
        <div className="card" style={{padding:'1.25rem 1.4rem'}}>
          <div className="fs" style={{fontSize:'.82rem',fontWeight:700,color:'#374151',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:'1rem'}}>🏗️ Parámetros del proyecto</div>
          <div style={{display:'flex',flexDirection:'column',gap:'1rem'}}>
            <MoneyInput label="Inversión inicial (año 0)" value={inv} onChange={setInv} note="Capital total requerido para iniciar"/>
            <div>
              <SliderVal label="Tasa de descuento (WACC / COK)" value={tasa} onChange={setTasa} min={1} max={50} step={0.5} unit="%" sfx=" EA"/>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:'.7rem',color:'#94a3b8',marginTop:'.2rem'}}><span>Bajo riesgo</span><span>Alto riesgo</span></div>
            </div>
            <SliderVal label="Horizonte de análisis" value={nY} onChange={setNY} min={1} max={10} unit=" años"/>
          </div>
        </div>
        <div className="card" style={{padding:'1.25rem 1.4rem'}}>
          <div className="fs" style={{fontSize:'.82rem',fontWeight:700,color:'#374151',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:'.85rem'}}>📅 Flujos de caja proyectados</div>
          <div style={{display:'flex',gap:'.5rem',marginBottom:'.5rem',paddingLeft:46}}>
            <span style={{flex:1,fontSize:'.68rem',fontWeight:700,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'.07em',textAlign:'right',paddingRight:'.85rem'}}>Flujo neto esperado (COP)</span>
          </div>
          {Array.from({length:nY},(_,i)=><div key={i} className="yr-row">
            <div style={{width:34,height:34,borderRadius:9,background:YRC[i],display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:'.8rem',fontWeight:800,flexShrink:0}}>{i+1}</div>
            <MoneyInput value={flujos[i]} onChange={v=>setF(i,v)} style={{flex:1}}/>
          </div>)}
          <div style={{background:'#f0f9ff',borderRadius:10,padding:'.7rem 1rem',marginTop:'.5rem',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontSize:'.8rem',color:'#0c4a6e',fontWeight:600}}>Suma sin descontar</span>
            <span className="fs" style={{fontSize:'.9rem',fontWeight:800,color:'#0891b2'}}>{fmtM(totalFlujos)}</span>
          </div>
        </div>
      </div>

      <div style={{display:'flex',flexDirection:'column',gap:'1rem'}}>
        {/* Veredicto */}
        <div style={{background:viable?'linear-gradient(135deg,#064e3b,#065f46)':'linear-gradient(135deg,#7f1d1d,#991b1b)',borderRadius:18,padding:'1.5rem',display:'flex',gap:'1.25rem',alignItems:'center'}}>
          <div style={{fontSize:'2.5rem',lineHeight:1,flexShrink:0}}>{viable?'✅':'❌'}</div>
          <div>
            <div className="fs" style={{color:'#fff',fontSize:'1.2rem',fontWeight:800,marginBottom:'.3rem'}}>Proyecto {viable?'VIABLE':'NO VIABLE'}</div>
            <div style={{color:'rgba(255,255,255,.75)',fontSize:'.85rem',lineHeight:1.55}}>
              {viable?'VPN de '+COP(npv)+' positivo: el proyecto genera valor real por encima del '+tasa+'% EA requerido.':'VPN de '+COP(npv)+' negativo: el proyecto no cubre la tasa mínima requerida del '+tasa+'% EA.'}
            </div>
          </div>
        </div>

        {/* KPIs */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'.75rem'}}>
          {[{l:'VPN',v:fmtM(Math.abs(npv)),sign:npv>=0?'+':'-',c:npv>=0?'#059669':'#dc2626',bg:npv>=0?'#f0fdf4':'#fff1f2',b:npv>=0?'#86efac':'#fca5a5',n:'Valor Presente Neto'},
            {l:'TIR',v:irr!==null?N(irr,2)+'%':'N/A',sign:'',c:'#0891b2',bg:'#ecfeff',b:'#a5f3fc',n:'Tasa Interna de Retorno'},
            {l:'Payback',v:payback?payback+' año'+(payback>1?'s':''):'> horizonte',sign:'',c:'#7c3aed',bg:'#f5f3ff',b:'#ddd6fe',n:'Período recuperación'},
            {l:'VP Total',v:fmtM(totalVP),sign:'',c:'#374151',bg:'#f8fafc',b:'#e2e8f0',n:'Flujos descontados'},
          ].map(k=><div key={k.l} style={{background:k.bg,border:'1.5px solid '+k.b,borderRadius:14,padding:'1rem'}}>
            <div style={{fontSize:'.68rem',fontWeight:700,color:'#6b7280',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:'.3rem'}}>{k.l}</div>
            <div className="fs" style={{fontSize:'1.1rem',fontWeight:800,color:k.c}}>{k.sign}{k.v}</div>
            <div style={{fontSize:'.68rem',color:'#9ca3af',marginTop:'.2rem'}}>{k.n}</div>
          </div>)}
        </div>

        {/* Gráfico barras */}
        <div className="card" style={{padding:'1.25rem 1.4rem'}}>
          <div className="fs" style={{fontSize:'.78rem',fontWeight:700,color:'#374151',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:'.85rem'}}>Flujos nominales vs. valor presente</div>
          <ResponsiveContainer width="100%" height={170}>
            <BarChart data={barData} margin={{top:0,right:5,left:0,bottom:0}} barCategoryGap="25%">
              <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9"/>
              <XAxis dataKey="name" tick={{fontSize:10,fill:'#94a3b8'}} axisLine={false} tickLine={false}/>
              <YAxis tickFormatter={v=>fmtM(v)} tick={{fontSize:10,fill:'#94a3b8'}} axisLine={false} tickLine={false} width={50}/>
              <Tooltip formatter={v=>COP(v)} cursor={{fill:'rgba(0,0,0,.04)'}}/>
              <Bar dataKey="nominal" name="Flujo nominal" fill="#06b6d4" radius={[4,4,0,0]}/>
              <Bar dataKey="vp" name="Valor presente" fill="#7c3aed" radius={[4,4,0,0]} opacity={0.8}/>
            </BarChart>
          </ResponsiveContainer>
        </div>

        {/* Curva sensibilidad */}
        <div className="card" style={{padding:'1.25rem 1.4rem'}}>
          <div className="fs" style={{fontSize:'.78rem',fontWeight:700,color:'#374151',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:'.85rem'}}>
            Sensibilidad del VPN{irr!==null&&<span style={{fontSize:'.72rem',fontWeight:600,color:'#0891b2',marginLeft:'.6rem',textTransform:'none'}}>TIR ≈ {N(irr,2)}%</span>}
          </div>
          <ResponsiveContainer width="100%" height={150}>
            <LineChart data={sensData} margin={{top:0,right:5,left:0,bottom:0}}>
              <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9"/>
              <XAxis dataKey="tasa" tickFormatter={v=>v+'%'} tick={{fontSize:10,fill:'#94a3b8'}} axisLine={false} tickLine={false}/>
              <YAxis tickFormatter={v=>fmtM(v)} tick={{fontSize:9,fill:'#94a3b8'}} axisLine={false} tickLine={false} width={52}/>
              <Tooltip formatter={v=>COP(v)} labelFormatter={v=>'Tasa: '+v+'%'}/>
              <ReferenceLine y={0} stroke="#94a3b8" strokeDasharray="4 2" strokeWidth={1.5}/>
              {irr!==null&&<ReferenceLine x={Math.round(irr)} stroke="#0891b2" strokeDasharray="3 2" label={{value:'TIR',position:'top',fill:'#0891b2',fontSize:10}}/>}
              <Line type="monotone" dataKey="npv" name="VPN" stroke="#0891b2" strokeWidth={2.5} dot={false} activeDot={{r:4}}/>
            </LineChart>
          </ResponsiveContainer>
        </div>

        {/* Tabla desglose */}
        <div className="card" style={{overflowX:'auto'}}>
          <div style={{padding:'1.1rem 1.4rem',borderBottom:'1px solid #f1f5f9'}}>
            <div className="fs" style={{fontSize:'.82rem',fontWeight:700,color:'#374151',textTransform:'uppercase',letterSpacing:'.07em'}}>Desglose por año</div>
          </div>
          <table style={{width:'100%',fontSize:'.83rem',borderCollapse:'collapse'}}>
            <thead><tr style={{borderBottom:'1.5px solid #f1f5f9'}}>
              {['Año','Flujo Nominal','Factor VP','Valor Presente','Flujo Acumulado'].map(h=><th key={h} style={{padding:'.6rem .9rem',textAlign:'right',fontSize:'.68rem',fontWeight:700,color:'#9ca3af',textTransform:'uppercase',letterSpacing:'.07em'}}>{h}</th>)}
            </tr></thead>
            <tbody>
              {breakdown.map((b,i)=><tr key={i} style={{borderBottom:'1px solid #f8fafc'}}>
                <td style={{padding:'.65rem .9rem',fontWeight:700,color:'#374151',display:'flex',alignItems:'center',gap:'.5rem'}}><div style={{width:8,height:8,borderRadius:'50%',background:YRC[i],flexShrink:0}}></div>Año {b.año}</td>
                <td style={{padding:'.65rem .9rem',textAlign:'right',color:'#1e293b'}}>{COP(b.flujo)}</td>
                <td style={{padding:'.65rem .9rem',textAlign:'right',color:'#94a3b8',fontFamily:'monospace',fontSize:'.78rem'}}>{b.factor.toFixed(4)}</td>
                <td style={{padding:'.65rem .9rem',textAlign:'right',fontWeight:700,color:'#7c3aed'}}>{COP(b.vp)}</td>
                <td style={{padding:'.65rem .9rem',textAlign:'right',fontWeight:700,color:b.cumulativo>=0?'#059669':'#dc2626'}}>{COP(b.cumulativo)}</td>
              </tr>)}
              <tr style={{background:'#f8fafc',borderTop:'2px solid #e2e8f0'}}>
                <td style={{padding:'.7rem .9rem',fontWeight:800,color:'#374151'}}>TOTALES</td>
                <td style={{padding:'.7rem .9rem',textAlign:'right',fontWeight:800}}>{COP(totalFlujos)}</td>
                <td></td>
                <td style={{padding:'.7rem .9rem',textAlign:'right',fontWeight:800,color:'#7c3aed'}}>{COP(totalVP)}</td>
                <td style={{padding:'.7rem .9rem',textAlign:'right',fontWeight:800,color:npv>=0?'#059669':'#dc2626'}}>{COP(npv)}</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>;
}
createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>if(!sessionStorage.getItem('finsuite_auth'))window.location.href='../../index.html';if(!sessionStorage.getItem('finsuite_current_client'))window.location.href='../../clientes.html';</script>
</body></html>
